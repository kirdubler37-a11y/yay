<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ SKINVAULT | Кейсы CS2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Firebase скрипты -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#050510;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;padding:20px;background-image:radial-gradient(ellipse at 20% 50%,rgba(255,106,0,0.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(123,47,190,0.2) 0%,transparent 50%);overflow-x:hidden}
        .online-counter{position:fixed;top:20px;left:20px;z-index:100;background:rgba(15,18,28,0.9);backdrop-filter:blur(15px);padding:12px 18px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
        .online-dot{width:10px;height:10px;background:#4caf50;border-radius:50%;animation:pulse 2s infinite;box-shadow:0 0 15px #4caf50}
        @keyframes pulse{0%,100%{box-shadow:0 0 10px #4caf50}50%{box-shadow:0 0 25px #4caf50}}
        .online-count{color:#4caf50;font-weight:700}
        header{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto 30px;padding:18px 32px;background:rgba(15,18,28,0.8);backdrop-filter:blur(25px);border-radius:20px;border:1px solid rgba(255,255,255,0.08);flex-wrap:wrap;gap:15px}
        .logo{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#ff6a00,#ff3c00,#ff6a00,#ffaa00);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 4s ease infinite;letter-spacing:2px}
        @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .balance{display:flex;align-items:center;gap:12px;background:rgba(255,106,0,0.12);padding:12px 26px;border-radius:50px;border:1px solid rgba(255,106,0,0.25);font-weight:700;font-size:20px;color:#ffaa00}
        .balance span{color:#fff;margin-left:6px;font-size:22px}
        .btn-register{background:linear-gradient(135deg,#7b2fbe,#5a1a8a);border:none;color:#fff;padding:12px 24px;border-radius:25px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
        .btn-logout{background:rgba(255,68,68,0.2);border:1px solid rgba(255,68,68,0.3);color:#ff4444;padding:8px 16px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:600;font-family:'Inter',sans-serif}
        .tabs{position:relative;z-index:10;display:flex;gap:8px;max-width:1200px;margin:0 auto 25px;flex-wrap:wrap;background:rgba(15,18,28,0.6);backdrop-filter:blur(15px);border-radius:16px;padding:8px;border:1px solid rgba(255,255,255,0.06)}
        .tab-btn{background:transparent;border:none;color:rgba(255,255,255,0.4);padding:12px 28px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:0.3s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:10px}
        .tab-btn.active{color:#fff;background:linear-gradient(135deg,rgba(255,106,0,0.3),rgba(123,47,190,0.2));border:1px solid rgba(255,106,0,0.2)}
        .tab-content{position:relative;z-index:10;display:none;animation:tabFade 0.5s ease}
        .tab-content.active{display:block}
        @keyframes tabFade{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
        .case-selector{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:30px}
        .case-option{background:rgba(18,22,36,0.8);border:2px solid rgba(255,255,255,0.06);border-radius:16px;padding:18px 24px;cursor:pointer;transition:0.3s;text-align:center;min-width:130px}
        .case-option.active{border-color:#ff6a00;background:rgba(255,106,0,0.12)}
        .case-option .case-icon{font-size:38px;display:block;margin-bottom:6px}
        .case-option .case-name{font-weight:700;font-size:14px}
        .case-option .case-price{color:#ffaa00;font-size:15px;font-weight:700;margin-top:4px}
        .case-option .case-skins{color:rgba(255,255,255,0.3);font-size:11px;margin-top:2px}
        .case-container{max-width:900px;margin:0 auto;background:rgba(15,18,28,0.8);backdrop-filter:blur(25px);padding:35px;border-radius:24px;box-shadow:0 15px 80px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.06)}
        .case-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:20px}
        .case-header h3{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;background:linear-gradient(135deg,#fff,rgba(255,255,255,0.7));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .case-header .sub{color:rgba(255,255,255,0.35);font-size:14px}
        .case-header .sub .price-tag{color:#ffaa00;font-weight:700}
        .all-roulettes-wrapper{display:flex;flex-direction:column;gap:6px;margin:15px auto;max-height:55vh;overflow-y:auto;padding:4px}
        .single-roulette-item{position:relative;width:100%;height:100px;background:rgba(8,10,18,0.9);overflow:hidden;border-radius:12px;border:1px solid rgba(255,255,255,0.08);flex-shrink:0}
        .single-roulette-item::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,rgba(5,5,16,0.9) 0%,transparent 8%,transparent 92%,rgba(5,5,16,0.9) 100%);pointer-events:none;z-index:5}
        .single-roulette-item .mini-pointer{position:absolute;top:0;left:50%;transform:translateX(-50%);width:3px;height:100%;background:linear-gradient(180deg,#ff6a00,#ffaa00,#ff6a00);z-index:10;box-shadow:0 0 20px #ff6a00}
        .single-roulette-item .mini-tape{display:flex;position:absolute;left:0;top:12px;will-change:transform}
        .single-roulette-item .mini-skin-card{width:85px;height:75px;margin:0 4px;background:rgba(20,24,38,0.9);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;padding:6px;border-bottom:3px solid rgba(255,255,255,0.1);flex-shrink:0}
        .single-roulette-item .mini-skin-card .icon{font-size:28px;margin-bottom:2px}
        .single-roulette-item .mini-skin-card .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;font-size:8px}
        .single-roulette-item .mini-skin-card .price{font-size:8px;color:rgba(255,255,255,0.35)}
        .single-roulette-item .roulette-number{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.25);font-size:12px;font-weight:700;z-index:11;background:rgba(0,0,0,0.5);padding:4px 8px;border-radius:6px}
        .rarity-legendary{border-bottom-color:#ff4444!important;background:linear-gradient(180deg,rgba(20,24,38,0.9) 60%,rgba(255,68,68,0.15))!important}
        .rarity-epic{border-bottom-color:#d32ce6!important;background:linear-gradient(180deg,rgba(20,24,38,0.9) 60%,rgba(211,44,230,0.15))!important}
        .rarity-rare{border-bottom-color:#8847ff!important}
        .rarity-uncommon{border-bottom-color:#4b69ff!important}
        .rarity-common{border-bottom-color:rgba(107,122,138,0.5)!important}
        .btn-primary{background:linear-gradient(135deg,#ff6a00,#ff3c00);color:#fff;border:none;padding:18px 30px;font-size:18px;font-weight:700;border-radius:14px;cursor:pointer;box-shadow:0 6px 30px rgba(238,60,0,0.4);transition:0.3s;font-family:'Inter',sans-serif;width:100%;max-width:340px;margin:15px auto 0;display:block;letter-spacing:1px;text-transform:uppercase}
        .btn-primary:hover{transform:translateY(-4px);box-shadow:0 12px 50px rgba(238,60,0,0.6)}
        .btn-primary:disabled{background:rgba(42,47,58,0.8);box-shadow:none;cursor:not-allowed}
        .multi-spin-controls{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:20px;flex-wrap:wrap}
        .multi-spin-btn{background:rgba(20,24,38,0.8);border:2px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);padding:10px 18px;border-radius:25px;font-size:14px;font-weight:600;cursor:pointer;transition:0.3s;font-family:'Inter',sans-serif}
        .multi-spin-btn.active{border-color:#ff6a00;background:rgba(255,106,0,0.15);color:#ffaa00}
        .inventory-section{max-width:1200px;margin:0 auto;background:rgba(15,18,28,0.8);backdrop-filter:blur(25px);padding:30px;border-radius:24px;border:1px solid rgba(255,255,255,0.06)}
        .inventory-header{display:flex;justify-content:space-between;align-items:center;gap:15px;margin-bottom:20px}
        .inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;max-height:520px;overflow-y:auto;padding:6px}
        .inv-item{background:rgba(20,24,38,0.8);border-radius:14px;padding:16px 12px;text-align:center;border:1px solid rgba(255,255,255,0.04);transition:0.3s}
        .inv-item:hover{transform:translateY(-6px);border-color:#ff6a00}
        .inv-item .icon{font-size:38px;display:block;margin-bottom:6px}
        .inv-item .name{font-size:12px;font-weight:700}
        .inv-item .price{font-size:12px;color:rgba(255,255,255,0.35);margin:6px 0 10px}
        .btn-sell{background:rgba(30,35,48,0.9);border:1px solid rgba(255,255,255,0.06);color:#fff;padding:7px 16px;border-radius:25px;font-size:12px;font-weight:600;cursor:pointer}
        .btn-sell:hover{background:#ff6a00;color:#050510}
        .empty-inv{grid-column:1/-1;color:rgba(255,255,255,0.1);text-align:center;padding:50px 20px}
        .empty-inv i{font-size:60px;display:block;margin-bottom:15px;opacity:0.2}
        @media(max-width:768px){.single-roulette-item{height:75px}.single-roulette-item .mini-skin-card{width:65px;height:55px}.case-option{min-width:105px}.logo{font-size:22px}}
    </style>
</head>
<body>

    <!-- Онлайн счётчик -->
    <div class="online-counter">
        <div class="online-dot"></div>
        <span>Онлайн: </span>
        <span class="online-count" id="onlineCount">0</span>
    </div>

    <header>
        <div class="logo">⭐ SKINVAULT</div>
        <div style="display:flex;align-items:center;gap:15px;">
            <div class="balance">💰 <span id="balanceDisplay">1000</span></div>
            <button class="btn-register" id="registerBtn" onclick="showRegisterModal()">👤 Войти</button>
            <div id="userInfo" style="display:none;align-items:center;gap:10px;">
                <span style="color:#ffaa00;font-weight:700;" id="userNickname"></span>
                <button class="btn-logout" onclick="logoutUser()">🚪 Выйти</button>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="case">💎 Кейс</button>
        <button class="tab-btn" data-tab="inventory">🎒 Инвентарь (<span id="invCount">0</span>)</button>
    </div>

    <div class="tab-content active" id="tab-case">
        <div class="case-container">
            <div class="case-selector" id="caseSelector"></div>
            <div class="multi-spin-controls">
                <span style="color:rgba(255,255,255,0.4);">Кол-во:</span>
                <button class="multi-spin-btn" data-count="1">1x</button>
                <button class="multi-spin-btn active" data-count="5">5x</button>
                <button class="multi-spin-btn" data-count="10">10x</button>
                <span id="spinCountDisplay" style="color:#ffaa00;font-weight:700;">5</span>
            </div>
            <div class="case-header">
                <div><h3 id="caseName">👑 Премиум</h3><div class="sub">Стоимость: <span class="price-tag" id="casePrice">350</span> ₽</div></div>
            </div>
            <div class="all-roulettes-wrapper" id="allRoulettes"></div>
            <button class="btn-primary" id="openBtn">🔑 КРУТИТЬ</button>
        </div>
    </div>

    <div class="tab-content" id="tab-inventory">
        <div class="inventory-section">
            <div class="inventory-header"><h3>🎒 Инвентарь</h3><div class="stats">Предметов: <strong id="invTotalCount">0</strong> | Стоимость: <strong id="invTotalPrice">0.00</strong> ₽</div></div>
            <div class="inventory-grid" id="inventoryGrid"><div class="empty-inv"><i>📦</i>Инвентарь пуст</div></div>
        </div>
    </div>

    <script>
    // ============================================================
    //  FIREBASE КОНФИГ (ТВОИ ДАННЫЕ)
    // ============================================================
    const firebaseConfig = {
        apiKey: "AIzaSyCiJGNpJByCCbwcufI-NFUFzXjo0HeGd8E",
        authDomain: "skinvalut.firebaseapp.com",
        databaseURL: "https://skinvalut-default-rtdb.firebaseio.com",
        projectId: "skinvalut",
        storageBucket: "skinvalut.firebasestorage.app",
        messagingSenderId: "560114772930",
        appId: "1:560114772930:web:8aa0a87f3c791b27d6845b"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const onlineRef = db.ref('online');

    // Онлайн-счётчик
    const myOnlineId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    function updateOnlineStatus() {
        onlineRef.child(myOnlineId).set({ time: firebase.database.ServerValue.TIMESTAMP });
    }
    updateOnlineStatus();
    setInterval(updateOnlineStatus, 5000);
    
    onlineRef.on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const now = Date.now();
        let count = 0;
        for (const id in data) {
            if (data[id].time && (now - data[id].time < 15000)) count++;
            else onlineRef.child(id).remove();
        }
        document.getElementById('onlineCount').textContent = count;
    });
    
    window.addEventListener('beforeunload', () => { onlineRef.child(myOnlineId).remove(); });

    // Звуки
    const SoundFX={ctx:null,init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume()},play(t){this.init();const ctx=this.ctx,now=ctx.currentTime;const tone=(f,d,v=.1)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(f,now);g.gain.setValueAtTime(v,now);g.gain.exponentialRampToValueAtTime(.001,now+d);o.start(now);o.stop(now+d)};if(t==='case_open'){tone(800,.12,.08);setTimeout(()=>tone(1100,.08,.05),150);}if(t==='case_scroll')tone(1500,.02,.03);if(t==='legendary'){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.25,.1),i*100));}if(t==='sell'){tone(1200,.06,.06);setTimeout(()=>tone(800,.06,.06),60);}}};

    // Скины
    const ALL_SKINS=[{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},{name:"★ Керамбит | Doppler Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"★ Butterfly Knife | Fade",rarity:"legendary",icon:"🦋",price:2200},{name:"★ Sport Gloves | Vice",rarity:"legendary",icon:"🧤",price:3200},{name:"AK-47 | Vulcan",rarity:"epic",icon:"🌋",price:145},{name:"M4A1-S | Cyrex",rarity:"epic",icon:"🔴",price:48},{name:"AWP | Asiimov",rarity:"epic",icon:"🤖",price:85},{name:"AK-47 | Redline",rarity:"rare",icon:"🔴",price:42},{name:"AWP | Redline",rarity:"rare",icon:"🔴",price:35},{name:"Glock-18 | Water Elemental",rarity:"rare",icon:"💧",price:15},{name:"M4A1-S | Nitro",rarity:"uncommon",icon:"💨",price:3.5},{name:"AK-47 | Blue Laminate",rarity:"uncommon",icon:"🔷",price:5},{name:"AWP | Safari Mesh",rarity:"uncommon",icon:"🦒",price:2},{name:"MP9 | Sand Dashed",rarity:"common",icon:"🏜️",price:0.15},{name:"Nova | Forest Leaves",rarity:"common",icon:"🍃",price:0.12}];
    
    const CASES=[{id:'premium',name:'👑 Премиум',icon:'👑',price:350,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary'),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,3)]},{id:'standard',name:'📦 Стандартный',icon:'📦',price:80,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(2,4),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='rare'),...ALL_SKINS.filter(s=>s.rarity==='uncommon')]},{id:'starter',name:'🚀 Стартовый',icon:'🚀',price:25,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(1,3),...ALL_SKINS.filter(s=>s.rarity==='rare'),...ALL_SKINS.filter(s=>s.rarity==='uncommon'),...ALL_SKINS.filter(s=>s.rarity==='common')]},{id:'yolo',name:'💀 YOLO',icon:'💀',price:100,skins:[{name:"★ Керамбит | Doppler Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},...ALL_SKINS.filter(s=>s.rarity==='common')]}];

    let balance=1000,inventory=[],idCounter=0,isSpinning=!1,multiSpinCount=5,currentCaseIndex=0,currentUser=null;
    const MINI_CARD_WIDTH=93;
    const $=id=>document.getElementById(id);

    function getRandomItem(cs){if(CASES[currentCaseIndex].id==='yolo'){const r=Math.random()*100;if(r<1)return cs.find(s=>s.name.includes('Sapphire'));if(r<5)return cs.find(s=>s.name.includes('Dragon Lore'));return cs.filter(s=>s.rarity==='common')[Math.floor(Math.random()*cs.filter(s=>s.rarity==='common').length)];}const w={legendary:CASES[currentCaseIndex].id==='premium'?5:1,epic:15,rare:30,uncommon:30,common:CASES[currentCaseIndex].id==='premium'?20:24};const r=Math.random()*100;let cum=0;for(const[ra,wt]of Object.entries(w)){cum+=wt;if(r<=cum){const p=cs.filter(s=>s.rarity===ra);if(p.length)return p[Math.floor(Math.random()*p.length)];}}return cs[Math.floor(Math.random()*cs.length)];}

    function createRouletteElement(index,winSkin,caseSkins){const rd=document.createElement('div');rd.className='single-roulette-item';rd.innerHTML=`<div class="roulette-number">#${index+1}</div><div class="mini-pointer"></div><div class="mini-tape"></div>`;const te=rd.querySelector('.mini-tape');for(let i=0;i<40;i++){let item=(i===32&&winSkin)?winSkin:getRandomItem(caseSkins);const c=document.createElement('div');c.className='mini-skin-card rarity-'+item.rarity;c.innerHTML=`<div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">${item.price.toFixed(2)} ₽</div>`;te.appendChild(c);}return{rouletteDiv:rd,tapeEl:te};}
    
    function spinSingleRoulette(rouletteEl,tapeEl){return new Promise(resolve=>{const ww=rouletteEl.offsetWidth,targetLeft=-(32*MINI_CARD_WIDTH)+(ww/2)-(MINI_CARD_WIDTH/2);tapeEl.style.transition='none';tapeEl.style.transform='translateX(0px)';setTimeout(()=>{tapeEl.style.transition='transform 3.5s cubic-bezier(0.06,0.84,0.16,1)';tapeEl.style.transform=`translateX(${targetLeft+(Math.random()*30-15)}px)`;let sc=0;const si=setInterval(()=>{SoundFX.play('case_scroll');sc++;if(sc>20)clearInterval(si);},150);setTimeout(()=>{clearInterval(si);resolve();},3600);},50);});}

    async function performSpin(count){if(!currentUser){alert('❌ Сначала войди в аккаунт!');showRegisterModal();return;}if(isSpinning)return;const c=CASES[currentCaseIndex],totalCost=c.price*count;if(balance<totalCost){alert(`❌ Нужно ${totalCost} ₽`);return;}isSpinning=!0;$('openBtn').disabled=!0;balance-=totalCost;updateBalanceUI();SoundFX.play('case_open');const wins=[];for(let i=0;i<count;i++)wins.push(getRandomItem(c.skins));$('allRoulettes').innerHTML='';const rd=[];for(let i=0;i<count;i++){const r=createRouletteElement(i,wins[i],c.skins);$('allRoulettes').appendChild(r.rouletteDiv);rd.push(r);}await Promise.all(rd.map(r=>spinSingleRoulette(r.rouletteDiv,r.tapeEl)));wins.forEach(ws=>{inventory.push({...ws,id:idCounter++});if(ws.rarity==='legendary')SoundFX.play('legendary');});renderAllInventory();saveGame();isSpinning=!1;$('openBtn').disabled=!1;}

    function renderCases(){$('caseSelector').innerHTML='';CASES.forEach((c,i)=>{const d=document.createElement('div');d.className=`case-option ${i===currentCaseIndex?'active':''}`;d.innerHTML=`<span class="case-icon">${c.icon}</span><div class="case-name">${c.name}</div><div class="case-price">${c.price} ₽</div><div class="case-skins">${c.skins.length} скинов</div>`;d.addEventListener('click',()=>{currentCaseIndex=i;renderCases();updateCaseUI();});$('caseSelector').appendChild(d);});updateCaseUI();}
    function updateCaseUI(){const c=CASES[currentCaseIndex];$('caseName').textContent=c.icon+' '+c.name;$('casePrice').textContent=c.price;}
    function renderAllInventory(){$('invCount').textContent=inventory.length;$('invTotalCount').textContent=inventory.length;$('invTotalPrice').textContent=inventory.reduce((s,i)=>s+i.price,0).toFixed(2);if(inventory.length===0)$('inventoryGrid').innerHTML='<div class="empty-inv"><i>📦</i>Инвентарь пуст</div>';else{$('inventoryGrid').innerHTML='';inventory.forEach(i=>{const d=document.createElement('div');d.className='inv-item rarity-'+i.rarity;d.innerHTML=`<span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price.toFixed(2)} ₽</div><button class="btn-sell" onclick="sellItem(${i.id})">Продать</button>`;$('inventoryGrid').appendChild(d);});}}
    function sellItem(id){const idx=inventory.findIndex(i=>i.id===id);if(idx===-1)return;balance+=inventory[idx].price;updateBalanceUI();inventory.splice(idx,1);renderAllInventory();SoundFX.play('sell');saveGame();}
    function updateBalanceUI(){$('balanceDisplay').textContent=balance.toFixed(0);}

    // Регистрация
    function getUsersDB(){const db=localStorage.getItem('skinVault_users_db');return db?JSON.parse(db):{};}
    function saveUsersDB(db){localStorage.setItem('skinVault_users_db',JSON.stringify(db));}
    function hashPassword(pw){let h=0;for(let i=0;i<pw.length;i++){const c=pw.charCodeAt(i);h=((h<<5)-h)+c;h=h&h;}return'h_'+Math.abs(h).toString(16);}
    function loadUserData(username){const db=getUsersDB(),ud=db[username];if(ud&&ud.saveData){balance=ud.saveData.balance||1000;inventory=ud.saveData.inventory||[];idCounter=ud.saveData.idCounter||0;currentUser=username;renderAllInventory();updateBalanceUI();$('registerBtn').style.display='none';$('userInfo').style.display='flex';$('userNickname').textContent='👑 '+username;return!0;}return!1;}
    function saveGame(){if(!currentUser)return;const db=getUsersDB();if(!db[currentUser])db[currentUser]={password:'',saveData:{}};db[currentUser].saveData={balance,inventory,idCounter};saveUsersDB(db);}

    function showRegisterModal(){
        const old=$('registerModal');if(old)old.remove();
        const m=document.createElement('div');m.id='registerModal';
        m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;';
        m.innerHTML=`<div style="background:#141824;padding:40px;border-radius:24px;text-align:center;max-width:380px;width:90%;"><h2 style="margin-bottom:20px;">⭐ SKINVAULT</h2><input type="text" id="loginUsername" placeholder="Логин" style="width:100%;padding:12px;margin-bottom:10px;background:#0a0c16;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px;"><input type="password" id="loginPassword" placeholder="Пароль" style="width:100%;padding:12px;margin-bottom:15px;background:#0a0c16;border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px;"><button onclick="loginUser()" style="width:100%;padding:14px;background:#ff6a00;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;margin-bottom:10px;">🔑 ВОЙТИ</button><button onclick="registerUser()" style="width:100%;padding:14px;background:#7b2fbe;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;">✅ РЕГИСТРАЦИЯ</button><div id="authError" style="color:#ff4444;font-size:13px;margin-top:12px;display:none;"></div><button onclick="document.getElementById('registerModal').remove()" style="margin-top:15px;background:transparent;border:none;color:rgba(255,255,255,0.3);cursor:pointer;">✕ Закрыть</button></div>`;
        document.body.appendChild(m);
        $('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')loginUser();});
        m.addEventListener('click',e=>{if(e.target===m)m.remove();});
    }

    function loginUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни все поля!';err.style.display='block';return;}const db=getUsersDB();if(!db[u]){registerUserDirect(u,p);return;}if(db[u].password!==hashPassword(p)){err.textContent='❌ Неверный пароль!';err.style.display='block';return;}$('registerModal').remove();loadUserData(u);localStorage.setItem('skinVault_lastUser',u);}
    function registerUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни все поля!';err.style.display='block';return;}if(u.length<3){err.textContent='❌ Логин минимум 3 символа!';err.style.display='block';return;}if(p.length<4){err.textContent='❌ Пароль минимум 4 символа!';err.style.display='block';return;}registerUserDirect(u,p);}
    function registerUserDirect(u,p){const db=getUsersDB();if(db[u]&&db[u].password){alert('❌ Логин занят!');return;}db[u]={password:hashPassword(p),saveData:{balance:1000,inventory:[],idCounter:0}};saveUsersDB(db);$('registerModal').remove();loadUserData(u);localStorage.setItem('skinVault_lastUser',u);}
    function logoutUser(){saveGame();currentUser=null;$('registerBtn').style.display='block';$('userInfo').style.display='none';balance=1000;inventory=[];idCounter=0;renderAllInventory();updateBalanceUI();}

    function initGame(){
        const lastUser=localStorage.getItem('skinVault_lastUser');
        if(lastUser){const db=getUsersDB();if(db[lastUser])loadUserData(lastUser);}
        renderCases();renderAllInventory();updateBalanceUI();
        $('openBtn').addEventListener('click',()=>performSpin(multiSpinCount));
        document.querySelectorAll('.multi-spin-btn').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.multi-spin-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');multiSpinCount=parseInt(this.dataset.count);$('spinCountDisplay').textContent=multiSpinCount;}));
        document.querySelectorAll('.tab-btn').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));$('tab-'+this.dataset.tab).classList.add('active');}));
        document.addEventListener('click',()=>SoundFX.init(),{once:!0});
    }

    setInterval(()=>{if(currentUser)saveGame();},10000);
    initGame();
    </script>
</body>
</html>
