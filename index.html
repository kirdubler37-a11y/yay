<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CaseNova</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Montserrat,sans-serif;
}

body{

background:#0f1117;
color:white;

}

header{

height:75px;
background:#181c27;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 40px;
border-bottom:2px solid orange;

}

.logo{

font-size:28px;
font-weight:800;
color:orange;

}

.balance{

background:#232837;
padding:12px 25px;
border-radius:10px;
font-weight:bold;
font-size:20px;

}

nav{

display:flex;
gap:15px;

}

nav button{

background:#242938;
border:none;
color:white;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
transition:.2s;

}

nav button:hover{

background:orange;

}

.hero{

padding:60px;
text-align:center;

}

.hero h1{

font-size:55px;
margin-bottom:15px;

}

.hero p{

color:#888;
font-size:20px;

}

.cases{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
max-width:1400px;
margin:auto;

}

.case{

background:#1a1f2c;
border-radius:15px;
overflow:hidden;
transition:.25s;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,.4);

}

.case:hover{

transform:translateY(-8px);

}

.case img{

width:100%;
height:220px;
object-fit:cover;

}

.case-info{

padding:20px;

}

.case-name{

font-size:23px;
font-weight:700;

}

.price{

margin-top:10px;
font-size:20px;
color:orange;

}

.open{

margin-top:18px;
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff9800,#ff5f00);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;

}

.open:hover{

filter:brightness(1.1);

}

.inventory{

max-width:1400px;
margin:60px auto;
padding:20px;

}

.inventory h2{

margin-bottom:20px;

}

.inventory-grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;

}

.item{

background:#1b2231;
padding:15px;
border-radius:10px;
text-align:center;

}

.item img{

width:100%;
height:120px;
object-fit:contain;

}

footer{

margin-top:70px;
padding:30px;
text-align:center;
background:#181c27;
color:#666;

}

</style>

</head>

<body>

<header>

<div class="logo">CaseNova</div>

<nav>

<button>Главная</button>
<button>Кейсы</button>
<button>Апгрейд</button>
<button>Инвентарь</button>

</nav>

<div class="balance">

💰 Баланс:
<span id="balance">
5000
</span>
Фст.

</div>

</header>

<section class="hero">

<h1>Открывай кейсы</h1>

<p>

Выбивай самые дорогие скины и улучшай их.

</p>

</section>

<section class="cases">

<div class="case">

<img src="https://picsum.photos/400/300?1">

<div class="case-info">

<div class="case-name">

Новичок

</div>

<div class="price">

100 Фст

</div>

<button class="open">

Открыть

</button>

</div>

</div>

<div class="case">

<img src="https://picsum.photos/400/300?2">

<div class="case-info">

<div class="case-name">

Elite

</div>

<div class="price">

250 Фст

</div>

<button class="open">

Открыть

</button>

</div>

</div>

<div class="case">

<img src="https://picsum.photos/400/300?3">

<div class="case-info">

<div class="case-name">

Legend

</div>

<div class="price">

500 Фст

</div>

<button class="open">

Открыть

</button>

</div>

</div>

<div class="case">

<img src="https://picsum.photos/400/300?4">

<div class="case-info">

<div class="case-name">

Dragon

</div>

<div class="price">

1000 Фст

</div>

<button class="open">

Открыть

</button>

</div>

</div>

</section>

<section class="inventory">

<h2>

🎒 Инвентарь

</h2>

<div class="inventory-grid" id="inventory">

</div>

</section>

<footer>

CaseNova © 2026

</footer>

<script>

let balance=5000;

const inventory=[];

</script>

</body>

</html>
