<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseBattle | Кейсы + Инвентарь</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #12131a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 30px;
            padding: 15px 25px;
            background: #1a1c24;
            border-radius: 10px;
            border-bottom: 3px solid #ff9d00;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
        }
        .logo span { color: #ff9d00; }
        .balance {
            font-size: 20px;
            font-weight: bold;
            color: #ff9d00;
        }
        .balance i { margin-right: 8px; }
        .balance span { color: #fff; }

        /* ВКЛАДКИ */
        .tabs {
            display: flex;
            gap: 10px;
            max-width: 1100px;
            margin: 0 auto 20px;
        }
        .tab-btn {
            background: #1a1c24;
            border: none;
            color: #8895aa;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Arial', sans-serif;
        }
        .tab-btn:hover { background: #2d313f; color: #fff; }
        .tab-btn.active {
            background: #ff9d00;
            color: #12131a;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* КЕЙС */
        .case-container {
            max-width: 700px;
            margin: 0 auto;
            background: #1a1c24;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .case-container h3 {
            font-size: 22px;
            margin-bottom: 5px;
        }
        .case-container .sub {
            color: #8895aa;
            margin-bottom: 15px;
        }
        .case-container .price-tag {
            color: #ff9d00;
            font-weight: bold;
            font-size: 18px;
        }

        /* РУЛЕТКА (как в твоём примере) */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 130px;
            background: #111217;
            margin: 20px auto;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #2d313f;
        }
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #ff9d00;
            z-index: 10;
            box-shadow: 0 0 15px #ff9d00;
        }
        .roulette-tape {
            display: flex;
            position: absolute;
            left: 0;
            top: 10px;
            transition: transform 4s cubic-bezier(0.1, 1, 0.1, 1);
            will-change: transform;
        }
        .skin-card {
            width: 110px;
            height: 110px;
            margin: 0 5px;
            background: #1e202b;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            padding: 5px;
            box-sizing: border-box;
            border-bottom: 4px solid #fff;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .skin-card .icon {
            font-size: 36px;
            margin-bottom: 4px;
        }
        .skin-card .name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            font-size: 11px;
        }
        .skin-card .price {
            font-size: 10px;
            color: #8895aa;
            margin-top: 2px;
        }

        /* Редкости */
        .rarity-legendary { border-bottom-color: #eb4b4b; background: linear-gradient(180deg, #1e202b 60%, rgba(235,75,75,0.15)); }
        .rarity-epic { border-bottom-color: #d32ce6; background: linear-gradient(180deg, #1e202b 60%, rgba(211,44,230,0.15)); }
        .rarity-rare { border-bottom-color: #8847ff; background: linear-gradient(180deg, #1e202b 60%, rgba(136,71,255,0.15)); }
        .rarity-uncommon { border-bottom-color: #4b69ff; background: linear-gradient(180deg, #1e202b 60%, rgba(75,105,255,0.15)); }
        .rarity-common { border-bottom-color: #6b7a8a; background: linear-gradient(180deg, #1e202b 60%, rgba(107,122,138,0.15)); }

        /* Кнопка */
        .btn-open {
            background: linear-gradient(135deg, #ff9d00, #ed6c02);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(237,108,2,0.4);
            transition: 0.2s;
            font-family: 'Arial', sans-serif;
            width: 100%;
            max-width: 300px;
            margin: 10px auto 0;
            display: block;
        }
        .btn-open:hover { transform: scale(1.03); }
        .btn-open:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ИНВЕНТАРЬ */
        .inventory-section {
            max-width: 1100px;
            margin: 30px auto 0;
            background: #1a1c24;
            padding: 25px;
            border-radius: 12px;
        }
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .inventory-header h3 {
            font-size: 20px;
        }
        .inventory-header .stats {
            color: #8895aa;
            font-size: 14px;
        }
        .inventory-header .stats strong {
            color: #fff;
        }
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }
        .inventory-grid::-webkit-scrollbar { width: 4px; }
        .inventory-grid::-webkit-scrollbar-track { background: #1a1c24; }
        .inventory-grid::-webkit-scrollbar-thumb { background: #ff9d00; border-radius: 8px; }

        .inv-item {
            background: #1e202b;
            border-radius: 8px;
            padding: 12px 10px;
            text-align: center;
            border-bottom: 4px solid #6b7a8a;
            transition: 0.2s;
        }
        .inv-item:hover { transform: translateY(-3px); border-color: #ff9d00; }
        .inv-item .icon { font-size: 32px; display: block; margin-bottom: 4px; }
        .inv-item .name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-item .price { font-size: 11px; color: #8895aa; margin: 4px 0 8px; }
        .btn-sell {
            background: #2d313f;
            border: none;
            color: #fff;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Arial', sans-serif;
        }
        .btn-sell:hover { background: #ff9d00; color: #12131a; }
        .empty-inv {
            grid-column: 1 / -1;
            color: #5a677a;
            text-align: center;
            padding: 40px 20px;
            font-size: 16px;
        }
        .empty-inv i { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.4; }

        @media (max-width: 640px) {
            .skin-card { width: 80px; height: 90px; }
            .skin-card .icon { font-size: 28px; }
            .roulette-wrapper { height: 110px; }
            .inventory-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-box-open"></i> CASE-<span>BATTLE</span></div>
        <div class="balance"><i class="fas fa-coins"></i> <span id="balanceDisplay">1000</span></div>
    </header>

    <!-- ВКЛАДКИ -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="case"><i class="fas fa-gem"></i> Кейс</button>
        <button class="tab-btn" data-tab="inventory"><i class="fas fa-backpack"></i> Инвентарь (<span id="invCount">0</span>)</button>
    </div>

    <!-- ВКЛАДКА: КЕЙС -->
    <div class="tab-content active" id="tab-case">
        <div class="case-container">
            <h3>🔥 КЕЙС «ЛУЧШИЙ ВЫБОР»</h3>
            <div class="sub">Стоимость открытия: <span class="price-tag">50</span></div>
            
            <div class="roulette-wrapper">
                <div class="pointer"></div>
                <div class="roulette-tape" id="tape"></div>
            </div>

            <button class="btn-open" id="openBtn"><i class="fas fa-key"></i> ОТКРЫТЬ КЕЙС</button>
        </div>
    </div>

    <!-- ВКЛАДКА: ИНВЕНТАРЬ -->
    <div class="tab-content" id="tab-inventory">
        <div class="inventory-section">
            <div class="inventory-header">
                <h3><i class="fas fa-backpack"></i> Инвентарь</h3>
                <div class="stats">
                    Предметов: <strong id="invTotalCount">0</strong> &nbsp;|&nbsp; Стоимость: <strong id="invTotalPrice">0.00</strong> $
                </div>
            </div>
            <div class="inventory-grid" id="inventoryGrid">
                <div class="empty-inv">
                    <i class="fas fa-box-open"></i>
                    Инвентарь пуст<br>
                    <span style="font-size:13px; color:#5a677a;">Открой кейс, чтобы получить скины</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        // ----- КОНФИГ СКИНОВ -----
        const SKINS = [
            { name: "AWP | Dragon Lore", rarity: "legendary", icon: "👑", price: 120.00 },
            { name: "M4A4 | Howl", rarity: "legendary", icon: "🐺", price: 89.99 },
            { name: "Керамбит | Градиент", rarity: "legendary", icon: "🔪", price: 150.00 },
            { name: "AK-47 | Вулканический", rarity: "epic", icon: "🔥", price: 45.90 },
            { name: "Desert Eagle | Код красный", rarity: "epic", icon: "🔫", price: 38.50 },
            { name: "Glock-18 | Королева", rarity: "rare", icon: "👸", price: 22.00 },
            { name: "USP-S | Сайрекс", rarity: "rare", icon: "⚡", price: 18.75 },
            { name: "M4A1-S | Взгляд", rarity: "uncommon", icon: "👁️", price: 8.75 },
            { name: "MP9 | Зелёный", rarity: "common", icon: "🔫", price: 2.50 },
            { name: "MAG-7 | Медь", rarity: "common", icon: "🔫", price: 3.20 },
        ];

        const RARITY_WEIGHTS = {
            legendary: 2,
            epic: 5,
            rare: 15,
            uncommon: 30,
            common: 48,
        };

        // ----- СОСТОЯНИЕ -----
        let balance = 1000;
        const OPEN_COST = 50;
        let inventory = [];
        let idCounter = 0;
        let isSpinning = false;

        // DOM
        const tape = document.getElementById('tape');
        const openBtn = document.getElementById('openBtn');
        const balanceSpan = document.getElementById('balanceDisplay');
        const inventoryGrid = document.getElementById('inventoryGrid');
        const invCount = document.getElementById('invCount');
        const invTotalCount = document.getElementById('invTotalCount');
        const invTotalPrice = document.getElementById('invTotalPrice');

        const CARD_WIDTH = 120; // ширина карточки + margin

        // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
        function getRandomItem() {
            const rarityKeys = Object.keys(RARITY_WEIGHTS);
            const totalWeight = rarityKeys.reduce((sum, k) => sum + RARITY_WEIGHTS[k], 0);
            let rand = Math.random() * totalWeight;
            let selectedRarity = 'common';
            for (const key of rarityKeys) {
                rand -= RARITY_WEIGHTS[key];
                if (rand <= 0) { selectedRarity = key; break; }
            }
            const pool = SKINS.filter(item => item.rarity === selectedRarity);
            return pool.length ? pool[Math.floor(Math.random() * pool.length)] : SKINS[0];
        }

        // Генерация ленты из 40 скинов
        function generateTapeItems(winSkin = null) {
            tape.innerHTML = '';
            const count = 40;
            const items = [];
            
            // Если есть победный скин — вставляем его на позицию 32
            const winIndex = 32;
            for (let i = 0; i < count; i++) {
                if (i === winIndex && winSkin) {
                    items.push(winSkin);
                } else {
                    items.push(getRandomItem());
                }
            }

            // Если победного нет — просто случайные
            if (!winSkin) {
                for (let i = 0; i < count; i++) {
                    items[i] = getRandomItem();
                }
            }

            // Рендерим
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = `skin-card rarity-${item.rarity}`;
                card.innerHTML = `
                    <div class="icon">${item.icon}</div>
                    <div class="name">${item.name}</div>
                    <div class="price">$${item.price.toFixed(2)}</div>
                `;
                tape.appendChild(card);
            });

            return { items, winIndex };
        }

        // ----- ОБНОВЛЕНИЕ ИНВЕНТАРЯ -----
        function renderInventory() {
            invCount.textContent = inventory.length;
            invTotalCount.textContent = inventory.length;
            const total = inventory.reduce((sum, item) => sum + item.price, 0);
            invTotalPrice.textContent = total.toFixed(2);

            if (inventory.length === 0) {
                inventoryGrid.innerHTML = `
                    <div class="empty-inv">
                        <i class="fas fa-box-open"></i>
                        Инвентарь пуст<br>
                        <span style="font-size:13px; color:#5a677a;">Открой кейс, чтобы получить скины</span>
                    </div>
                `;
                return;
            }

            inventoryGrid.innerHTML = '';
            inventory.forEach(item => {
                const div = document.createElement('div');
                div.className = `inv-item rarity-${item.rarity}`;
                div.innerHTML = `
                    <span class="icon">${item.icon}</span>
                    <div class="name">${item.name}</div>
                    <div class="price">$${item.price.toFixed(2)}</div>
                    <button class="btn-sell" data-id="${item.id}"><i class="fas fa-dollar-sign"></i> Продать</button>
                `;
                inventoryGrid.appendChild(div);
            });

            // Обработчики продажи
            document.querySelectorAll('.btn-sell').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    sellItem(id);
                });
            });
        }

        // ----- ПРОДАЖА -----
        function sellItem(id) {
            const index = inventory.findIndex(item => item.id === id);
            if (index === -1) return;
            const item = inventory[index];
            balance += item.price;
            updateBalanceUI();
            inventory.splice(index, 1);
            renderInventory();
            
            // Визуальный фидбек
            openBtn.textContent = `💰 +$${item.price.toFixed(2)}`;
            setTimeout(() => {
                openBtn.innerHTML = '<i class="fas fa-key"></i> ОТКРЫТЬ КЕЙС';
            }, 800);
        }

        // ----- ОБНОВЛЕНИЕ БАЛАНСА -----
        function updateBalanceUI() {
            balanceSpan.textContent = balance.toFixed(0);
        }

        // ----- ОСНОВНАЯ ЛОГИКА ОТКРЫТИЯ (как в твоём примере) -----
        function openCase() {
            if (isSpinning) return;
            if (balance < OPEN_COST) {
                alert('❌ Недостаточно средств!');
                return;
            }

            // Списываем деньги
            balance -= OPEN_COST;
            updateBalanceUI();

            isSpinning = true;
            openBtn.disabled = true;
            openBtn.textContent = '🎰 КРУТИМ...';

            // Выбираем победный скин
            const winSkin = getRandomItem();

            // Сбрасываем ленту в начальное положение
            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';

            // Генерируем новую ленту с победным скином на позиции 32
            generateTapeItems(winSkin);

            // Вычисляем сдвиг, чтобы победный скин оказался по центру
            const wrapper = document.querySelector('.roulette-wrapper');
            const wrapperWidth = wrapper.offsetWidth;
            const winIndex = 32;
            const targetLeft = -(winIndex * CARD_WIDTH) + (wrapperWidth / 2) - (CARD_WIDTH / 2);

            // Запускаем анимацию
            setTimeout(() => {
                tape.style.transition = 'transform 4s cubic-bezier(0.1, 1, 0.1, 1)';
                const innerRandom = (Math.random() * 40) - 20; // небольшой разброс
                tape.style.transform = `translateX(${targetLeft + innerRandom}px)`;
            }, 50);

            // Когда анимация завершилась
            setTimeout(() => {
                // Добавляем в инвентарь
                const newItem = {
                    ...winSkin,
                    id: idCounter++
                };
                inventory.push(newItem);
                renderInventory();

                isSpinning = false;
                openBtn.disabled = false;
                openBtn.innerHTML = '<i class="fas fa-key"></i> ОТКРЫТЬ КЕЙС';
            }, 4200);
        }

        // ----- ВКЛАДКИ (TABS) -----
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = {
                case: document.getElementById('tab-case'),
                inventory: document.getElementById('tab-inventory')
            };

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    const target = this.dataset.tab;
                    Object.keys(contents).forEach(key => {
                        contents[key].classList.toggle('active', key === target);
                    });
                });
            });
        }

        // ----- ДЕБАГ: ПОПОЛНЕНИЕ БАЛАНСА -----
        window.setBalance = (amount) => {
            balance = amount;
            updateBalanceUI();
            console.log(`✅ Баланс: ${balance}`);
        };

        // ----- ИНИЦИАЛИЗАЦИЯ -----
        function init() {
            // Стартовая лента
            generateTapeItems();
            
            // Добавляем демо-скины в инвентарь
            const demoItems = [
                { ...SKINS[2], id: idCounter++ },
                { ...SKINS[5], id: idCounter++ },
                { ...SKINS[7], id: idCounter++ },
            ];
            inventory = demoItems;
            renderInventory();
            updateBalanceUI();

            setupTabs();
            openBtn.addEventListener('click', openCase);
        }

        init();
    })();
    </script>
</body>
</html>
