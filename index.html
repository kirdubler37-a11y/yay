<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CaseNova</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{

background:#0f1117;
color:white;

}

header{

height:75px;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 40px;

background:#171b24;

border-bottom:2px solid orange;

}

.logo{

font-size:30px;
font-weight:800;
color:orange;

}

nav{

display:flex;
gap:15px;

}

nav button{

background:#252b39;
border:none;
color:white;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
transition:.2s;

}

nav button:hover{

background:orange;

}

.balance{

background:#252b39;

padding:12px 25px;

border-radius:10px;

font-size:20px;

font-weight:bold;

}

.hero{

text-align:center;

padding:60px 20px;

}

.hero h1{

font-size:55px;

margin-bottom:15px;

}

.hero p{

color:#8b8b8b;

font-size:20px;

}

.cases{

max-width:1400px;

margin:auto;

padding:40px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.case{

background:#1b2231;

border-radius:15px;

overflow:hidden;

transition:.25s;

cursor:pointer;

box-shadow:0 0 25px rgba(0,0,0,.4);

}

.case:hover{

transform:translateY(-8px);

}

.case-icon{

height:220px;

display:flex;

justify-content:center;

align-items:center;

font-size:100px;

background:linear-gradient(180deg,#2a3245,#1b2231);

transition:.3s;

}

.case:hover .case-icon{

transform:scale(1.08) rotate(6deg);

}

.case-info{

padding:20px;

}

.case-name{

font-size:24px;

font-weight:700;

}

.case-price{

margin-top:10px;

font-size:22px;

color:orange;

}

.open-btn{

width:100%;

margin-top:18px;

padding:14px;

border:none;

border-radius:10px;

background:linear-gradient(45deg,#ff9800,#ff6200);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}

.open-btn:hover{

transform:scale(1.03);

}

.inventory{

max-width:1400px;

margin:70px auto;

padding:20px;

}

.inventory h2{

margin-bottom:20px;

}

.inventory-grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(170px,1fr));

gap:15px;

}

.item{

background:#1b2231;

border-radius:10px;

padding:15px;

text-align:center;

}

.item-icon{

font-size:55px;

margin-bottom:10px;

}

footer{

margin-top:70px;

background:#171b24;

padding:30px;

text-align:center;

color:#777;

}

</style>

</head>

<body>

<header>

<div class="logo">

🎲 CaseNova

</div>

<nav>

<button>Главная</button>

<button>Кейсы</button>

<button>Апгрейд</button>

<button>Инвентарь</button>

</nav>

<div class="balance">

💰 <span id="balance">5000</span> Фст.

</div>

</header>

<section class="hero">

<h1>

Открывай лучшие кейсы

</h1>

<p>

Испытай удачу и выбей самые дорогие предметы.

</p>

</section>

<section class="cases">

<div class="case">

<div class="case-icon">

📦

</div>

<div class="case-info">

<div class="case-name">

Новичок

</div>

<div class="case-price">

100 Фст.

</div>

<button class="open-btn">

Открыть

</button>

</div>

</div>

<div class="case">

<div class="case-icon">

💎

</div>

<div class="case-info">

<div class="case-name">

Elite

</div>

<div class="case-price">

250 Фст.

</div>

<button class="open-btn">

Открыть

</button>

</div>

</div>

<div class="case">

<div class="case-icon">

🔥

</div>

<div class="case-info">

<div class="case-name">

Legend

</div>

<div class="case-price">

500 Фст.

</div>

<button class="open-btn">

Открыть

</button>

</div>

</div>

<div class="case">

<div class="case-icon">

👑

</div>

<div class="case-info">

<div class="case-name">

Dragon

</div>

<div class="case-price">

1000 Фст.

</div>

<button class="open-btn">

Открыть

</button>

</div>

</div>

</section>

<section class="inventory">

<h2>

🎒 Инвентарь

</h2>

<div class="inventory-grid" id="inventory">

<p style="color:#777">

Здесь будут выпадать ваши предметы...

</p>

</div>

</section>

<footer>

CaseNova © 2026

</footer>

<script>

let balance=5000;

const inventory=[];

</script>

</body>

</html>
