<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ SKINVAULT | Кейсы CS2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#050510;--card:rgba(15,18,28,0.9);--accent:#ff6a00;--accent2:#7b2fbe;--gold:#ffaa00;--red:#ff4444;--green:#4caf50;--text:#fff;--text2:rgba(255,255,255,0.5);--border:rgba(255,255,255,0.08);--radius:16px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(255,106,0,0.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(123,47,190,0.15) 0%,transparent 50%);overflow-x:hidden;display:flex}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}

        .live-feed{position:fixed;right:0;top:0;width:260px;height:100vh;background:rgba(10,12,22,0.95);backdrop-filter:blur(20px);border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column;padding:15px;overflow:hidden}
        .live-feed h3{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);text-align:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
        .live-feed-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
        .live-item{background:rgba(20,24,38,0.6);border-radius:8px;padding:7px 10px;font-size:11px;animation:slideIn 0.4s ease;border-left:3px solid transparent;display:flex;align-items:center;gap:8px}
        .live-item.legendary{border-left-color:#ff4444}.live-item.epic{border-left-color:#d32ce6}.live-item.rare{border-left-color:#8847ff}
        .live-item .live-icon{font-size:22px}.live-item .live-info{flex:1}.live-item .live-name{font-weight:600;font-size:10px}.live-item .live-user{color:var(--gold);font-size:9px}.live-item .live-price{color:var(--text2);font-size:9px}
        @keyframes slideIn{0%{transform:translateX(100%);opacity:0}100%{transform:translateX(0);opacity:1}}
        .main-content{flex:1;margin-right:260px;min-height:100vh;padding:20px}

        .online-bar{position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--card);backdrop-filter:blur(20px);padding:8px 20px;border-radius:25px;border:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600}
        .online-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 6px var(--green)}50%{box-shadow:0 0 18px var(--green)}}

        .header{position:relative;z-index:100;display:flex;justify-content:space-between;align-items:center;max-width:1000px;margin:60px auto 15px;padding:14px 24px;background:var(--card);backdrop-filter:blur(25px);border-radius:var(--radius);border:1px solid var(--border);flex-wrap:wrap;gap:10px}
        .logo{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent),#ff3c00,var(--accent2));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 3s ease infinite;cursor:pointer}
        @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .balance{display:flex;align-items:center;gap:8px;background:rgba(255,106,0,0.1);padding:8px 18px;border-radius:25px;border:1px solid rgba(255,106,0,0.2);font-weight:700;font-size:16px;color:var(--gold)}
        .balance i{font-size:18px;animation:coinSpin 4s linear infinite}
        @keyframes coinSpin{0%,100%{transform:rotateY(0deg)}50%{transform:rotateY(180deg)}}
        .btn{padding:8px 18px;border-radius:20px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:0.3s}
        .btn-purple{background:linear-gradient(135deg,var(--accent2),#5a1a8a);color:#fff}
        .btn-purple:hover{transform:translateY(-2px)}
        .btn-red{background:rgba(255,68,68,0.2);border:1px solid rgba(255,68,68,0.3);color:var(--red)}
        .btn-admin{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;font-weight:800}

        .nav{display:flex;gap:5px;max-width:1000px;margin:0 auto 15px;flex-wrap:wrap;background:rgba(15,18,28,0.7);backdrop-filter:blur(15px);border-radius:14px;padding:5px;border:1px solid var(--border)}
        .nav-btn{background:transparent;border:none;color:var(--text2);padding:8px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:0.3s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px}
        .nav-btn:hover{color:#fff;background:rgba(255,255,255,0.04)}
        .nav-btn.active{color:#fff;background:linear-gradient(135deg,rgba(255,106,0,0.25),rgba(123,47,190,0.15));border:1px solid rgba(255,106,0,0.2)}

        .page{display:none;animation:fadeSlide 0.4s ease}
        .page.active{display:block}
        @keyframes fadeSlide{0%{opacity:0;transform:translateY(15px)}100%{opacity:1;transform:translateY(0)}}

        .cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;max-width:1000px;margin:0 auto}
        .case-card{background:var(--card);backdrop-filter:blur(15px);border:2px solid var(--border);border-radius:var(--radius);padding:18px 12px;cursor:pointer;transition:0.3s;text-align:center}
        .case-card:hover{border-color:rgba(255,106,0,0.4);transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.4)}
        .case-card .case-icon{font-size:40px;display:block;margin-bottom:6px}
        .case-card .case-name{font-weight:700;font-size:13px}
        .case-card .case-price{color:var(--gold);font-size:14px;font-weight:700;margin-top:3px}

        /* СТРАНИЦА ОТКРЫТИЯ КЕЙСА */
        .case-page-container{max-width:800px;margin:0 auto;background:var(--card);backdrop-filter:blur(25px);padding:30px;border-radius:20px;border:1px solid var(--border);box-shadow:0 15px 60px rgba(0,0,0,0.6)}
        .back-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;padding:8px 18px;border-radius:18px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;margin-bottom:15px;font-size:13px}
        .back-btn:hover{background:rgba(255,255,255,0.1)}

        .roulette-wrapper{position:relative;width:100%;height:200px;background:rgba(8,10,18,0.9);margin:15px auto;overflow:hidden;border-radius:14px;border:1px solid var(--border);box-shadow:inset 0 0 40px rgba(0,0,0,0.5)}
        .roulette-wrapper::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,rgba(5,5,16,0.9) 0%,transparent 10%,transparent 90%,rgba(5,5,16,0.9) 100%);pointer-events:none;z-index:5}
        .roulette-pointer{position:absolute;top:0;left:50%;transform:translateX(-50%);width:4px;height:100%;background:linear-gradient(180deg,#ff6a00,#ffaa00,#ff6a00);z-index:10;box-shadow:0 0 25px #ff6a00,0 0 50px rgba(255,106,0,0.3);border-radius:2px}
        .roulette-tape{display:flex;position:absolute;left:0;top:18px;transition:transform 4s cubic-bezier(0.08,0.82,0.17,1);will-change:transform}
        .skin-card{width:115px;height:155px;margin:0 5px;background:rgba(20,24,38,0.9);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;padding:8px;border-bottom:4px solid rgba(255,255,255,0.1);flex-shrink:0;text-align:center}
        .skin-card .icon{font-size:42px;margin-bottom:6px}
        .skin-card .name{font-weight:600;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
        .skin-card .price{font-size:9px;color:var(--text2);margin-top:3px}
        .rarity-legendary{border-bottom-color:#ff4444!important;background:linear-gradient(180deg,rgba(20,24,38,0.9) 60%,rgba(255,68,68,0.15))!important;box-shadow:0 0 15px rgba(255,68,68,0.1)}
        .rarity-epic{border-bottom-color:#d32ce6!important;background:linear-gradient(180deg,rgba(20,24,38,0.9) 60%,rgba(211,44,230,0.15))!important}
        .rarity-rare{border-bottom-color:#8847ff!important}.rarity-uncommon{border-bottom-color:#4b69ff!important}.rarity-common{border-bottom-color:rgba(107,122,138,0.5)!important}

        .slider-container{display:flex;align-items:center;gap:12px;justify-content:center;margin:12px 0}
        .slider-container input[type=range]{flex:1;max-width:200px;accent-color:var(--accent);height:6px}
        .slider-value{color:var(--gold);font-weight:700;font-size:18px;min-width:35px;text-align:center}
        .btn-spin{background:linear-gradient(135deg,#ff6a00,#ff3c00);color:#fff;border:none;padding:16px 40px;font-size:17px;font-weight:700;border-radius:14px;cursor:pointer;box-shadow:0 6px 25px rgba(238,60,0,0.3);transition:0.3s;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:1px;width:100%;max-width:300px;margin:12px auto;display:block}
        .btn-spin:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(238,60,0,0.5)}
        .btn-spin:disabled{background:rgba(42,47,58,0.8);box-shadow:none;cursor:not-allowed;transform:none}

        .case-skins-pool{background:rgba(10,12,22,0.6);border-radius:12px;padding:15px;max-height:180px;overflow-y:auto;margin-top:10px}
        .case-skins-pool h4{color:var(--text2);font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
        .pool-item{display:inline-block;background:rgba(20,24,38,0.8);padding:5px 10px;border-radius:6px;font-size:10px;margin:2px;border-bottom:2px solid transparent}
        .pool-item.rarity-legendary{border-bottom-color:#ff4444}.pool-item.rarity-epic{border-bottom-color:#d32ce6}.pool-item.rarity-rare{border-bottom-color:#8847ff}

        .inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;max-height:400px;overflow-y:auto;padding:4px}
        .inv-item{background:rgba(20,24,38,0.8);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--border);transition:0.3s}
        .inv-item:hover{transform:translateY(-3px);border-color:var(--accent)}
        .inv-item .icon{font-size:32px;display:block;margin-bottom:3px}
        .inv-item .name{font-size:10px;font-weight:700}
        .inv-item .price{font-size:10px;color:var(--text2);margin:3px 0 6px}
        .btn-sm{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;margin:1px}
        .btn-sell{background:rgba(30,35,48,0.9);color:#fff;border:1px solid var(--border)}
        .btn-sell:hover{background:var(--accent);color:#000}

        .profile-section{max-width:800px;margin:0 auto;background:var(--card);backdrop-filter:blur(25px);padding:25px;border-radius:var(--radius);border:1px solid var(--border)}
        .history-list{max-height:300px;overflow-y:auto}
        .history-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(20,24,38,0.5);border-radius:8px;margin-bottom:4px;font-size:11px}
        .history-item .icon{font-size:22px}.history-item .details{flex:1}.history-item .time{color:var(--text2);font-size:9px}

        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center}
        .modal{background:#141824;padding:30px;border-radius:20px;text-align:center;max-width:400px;width:90%;border:1px solid var(--border)}
        .modal input{width:100%;padding:12px;margin-bottom:10px;background:#0a0c16;border:1px solid var(--border);border-radius:10px;color:#fff;font-size:15px;font-family:'Inter',sans-serif}
        .admin-panel{background:linear-gradient(135deg,rgba(255,215,0,0.1),rgba(255,170,0,0.05));border:2px solid var(--gold);border-radius:var(--radius);padding:20px;margin-bottom:20px}

        @media(max-width:768px){.live-feed{width:200px}.main-content{margin-right:200px}.skin-card{width:85px;height:120px}.skin-card .icon{font-size:30px}.roulette-wrapper{height:140px}.cases-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
    </style>
</head>
<body>

<div class="live-feed" id="liveFeed">
    <h3>🔥 Live Drop</h3>
    <div class="live-feed-list" id="liveFeedList"><div style="color:var(--text2);text-align:center;padding:20px;">Ожидание...</div></div>
</div>

<div class="main-content">

<div class="online-bar"><div class="online-dot"></div><span>Онлайн: <strong id="onlineCount" style="color:#4caf50;">0</strong></span></div>

<div class="header">
    <div class="logo" onclick="navigateTo('cases')">⭐ SKINVAULT</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="balance"><i class="fas fa-coins"></i> <span id="balanceDisplay">1000</span></div>
        <button class="btn btn-purple" id="registerBtn" onclick="showRegisterModal()">👤 Войти</button>
        <div id="userInfo" style="display:none;align-items:center;gap:8px;">
            <span style="color:#ffaa00;font-weight:700;" id="userNickname"></span>
            <button class="btn btn-red" onclick="logoutUser()" style="padding:6px 12px;font-size:11px;">🚪</button>
        </div>
        <button class="btn btn-admin" id="adminBtn" style="display:none;" onclick="showAdminPanel()">⚡ Админ</button>
    </div>
</div>

<div class="nav">
    <button class="nav-btn active" data-page="cases">💎 Кейсы</button>
    <button class="nav-btn" data-page="inventory">🎒 Инвентарь</button>
    <button class="nav-btn" data-page="upgrade">⚡ Апгрейд</button>
    <button class="nav-btn" data-page="contract">📜 Контракт</button>
    <button class="nav-btn" data-page="profile">👤 Профиль</button>
</div>

<div class="page active" id="page-cases"><div class="cases-grid" id="casesGrid"></div></div>

<div class="page" id="page-case-open">
    <div class="case-page-container">
        <button class="back-btn" onclick="navigateTo('cases')">← Назад к кейсам</button>
        <h2 id="caseOpenTitle" style="font-family:'Orbitron',sans-serif;font-size:20px;margin-bottom:8px;"></h2>
        <div style="color:var(--text2);margin-bottom:10px;">Стоимость: <span id="caseOpenPrice" style="color:var(--gold);font-weight:700;"></span> <i class="fas fa-coins"></i></div>
        
        <!-- РУЛЕТКА -->
        <div class="roulette-wrapper" id="rouletteContainer">
            <div class="roulette-pointer"></div>
            <div class="roulette-tape" id="rouletteTape"></div>
        </div>
        
        <!-- ПОЛЗУНОК + КНОПКА -->
        <div class="slider-container">
            <span style="color:var(--text2);">Открытий:</span>
            <input type="range" id="spinSlider" min="1" max="50" value="5" oninput="updateSlider()">
            <span class="slider-value" id="spinCountDisplay">5</span>
        </div>
        <button class="btn-spin" id="openBtn">🔑 КРУТИТЬ</button>
        <div id="totalResult" style="text-align:center;font-weight:700;font-size:14px;display:none;margin-top:10px;"></div>
        
        <!-- ПУЛ СКИНОВ -->
        <div class="case-skins-pool">
            <h4>Скины в кейсе:</h4>
            <div id="poolContent"></div>
        </div>
    </div>
</div>

<div class="page" id="page-inventory">
    <div class="profile-section">
        <h2 style="margin-bottom:15px;">🎒 Инвентарь</h2>
        <div style="margin-bottom:12px;color:var(--text2);">Предметов: <strong id="invTotalCount" style="color:#fff;">0</strong> | Стоимость: <strong id="invTotalPrice" style="color:#fff;">0</strong> <i class="fas fa-coins"></i></div>
        <div class="inventory-grid" id="inventoryGrid"><div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:40px;">📦 Инвентарь пуст</div></div>
    </div>
</div>

<div class="page" id="page-upgrade">
    <div class="profile-section">
        <h2 style="margin-bottom:15px;">⚡ Апгрейд оружия</h2>
        <div style="display:flex;gap:6px;justify-content:center;margin-bottom:15px;" id="chanceSelector">
            <button class="btn-sm btn-sell active" data-chance="50" data-mult="2">50% ×2</button>
            <button class="btn-sm btn-sell" data-chance="25" data-mult="4">25% ×4</button>
            <button class="btn-sm btn-sell" data-chance="75" data-mult="1.33">75% ×1.33</button>
            <button class="btn-sm btn-sell" data-chance="10" data-mult="10">10% ×10</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:15px;margin-bottom:15px;">
            <div style="background:rgba(10,12,22,0.8);border-radius:12px;padding:15px;text-align:center;"><div style="color:var(--text2);">📦 ВХОД</div><div id="upgradeInputSkins" style="min-height:60px;"></div><div style="margin-top:8px;">Сумма: <span id="upgradeInputTotal" style="color:var(--gold);">0</span> <i class="fas fa-coins"></i></div></div>
            <div style="display:flex;align-items:center;font-size:35px;">⚡</div>
            <div style="background:rgba(10,12,22,0.8);border-radius:12px;padding:15px;text-align:center;"><div style="color:var(--text2);">🎯 РЕЗУЛЬТАТ</div><div id="upgradeResult"><div style="color:var(--text2);">Ожидание</div></div></div>
        </div>
        <div style="display:flex;gap:8px;justify-content:center;"><button class="btn-spin" id="upgradeBtn" disabled style="max-width:180px;padding:14px;">АПГРЕЙД</button><button class="btn btn-red" id="clearUpgradeBtn">Очистить</button></div>
        <div style="margin-top:15px;color:var(--text2);">Инвентарь:</div><div class="inventory-grid" id="upgradeInventoryGrid" style="max-height:200px;"></div>
    </div>
</div>

<div class="page" id="page-contract">
    <div class="profile-section">
        <h2 style="margin-bottom:15px;">📜 Контракты</h2>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px;padding:12px 16px;background:rgba(10,12,22,0.6);border-radius:12px;">
            <div>Выбрано: <strong id="contractCount">0</strong>/10</div><div>Сумма: <span id="contractTotalPrice" style="color:var(--gold);">0</span> <i class="fas fa-coins"></i></div><button class="btn btn-purple" id="contractBtn" disabled>КОНТРАКТ</button>
        </div>
        <div id="contractResult" style="display:none;padding:15px;background:rgba(76,175,80,0.1);border-radius:12px;text-align:center;margin-bottom:15px;"></div>
        <div class="inventory-grid" id="contractInventoryGrid" style="max-height:200px;"></div>
    </div>
</div>

<div class="page" id="page-profile">
    <div class="profile-section" id="profileContent"></div>
</div>

</div>

<!-- Модалки -->
<div class="modal-overlay" id="registerModal" style="display:none;">
    <div class="modal">
        <h2 style="margin-bottom:15px;">⭐ SKINVAULT</h2>
        <input type="text" id="loginUsername" placeholder="Логин">
        <input type="password" id="loginPassword" placeholder="Пароль">
        <button class="btn btn-purple" onclick="loginUser()" style="width:100%;margin-bottom:6px;background:var(--accent);">🔑 ВОЙТИ</button>
        <button class="btn btn-purple" onclick="registerUser()" style="width:100%;">✅ РЕГИСТРАЦИЯ</button>
        <div id="authError" style="color:#ff4444;font-size:12px;margin-top:8px;display:none;"></div>
        <button onclick="closeModal()" style="margin-top:10px;background:transparent;border:none;color:var(--text2);cursor:pointer;">✕ Закрыть</button>
    </div>
</div>

<div class="modal-overlay" id="adminModal" style="display:none;">
    <div class="modal" style="max-width:450px;">
        <h2 style="color:var(--gold);margin-bottom:15px;">⚡ Админ-панель</h2>
        <input type="text" id="adminTargetUser" placeholder="Ник получателя">
        <input type="number" id="adminAmount" placeholder="Сумма монет" min="1">
        <button class="btn btn-admin" onclick="adminGiveCoins()" style="width:100%;margin-bottom:8px;">💸 Выдать монеты</button>
        <div id="adminMsg" style="font-size:12px;margin-top:8px;"></div>
        <button onclick="document.getElementById('adminModal').style.display='none'" style="margin-top:10px;background:transparent;border:none;color:var(--text2);cursor:pointer;">✕ Закрыть</button>
    </div>
</div>

<script>
const fbCfg={apiKey:"AIzaSyCiJGNpJByCCbwcufI-NFUFzXjo0HeGd8E",authDomain:"skinvalut.firebaseapp.com",databaseURL:"https://skinvalut-default-rtdb.firebaseio.com",projectId:"skinvalut",storageBucket:"skinvalut.firebasestorage.app",messagingSenderId:"560114772930",appId:"1:560114772930:web:8aa0a87f3c791b27d6845b"};
firebase.initializeApp(fbCfg);
const fbDb=firebase.database(),onlineRef=fbDb.ref('online'),dropsRef=fbDb.ref('drops');
const myId='u_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
setInterval(()=>onlineRef.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP}),5000);

ilter(s=>s.rarity==='legendary').slice(4,5),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='common').slice(0,3)]},{id:'fracture',name:'💥 Fracture',icon:'💥',price:60,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(3,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='common').slice(0,3)]},{id:'pistol',name:'🔫 Пистолетный',icon:'🔫',price:50,skins:[...ALL_SKINS.filter(s=>s.name.includes('Desert')||s.name.includes('Glock')||s.name.includes('USP')||s.name.includes('P250')),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4)]},{id:'starter',name:'🚀 Стартовый',icon:'🚀',price:30,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,4),...ALL_SKINS.filter(s=>s.rarity==='rare'),...ALL_SKINS.filter(s=>s.rarity==='uncommon')]},{id:'budget',name:'💸 Бюджетный',icon:'💸',price:15,skins:[...ALL_SKINS.filter(s=>s.rarity==='rare').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='uncommon'),...ALL_SKINS.filter(s=>s.rarity==='common')]},{id:'yolo',name:'💀 YOLO',icon:'💀',price:200,skins:[{name:"★ Керамбит | Doppler Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},{name:"★ Sport Gloves | Vice",rarity:"legendary",icon:"🧤",price:3200},...ALL_SKINS.filter(s=>s.rarity==='common')]}];

let balance=1000,inventory=[],idCounter=0,isSpinning=!1,multiSpinCount=5,currentCaseIndex=0,currentUser=null,history=[];
let selectedForUpgrade=new Set,selectedForContract=new Set,isUpgrading=!1,isContracting=!1,selectedChance=50,selectedMultiplier=2;
const $=id=>document.getElementById(id);
const CARD_WIDTH=125;

function getRandomItem(cs){if(CASES[currentCaseIndex]?.id==='yolo'){const r=Math.random()*100;if(r<1)return cs.find(s=>s.name.includes('Sapphire'));if(r<4)return cs.find(s=>s.name.includes('Dragon Lore'));if(r<8)return cs.find(s=>s.name.includes('Vice'));return cs.filter(s=>s.rarity==='common')[Math.floor(Math.random()*cs.filter(s=>s.rarity==='common').length)];}const w={legendary:CASES[currentCaseIndex]?.id==='premium'?5:CASES[currentCaseIndex]?.id==='gamma'?3:1,epic:15,rare:30,uncommon:30,common:20};const r=Math.random()*100;let cum=0;for(const[ra,wt]of Object.entries(w)){cum+=wt;if(r<=cum){const p=cs.filter(s=>s.rarity===ra);if(p.length)return p[Math.floor(Math.random()*p.length)];}}return cs[Math.floor(Math.random()*cs.length)];}
function getSkinByPrice(tp){let b=ALL_SKINS[0],bd=Infinity;for(const s of ALL_SKINS){const d=Math.abs(s.price-tp);if(d<bd){bd=d;b=s;}}return b;}

function generateTape(winSkin,caseSkins){const tape=$('rouletteTape');tape.innerHTML='';for(let i=0;i<40;i++){let item=(i===32&&winSkin)?winSkin:getRandomItem(caseSkins);const c=document.createElement('div');c.className='skin-card rarity-'+item.rarity;c.innerHTML=`<div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">${item.price.toFixed(0)} <i class="fas fa-coins"></i></div>`;tape.appendChild(c);}}
function spinRoulette(){return new Promise(resolve=>{const ww=$('rouletteContainer').offsetWidth,targetLeft=-(32*CARD_WIDTH)+(ww/2)-(CARD_WIDTH/2);const tape=$('rouletteTape');tape.style.transition='none';tape.style.transform='translateX(0px)';setTimeout(()=>{tape.style.transition='transform 4s cubic-bezier(0.08,0.82,0.17,1)';tape.style.transform=`translateX(${targetLeft+(Math.random()*40-20)}px)`;setTimeout(()=>resolve(),4200);},50);});}

async function performSpin(count){
    if(!currentUser){alert('❌ Сначала войди!');showRegisterModal();return;}
    if(isSpinning)return;
    const c=CASES[currentCaseIndex],totalCost=c.price*count;
    if(balance<totalCost){alert(`❌ Нужно ${totalCost} 🪙`);return;}
    isSpinning=!0;$('openBtn').disabled=!0;balance-=totalCost;updateBalanceUI();
    const wins=[];for(let i=0;i<count;i++)wins.push(getRandomItem(c.skins));
    for(let i=0;i<count;i++){generateTape(wins[i],c.skins);await spinRoulette();inventory.push({...wins[i],id:idCounter++});history.push({type:'case',skin:wins[i].name,price:wins[i].price,time:new Date().toISOString()});addDrop(wins[i].name,wins[i].icon,wins[i].price,wins[i].rarity);}
    const totalGot=wins.reduce((s,w)=>s+w.price,0);
    $('totalResult').style.display='block';$('totalResult').textContent=`Потрачено: ${totalCost} 🪙 | Получено: ${totalGot.toFixed(0)} 🪙 | ${totalGot>totalCost?'+':''}${(totalGot-totalCost).toFixed(0)} 🪙`;$('totalResult').style.color=totalGot>totalCost?'var(--green)':totalGot<totalCost?'var(--red)':'var(--text2)';
    renderAllInventory();saveGame();isSpinning=!1;$('openBtn').disabled=!1;
}

function updateSlider(){multiSpinCount=parseInt($('spinSlider').value);$('spinCountDisplay').textContent=multiSpinCount;}
function navigateTo(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));if(page==='cases'){$('page-cases').classList.add('active');renderCasesGrid();}else{$('page-'+page).classList.add('active');if(['inventory','upgrade','contract','profile'].includes(page))renderAllInventory();if(page==='profile')renderProfile();}document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const nb=document.querySelector(`[data-page="${page}"]`);if(nb)nb.classList.add('active');}
function openCase(index){currentCaseIndex=index;const c=CASES[index];$('caseOpenTitle').textContent=c.icon+' '+c.name;$('caseOpenPrice').textContent=c.price;$('totalResult').style.display='none';$('poolContent').innerHTML=c.skins.map(s=>`<span class="pool-item rarity-${s.rarity}">${s.icon} ${s.name.split('|')[1]||s.name} <span style="color:var(--gold);">${s.price}🪙</span></span>`).join('');updateSlider();navigateTo('case-open');}
function renderCasesGrid(){$('casesGrid').innerHTML=CASES.map((c,i)=>`<div class="case-card" onclick="openCase(${i})"><span class="case-icon">${c.icon}</span><div class="case-name">${c.name}</div><div class="case-price">${c.price} 🪙</div></div>`).join('');}

function renderAllInventory(){$('invTotalCount').textContent=inventory.length;$('invTotalPrice').textContent=inventory.reduce((s,i)=>s+i.price,0).toFixed(0);if(inventory.length===0)$('inventoryGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:40px;">📦 Пусто</div>';else $('inventoryGrid').innerHTML=inventory.map(i=>`<div class="inv-item rarity-${i.rarity}"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price.toFixed(0)} 🪙</div><button class="btn-sm btn-sell" onclick="sellItem(${i.id})">Продать</button></div>`).join('');renderUpgradeInventory();renderContractInventory();updateUpgradeUI();updateContractUI();}
function renderUpgradeInventory(){if(inventory.length===0)$('upgradeInventoryGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:20px;">Нет скинов</div>';else $('upgradeInventoryGrid').innerHTML=inventory.map(i=>{const sel=selectedForUpgrade.has(i.id);return`<div class="inv-item rarity-${i.rarity}"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price.toFixed(0)} 🪙</div><button class="btn-sm btn-sell" onclick="toggleUpgradeSelection(${i.id})" style="background:${sel?'rgba(255,106,0,0.5)':'rgba(30,35,48,0.9)'}">${sel?'✓':'Выбрать'}</button></div>`;}).join('');}
function renderContractInventory(){if(inventory.length===0)$('contractInventoryGrid').innerHTML='<div style="grid-column:1/-1;text-align:center;color:var(--text2);padding:20px;">Нет скинов</div>';else $('contractInventoryGrid').innerHTML=inventory.map(i=>{const sel=selectedForContract.has(i.id);return`<div class="inv-item rarity-${i.rarity}"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price.toFixed(0)} 🪙</div><button class="btn-sm btn-sell" onclick="toggleContractSelection(${i.id})" style="background:${sel?'rgba(123,47,190,0.5)':'rgba(30,35,48,0.9)'}">${sel?'✓':'Выбрать'}</button></div>`;}).join('');}
function renderProfile(){$('profileContent').innerHTML=`<h2>👤 Профиль</h2><div style="padding:15px;background:rgba(10,12,22,0.6);border-radius:12px;margin:15px 0;"><div>Привет, <strong style="color:var(--gold);">${currentUser||'Гость'}</strong>!</div><div style="color:var(--text2);">Баланс: <strong style="color:#fff;">${balance.toFixed(0)}</strong> 🪙</div><div style="color:var(--text2);">Скинов: <strong style="color:#fff;">${inventory.length}</strong></div></div><h3>📋 История</h3><div class="history-list">${history.length?history.slice().reverse().slice(0,50).map(h=>`<div class="history-item"><span class="icon">${h.type==='case'?'💎':h.type==='upgrade'?'⚡':'📜'}</span><div class="details"><div>${h.skin||'?'}</div><div class="time">${new Date(h.time).toLocaleString()}</div></div><div style="color:var(--gold);">${h.price?h.price.toFixed(0)+' 🪙':''}</div></div>`).join(''):'<div style="color:var(--text2);text-align:center;padding:20px;">Пусто</div>'}</div>`;}

function sellItem(id){const idx=inventory.findIndex(i=>i.id===id);if(idx===-1)return;balance+=inventory[idx].price;updateBalanceUI();inventory.splice(idx,1);selectedForUpgrade.delete(id);selectedForContract.delete(id);renderAllInventory();saveGame();}
function toggleUpgradeSelection(id){if(isUpgrading)return;selectedForUpgrade.has(id)?selectedForUpgrade.delete(id):selectedForUpgrade.add(id);renderAllInventory();}
function toggleContractSelection(id){if(isContracting)return;selectedForContract.has(id)?selectedForContract.delete(id):(selectedForContract.size>=10?alert('Максимум 10!'):selectedForContract.add(id));renderAllInventory();}
function updateUpgradeUI(){const si=inventory.filter(i=>selectedForUpgrade.has(i.id));const tp=si.reduce((s,i)=>s+i.price,0);$('upgradeInputTotal').textContent=tp.toFixed(0);if(si.length===0){$('upgradeInputSkins').innerHTML='<div style="color:var(--text2);">Выберите скины</div>';$('upgradeResult').innerHTML='<div style="color:var(--text2);">Ожидание</div>';}else{$('upgradeInputSkins').innerHTML=si.map(i=>`<span style="font-size:11px;">${i.icon}</span>`).join('');const ts=getSkinByPrice(tp*selectedMultiplier);$('upgradeResult').innerHTML=`<div style="font-size:40px;">${ts.icon}</div><div style="font-weight:700;">${ts.name}</div><div style="color:var(--text2);">${ts.price.toFixed(0)} 🪙</div>`;$('upgradeResult').dataset.targetSkin=JSON.stringify(ts);}$('upgradeBtn').disabled=si.length<1||isUpgrading;}
function performUpgrade(){if(isUpgrading)return;const si=inventory.filter(i=>selectedForUpgrade.has(i.id));if(si.length<1)return alert('Выбери скин!');isUpgrading=!0;$('upgradeBtn').disabled=!0;setTimeout(()=>{const ok=Math.random()*100<selectedChance;if(ok){const td=JSON.parse($('upgradeResult').dataset.targetSkin||'null');inventory=inventory.filter(i=>!selectedForUpgrade.has(i.id));selectedForUpgrade.clear();const ni={...td,id:idCounter++};inventory.push(ni);history.push({type:'upgrade',skin:ni.name,price:ni.price,time:new Date().toISOString()});addDrop(ni.name,ni.icon,ni.price,ni.rarity);alert('✅ Успех!');}else{inventory=inventory.filter(i=>!selectedForUpgrade.has(i.id));selectedForUpgrade.clear();alert('❌ Провал!');}isUpgrading=!1;renderAllInventory();saveGame();},1000);}
function updateContractUI(){const si=inventory.filter(i=>selectedForContract.has(i.id));$('contractCount').textContent=si.length;$('contractTotalPrice').textContent=si.reduce((s,i)=>s+i.price,0).toFixed(0);$('contractBtn').disabled=si.length<3||si.length>10||isContracting;}
function performContract(){if(isContracting)return;const si=inventory.filter(i=>selectedForContract.has(i.id));if(si.length<3||si.length>10)return alert('Выбери 3-10!');isContracting=!0;$('contractBtn').disabled=!0;setTimeout(()=>{const tp=si.reduce((s,i)=>s+i.price,0);const mult=Math.random()*2+0.5;const rs=getSkinByPrice(tp*mult);inventory=inventory.filter(i=>!selectedForContract.has(i.id));selectedForContract.clear();const ni={...rs,id:idCounter++};inventory.push(ni);history.push({type:'contract',skin:ni.name,price:ni.price,time:new Date().toISOString()});addDrop(ni.name,ni.icon,ni.price,ni.rarity);$('contractResult').style.display='block';$('contractResult').innerHTML=`<div style="font-size:50px;">${ni.icon}</div><div style="font-weight:700;">${ni.name}</div><div style="color:var(--gold);">${ni.price.toFixed(0)} 🪙</div>`;isContracting=!1;renderAllInventory();saveGame();},2000);}
function updateBalanceUI(){$('balanceDisplay').textContent=balance.toFixed(0);}

function showAdminPanel(){$('adminModal').style.display='flex';}
function adminGiveCoins(){const target=$('adminTargetUser').value.trim(),amount=parseInt($('adminAmount').value),msg=$('adminMsg');if(!target||!amount||amount<1){msg.textContent='❌ Заполни все поля!';msg.style.color='#ff4444';return;}const db=getUsersDB();if(!db[target]){msg.textContent='❌ Пользователь не найден!';msg.style.color='#ff4444';return;}if(!db[target].saveData)db[target].saveData={balance:1000,inventory:[],idCounter:0,history:[]};db[target].saveData.balance=(db[target].saveData.balance||1000)+amount;saveUsersDB(db);msg.textContent=`✅ Выдано ${amount} 🪙 пользователю ${target}!`;msg.style.color='#4caf50';$('adminTargetUser').value='';$('adminAmount').value='';}

function getUsersDB(){const db=localStorage.getItem('skinVault_users_db');return db?JSON.parse(db):{};}
function saveUsersDB(db){localStorage.setItem('skinVault_users_db',JSON.stringify(db));}
function hashPassword(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h=h&h;}return'h_'+Math.abs(h).toString(16);}
function loadUserData(username){const db=getUsersDB(),ud=db[username];if(ud&&ud.saveData){balance=ud.saveData.balance||1000;inventory=ud.saveData.inventory||[];idCounter=ud.saveData.idCounter||0;history=ud.saveData.history||[];currentUser=username;renderAllInventory();updateBalanceUI();$('registerBtn').style.display='none';$('userInfo').style.display='flex';$('userNickname').textContent='👑 '+username;if(username==='Admin'){$('adminBtn').style.display='block';$('userNickname').textContent='⚡ Admin';}return!0;}return!1;}
function saveGame(){if(!currentUser)return;const db=getUsersDB();if(!db[currentUser])db[currentUser]={password:'',saveData:{}};db[currentUser].saveData={balance,inventory,idCounter,history};saveUsersDB(db);}
function showRegisterModal(){$('registerModal').style.display='flex';$('loginUsername').focus();}
function closeModal(){$('registerModal').style.display='none';}
function loginUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}const db=getUsersDB();if(!db[u]){registerUserDirect(u,p);return;}if(db[u].password!==hashPassword(p)){err.textContent='❌ Неверный пароль!';err.style.display='block';return;}closeModal();loadUserData(u);localStorage.setItem('skinVault_lastUser',u);navigateTo('cases');}
function registerUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}if(u.length<3){err.textContent='❌ Минимум 3 символа!';err.style.display='block';return;}if(p.length<4){err.textContent='❌ Минимум 4 символа!';err.style.display='block';return;}registerUserDirect(u,p);}
function registerUserDirect(u,p){const db=getUsersDB();if(db[u]&&db[u].password){alert('❌ Логин занят!');return;}db[u]={password:hashPassword(p),saveData:{balance:1000,inventory:[],idCounter:0,history:[]}};saveUsersDB(db);closeModal();loadUserData(u);localStorage.setItem('skinVault_lastUser',u);navigateTo('cases');}
function logoutUser(){saveGame();currentUser=null;$('registerBtn').style.display='block';$('userInfo').style.display='none';$('adminBtn').style.display='none';balance=1000;inventory=[];idCounter=0;history=[];selectedForUpgrade.clear();selectedForContract.clear();renderAllInventory();updateBalanceUI();navigateTo('cases');}

function init(){
    const lastUser=localStorage.getItem('skinVault_lastUser');if(lastUser){const db=getUsersDB();if(db[lastUser])loadUserData(lastUser);}
    renderCasesGrid();renderAllInventory();updateBalanceUI();
    $('openBtn').addEventListener('click',()=>performSpin(multiSpinCount));
    $('spinSlider').addEventListener('input',updateSlider);
    document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',function(){navigateTo(this.dataset.page);}));
    document.querySelectorAll('#chanceSelector .btn-sm').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('#chanceSelector .btn-sm').forEach(x=>x.classList.remove('active'));this.classList.add('active');selectedChance=parseInt(this.dataset.chance);selectedMultiplier=parseFloat(this.dataset.mult);updateUpgradeUI();}));
    $('upgradeBtn').addEventListener('click',performUpgrade);$('contractBtn').addEventListener('click',performContract);
    $('clearUpgradeBtn').addEventListener('click',()=>{selectedForUpgrade.clear();renderAllInventory();});
    $('registerModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
    $('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')loginUser();});
}
setInterval(()=>{if(currentUser)saveGame();},10000);
init();
onlineRef.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP});
</script>
</body>
</html>
