<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ SKINVAULT | Кейсы CS2</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#030308;--card:rgba(12,15,25,0.92);--accent:#ff6a00;--accent2:#8b2fc9;--gold:#ffb800;--red:#ff3b3b;--green:#00e676;--text:#fff;--text2:rgba(255,255,255,0.5);--border:rgba(255,255,255,0.06);--radius:16px;--glow:0 0 30px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30z' fill='none' stroke='rgba(255,255,255,0.02)' stroke-width='1'/%3E%3C/svg%3E")}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:10px}
        .coin-icon{color:var(--gold);font-size:13px;animation:coinSpin 4s linear infinite;filter:drop-shadow(0 0 8px rgba(255,184,0,0.4))}
        @keyframes coinSpin{0%,100%{transform:rotateY(0deg)}50%{transform:rotateY(180deg)}}
        @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(255,106,0,0.3)}50%{box-shadow:0 0 40px rgba(255,106,0,0.6)}}
        @keyframes floatUp{0%{transform:translateY(100%);opacity:0}100%{transform:translateY(0);opacity:1}}

        .live-feed{position:fixed;right:0;top:0;width:260px;height:100vh;background:linear-gradient(180deg,rgba(10,12,22,0.98),rgba(15,18,30,0.95));backdrop-filter:blur(30px);border-left:1px solid var(--border);z-index:200;display:flex;flex-direction:column;padding:15px;overflow:hidden;box-shadow:-5px 0 30px rgba(0,0,0,0.5)}
        .live-feed h3{font-family:'Orbitron',sans-serif;font-size:12px;background:linear-gradient(135deg,var(--gold),#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.08);letter-spacing:2px}
        .live-feed-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding-right:4px}
        .live-item{background:rgba(20,24,38,0.5);border-radius:10px;padding:8px 10px;font-size:10px;animation:floatUp 0.5s ease;border-left:3px solid transparent;display:flex;align-items:center;gap:8px;transition:0.3s;border:1px solid rgba(255,255,255,0.03)}
        .live-item:hover{background:rgba(20,24,38,0.8);transform:translateX(-3px)}
        .live-item.legendary{border-left-color:#ff4444;box-shadow:0 0 15px rgba(255,68,68,0.1)}.live-item.epic{border-left-color:#d32ce6;box-shadow:0 0 15px rgba(211,44,230,0.1)}.live-item.rare{border-left-color:#8847ff}
        .live-item .live-icon{font-size:22px}.live-item .live-info{flex:1}.live-item .live-name{font-weight:600;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.live-item .live-user{color:var(--gold);font-size:8px}.live-item .live-price{color:var(--text2);font-size:8px}
        .main-content{flex:1;margin-right:260px;min-height:100vh;padding:20px}

        .online-bar{position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:1000;background:var(--card);backdrop-filter:blur(25px);padding:8px 22px;border-radius:25px;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,0.5);animation:glowPulse 3s infinite}
        .online-dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 12px var(--green);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 8px var(--green)}50%{box-shadow:0 0 22px var(--green),0 0 40px rgba(0,230,118,0.4)}}

        .header{position:relative;z-index:100;display:flex;justify-content:space-between;align-items:center;max-width:1050px;margin:60px auto 15px;padding:14px 24px;background:var(--card);backdrop-filter:blur(30px);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.08);flex-wrap:wrap;gap:10px;box-shadow:0 10px 50px rgba(0,0,0,0.5)}
        .logo{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent),#ff3c00,var(--accent2),var(--accent));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 4s ease infinite;cursor:pointer;letter-spacing:1px}
        @keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .balance{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(255,106,0,0.15),rgba(255,184,0,0.08));padding:8px 18px;border-radius:25px;border:1px solid rgba(255,184,0,0.2);font-weight:700;font-size:15px;color:var(--gold);box-shadow:0 0 20px rgba(255,184,0,0.1)}
        .btn{padding:8px 16px;border-radius:20px;font-weight:700;font-size:12px;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:0.3s;letter-spacing:0.5px}
        .btn:hover{transform:translateY(-2px)}
        .btn-purple{background:linear-gradient(135deg,var(--accent2),#6a1b9a);color:#fff;box-shadow:0 4px 20px rgba(139,47,201,0.3)}.btn-purple:hover{box-shadow:0 8px 30px rgba(139,47,201,0.5)}
        .btn-red{background:rgba(255,68,68,0.15);border:1px solid rgba(255,68,68,0.3);color:var(--red)}.btn-red:hover{background:rgba(255,68,68,0.25)}
        .btn-admin{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;font-weight:800;box-shadow:0 4px 25px rgba(255,215,0,0.4)}.btn-admin:hover{box-shadow:0 8px 35px rgba(255,215,0,0.6)}

        .nav{display:flex;gap:5px;max-width:1050px;margin:0 auto 15px;flex-wrap:wrap;background:rgba(12,15,25,0.8);backdrop-filter:blur(20px);border-radius:14px;padding:5px;border:1px solid var(--border);box-shadow:0 5px 30px rgba(0,0,0,0.3)}
        .nav-btn{background:transparent;border:none;color:var(--text2);padding:8px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:0.3s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px}
        .nav-btn:hover{color:#fff;background:rgba(255,255,255,0.05)}.nav-btn.active{color:#fff;background:linear-gradient(135deg,rgba(255,106,0,0.3),rgba(139,47,201,0.2));border:1px solid rgba(255,106,0,0.2);box-shadow:0 0 20px rgba(255,106,0,0.15)}

        .page{display:none;animation:fadeSlide 0.5s cubic-bezier(0.16,1,0.3,1)}.page.active{display:block}
        @keyframes fadeSlide{0%{opacity:0;transform:translateY(20px) scale(0.97)}100%{opacity:1;transform:translateY(0) scale(1)}}

        .cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;max-width:1050px;margin:0 auto}
        .case-card{background:linear-gradient(145deg,rgba(18,22,36,0.9),rgba(15,18,30,0.9));border:2px solid var(--border);border-radius:var(--radius);padding:20px 12px;cursor:pointer;transition:0.4s;text-align:center;position:relative;overflow:hidden}
        .case-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,106,0,0.08),transparent 70%);opacity:0;transition:0.4s}
        .case-card:hover::before{opacity:1}.case-card:hover{border-color:rgba(255,106,0,0.5);transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,0.5),0 0 30px rgba(255,106,0,0.1)}.case-card .case-icon{font-size:42px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 10px rgba(255,255,255,0.1))}.case-card .case-name{font-weight:700;font-size:13px;margin-bottom:4px}.case-card .case-price{color:var(--gold);font-size:14px;font-weight:700}

        .case-page-container{max-width:780px;margin:0 auto;background:var(--card);backdrop-filter:blur(30px);padding:30px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 80px rgba(0,0,0,0.6)}
        .back-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#fff;padding:8px 16px;border-radius:16px;cursor:pointer;font-size:12px;font-weight:600;margin-bottom:15px;transition:0.3s}.back-btn:hover{background:rgba(255,255,255,0.1)}

        .roulette-wrapper{position:relative;width:100%;height:150px;background:rgba(6,8,16,0.95);margin:15px auto;overflow:hidden;border-radius:14px;border:1px solid rgba(255,255,255,0.1);box-shadow:inset 0 0 50px rgba(0,0,0,0.6)}
        .roulette-wrapper::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,rgba(3,3,8,0.95) 0%,transparent 8%,transparent 92%,rgba(3,3,8,0.95) 100%);pointer-events:none;z-index:5}
        .roulette-pointer{position:absolute;top:0;left:50%;transform:translateX(-50%);width:3px;height:100%;background:linear-gradient(180deg,var(--accent),var(--gold),var(--accent));z-index:10;box-shadow:0 0 30px var(--accent),0 0 60px rgba(255,106,0,0.3);border-radius:2px}
        .roulette-tape{display:flex;position:absolute;left:0;top:14px;transition:transform 4s cubic-bezier(0.08,0.82,0.17,1);will-change:transform}
        .skin-card{width:95px;height:118px;margin:0 5px;background:rgba(20,24,38,0.9);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;padding:8px;border-bottom:3px solid rgba(255,255,255,0.1);flex-shrink:0;text-align:center;transition:0.3s}
        .skin-card:hover{transform:scale(1.05)}.skin-card .icon{font-size:34px;margin-bottom:4px}.skin-card .name{font-weight:600;font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}.skin-card .price{font-size:8px;color:var(--text2);margin-top:2px}
        .rarity-legendary{border-bottom-color:#ff4444!important;background:linear-gradient(180deg,rgba(20,24,38,0.9) 60%,rgba(255,68,68,0.15))!important;box-shadow:0 0 20px rgba(255,68,68,0.1)}.rarity-epic{border-bottom-color:#d32ce6!important;background:linear-gradient(180deg,rgba(20,24,38,0.9) 60%,rgba(211,44,230,0.15))!important}.rarity-rare{border-bottom-color:#8847ff!important}

        .slider-container{display:flex;align-items:center;gap:12px;justify-content:center;margin:12px 0}
        .slider-container input[type=range]{flex:1;max-width:200px;accent-color:var(--accent);height:6px;border-radius:10px}.slider-value{color:var(--gold);font-weight:700;font-size:18px;min-width:30px;text-align:center}
        .btn-spin{background:linear-gradient(135deg,#ff6a00,#ff3c00);color:#fff;border:none;padding:15px 40px;font-size:16px;font-weight:700;border-radius:14px;cursor:pointer;box-shadow:0 6px 30px rgba(238,60,0,0.4);transition:0.3s;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:2px;width:100%;max-width:300px;margin:12px auto;display:block}.btn-spin:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(238,60,0,0.6)}.btn-spin:disabled{background:rgba(42,47,58,0.8);box-shadow:none;cursor:not-allowed;transform:none}

        .case-skins-pool{background:rgba(8,10,18,0.6);border-radius:14px;padding:14px;max-height:260px;overflow-y:auto;margin-top:12px;border:1px solid var(--border)}
        .case-skins-pool h4{color:var(--text2);font-size:11px;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px}
        .pool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:7px}
        .pool-card{background:rgba(20,24,38,0.7);border-radius:10px;padding:10px 6px;text-align:center;border:1px solid rgba(255,255,255,0.03);border-bottom:3px solid transparent;transition:0.3s}.pool-card:hover{transform:translateY(-3px);background:rgba(20,24,38,0.9)}.pool-card .pool-icon{font-size:30px;display:block;margin-bottom:3px}.pool-card .pool-name{font-weight:600;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pool-card .pool-price{color:var(--gold);font-size:9px;font-weight:600;margin-top:2px}.pool-card.rarity-legendary{border-bottom-color:#ff4444;background:rgba(255,68,68,0.05)}.pool-card.rarity-epic{border-bottom-color:#d32ce6}.pool-card.rarity-rare{border-bottom-color:#8847ff}

        .inventory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;max-height:400px;overflow-y:auto;padding:3px}
        .inv-item{background:rgba(20,24,38,0.7);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid var(--border);transition:0.3s}.inv-item:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 10px 30px rgba(0,0,0,0.4)}.inv-item .icon{font-size:30px;display:block;margin-bottom:3px}.inv-item .name{font-size:10px;font-weight:700}.inv-item .price{font-size:10px;color:var(--text2);margin:3px 0 6px}.btn-sm{padding:4px 10px;border-radius:10px;font-size:9px;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif}.btn-sell{background:rgba(30,35,48,0.9);color:#fff;border:1px solid var(--border)}.btn-sell:hover{background:var(--accent);color:#000}

        .profile-section{max-width:780px;margin:0 auto;background:var(--card);backdrop-filter:blur(30px);padding:25px;border-radius:20px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 20px 80px rgba(0,0,0,0.6)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
        .modal{background:linear-gradient(145deg,#141824,#1a1f30);padding:30px;border-radius:22px;text-align:center;max-width:400px;width:90%;border:1px solid rgba(255,255,255,0.1);box-shadow:0 30px 80px rgba(0,0,0,0.7)}.modal input{width:100%;padding:12px;margin-bottom:10px;background:rgba(10,12,22,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;transition:0.3s}.modal input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 15px rgba(255,106,0,0.2)}

        @media(max-width:768px){.live-feed{width:200px}.main-content{margin-right:200px}.skin-card{width:72px;height:95px}.skin-card .icon{font-size:26px}.roulette-wrapper{height:115px}.cases-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}.pool-grid{grid-template-columns:repeat(auto-fill,minmax(85px,1fr))}}
    </style>
</head>
<body>

<div class="live-feed"><h3>🔥 LIVE DROP</h3><div class="live-feed-list" id="liveFeedList"><div style="color:var(--text2);text-align:center;padding:30px;">Ожидание...</div></div></div>
<div class="main-content">

<div class="online-bar"><div class="online-dot"></div><span>Онлайн: <strong id="onlineCount" style="color:#4caf50;">0</strong></span></div>

<div class="header">
    <div class="logo" onclick="navigateTo('cases')">⭐ SKINVAULT</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="balance"><i class="fas fa-coins coin-icon"></i> <span id="balanceDisplay">1000</span></div>
        <button class="btn btn-purple" id="registerBtn" onclick="showRegisterModal()">👤 Войти</button>
        <div id="userInfo" style="display:none;align-items:center;gap:8px;"><span style="color:#ffaa00;font-weight:700;" id="userNickname"></span><button class="btn btn-red" onclick="logoutUser()">🚪</button></div>
        <button class="btn btn-admin" id="adminBtn" style="display:none;" onclick="showAdminPanel()">⚡ Админ</button>
    </div>
</div>

<div class="nav">
    <button class="nav-btn active" data-page="cases">💎 Кейсы</button><button class="nav-btn" data-page="inventory">🎒 Инвентарь</button><button class="nav-btn" data-page="upgrade">⚡ Апгрейд</button><button class="nav-btn" data-page="contract">📜 Контракт</button><button class="nav-btn" data-page="profile">👤 Профиль</button>
</div>

<div class="page active" id="page-cases"><div class="cases-grid" id="casesGrid"></div></div>
<div class="page" id="page-case-open"><div class="case-page-container"><button class="back-btn" onclick="navigateTo('cases')">← Назад</button><h2 id="caseOpenTitle" style="font-size:20px;"></h2><div style="color:var(--text2);margin-bottom:8px;">Цена: <span id="caseOpenPrice" style="color:var(--gold);font-weight:700;"></span> <i class="fas fa-coins coin-icon"></i></div><div class="roulette-wrapper"><div class="roulette-pointer"></div><div class="roulette-tape" id="rouletteTape"></div></div><div class="slider-container"><span style="color:var(--text2);">Открытий:</span><input type="range" id="spinSlider" min="1" max="50" value="5" oninput="updateSlider()"><span class="slider-value" id="spinCountDisplay">5</span></div><button class="btn-spin" id="openBtn">🔑 КРУТИТЬ</button><div id="totalResult" style="text-align:center;font-weight:700;display:none;margin-top:10px;"></div><div class="case-skins-pool"><h4>🎯 Скины в кейсе</h4><div class="pool-grid" id="poolContent"></div></div></div></div>
<div class="page" id="page-inventory"><div class="profile-section"><h2 style="margin-bottom:15px;">🎒 Инвентарь</h2><div style="margin-bottom:12px;color:var(--text2);">Предметов: <strong id="invTotalCount" style="color:#fff;">0</strong> | Стоимость: <strong id="invTotalPrice" style="color:#fff;">0</strong> <i class="fas fa-coins coin-icon"></i></div><div class="inventory-grid" id="inventoryGrid"></div></div></div>
<div class="page" id="page-upgrade"><div class="profile-section"><h2 style="margin-bottom:15px;">⚡ Апгрейд оружия</h2><div style="display:flex;gap:6px;justify-content:center;margin-bottom:15px;" id="chanceSelector"><button class="btn-sm btn-sell active" data-chance="50" data-mult="2">50% ×2</button><button class="btn-sm btn-sell" data-chance="25" data-mult="4">25% ×4</button><button class="btn-sm btn-sell" data-chance="75" data-mult="1.33">75% ×1.33</button><button class="btn-sm btn-sell" data-chance="10" data-mult="10">10% ×10</button></div><div style="display:grid;grid-template-columns:1fr auto 1fr;gap:15px;margin-bottom:15px;"><div style="background:rgba(10,12,22,0.8);border-radius:12px;padding:15px;text-align:center;"><div style="color:var(--text2);">📦 ВХОД</div><div id="upgradeInputSkins" style="min-height:50px;"></div><div>Сумма: <span id="upgradeInputTotal" style="color:var(--gold);">0</span> <i class="fas fa-coins coin-icon"></i></div></div><div style="display:flex;align-items:center;font-size:35px;">⚡</div><div style="background:rgba(10,12,22,0.8);border-radius:12px;padding:15px;text-align:center;"><div style="color:var(--text2);">🎯 РЕЗУЛЬТАТ</div><div id="upgradeResult"></div></div></div><div style="display:flex;gap:8px;justify-content:center;"><button class="btn-spin" id="upgradeBtn" disabled style="max-width:170px;">АПГРЕЙД</button><button class="btn btn-red" id="clearUpgradeBtn">Очистить</button></div><div style="margin-top:15px;color:var(--text2);">Инвентарь:</div><div class="inventory-grid" id="upgradeInventoryGrid" style="max-height:200px;"></div></div></div>
<div class="page" id="page-contract"><div class="profile-section"><h2 style="margin-bottom:15px;">📜 Контракты</h2><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px;padding:12px 16px;background:rgba(10,12,22,0.6);border-radius:12px;border:1px solid var(--border);"><div>Выбрано: <strong id="contractCount">0</strong>/10</div><div>Сумма: <span id="contractTotalPrice" style="color:var(--gold);">0</span> <i class="fas fa-coins coin-icon"></i></div><button class="btn btn-purple" id="contractBtn" disabled>КОНТРАКТ</button></div><div id="contractResult" style="display:none;padding:15px;background:rgba(76,175,80,0.08);border-radius:12px;text-align:center;margin-bottom:15px;border:1px solid rgba(76,175,80,0.2);"></div><div class="inventory-grid" id="contractInventoryGrid" style="max-height:200px;"></div></div></div>
<div class="page" id="page-profile"><div class="profile-section" id="profileContent"></div></div>

</div>

<div class="modal-overlay" id="registerModal" style="display:none;"><div class="modal"><h2 style="margin-bottom:15px;font-family:'Orbitron',sans-serif;">⭐ SKINVAULT</h2><input type="text" id="loginUsername" placeholder="Логин"><input type="password" id="loginPassword" placeholder="Пароль"><button class="btn btn-purple" onclick="loginUser()" style="width:100%;margin-bottom:6px;background:linear-gradient(135deg,#ff6a00,#ff3c00);">🔑 ВОЙТИ</button><button class="btn btn-purple" onclick="registerUser()" style="width:100%;">✅ РЕГИСТРАЦИЯ</button><div id="authError" style="color:#ff4444;font-size:11px;margin-top:8px;display:none;"></div><button onclick="closeModal()" style="margin-top:10px;background:transparent;border:none;color:var(--text2);cursor:pointer;">✕ Закрыть</button></div></div>

// Firebase
const fbCfg={apiKey:"AIzaSyCiJGNpJByCCbwcufI-NFUFzXjo0HeGd8E",authDomain:"skinvalut.firebaseapp.com",databaseURL:"https://skinvalut-default-rtdb.firebaseio.com",projectId:"skinvalut",storageBucket:"skinvalut.firebasestorage.app",messagingSenderId:"560114772930",appId:"1:560114772930:web:8aa0a87f3c791b27d6845b"};

// Скины (цены целые)
const ALL_SKINS=[{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},{name:"AK-47 | Case Hardened Blue Gem",rarity:"legendary",icon:"💎",price:2800},{name:"M4A4 | Howl",rarity:"legendary",icon:"🐺",price:890},{name:"AWP | Gungnir",rarity:"legendary",icon:"⚡",price:1200},{name:"Desert Eagle | Blaze",rarity:"legendary",icon:"🔥",price:520},{name:"AK-47 | Fire Serpent",rarity:"legendary",icon:"🐍",price:680},{name:"★ Керамбит | Doppler Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"★ Butterfly Knife | Fade",rarity:"legendary",icon:"🦋",price:2200},{name:"★ Sport Gloves | Vice",rarity:"legendary",icon:"🧤",price:3200},{name:"AK-47 | Vulcan",rarity:"epic",icon:"🌋",price:145},{name:"M4A1-S | Cyrex",rarity:"epic",icon:"🔴",price:48},{name:"AWP | Asiimov",rarity:"epic",icon:"🤖",price:85},{name:"Desert Eagle | Crimson Web",rarity:"epic",icon:"🕸️",price:35},{name:"USP-S | Orion",rarity:"epic",icon:"🌌",price:28},{name:"P250 | Mehndi",rarity:"epic",icon:"🎨",price:18},{name:"AK-47 | Redline",rarity:"rare",icon:"🔴",price:42},{name:"AWP | Redline",rarity:"rare",icon:"🔴",price:35},{name:"Glock-18 | Water Elemental",rarity:"rare",icon:"💧",price:15},{name:"USP-S | Guardian",rarity:"rare",icon:"🛡️",price:8},{name:"P250 | Cartel",rarity:"rare",icon:"💀",price:6},{name:"M4A1-S | Nitro",rarity:"uncommon",icon:"💨",price:4},{name:"AK-47 | Blue Laminate",rarity:"uncommon",icon:"🔷",price:5},{name:"AWP | Safari Mesh",rarity:"uncommon",icon:"🦒",price:2},{name:"Glock-18 | Candy Apple",rarity:"uncommon",icon:"🍎",price:2},{name:"USP-S | Stainless",rarity:"uncommon",icon:"🔩",price:3},{name:"MP9 | Sand Dashed",rarity:"common",icon:"🏜️",price:1},{name:"Nova | Forest Leaves",rarity:"common",icon:"🍃",price:1},{name:"P90 | Ash Wood",rarity:"common",icon:"🪵",price:1}];
const CASES=[{id:'premium',name:'👑 Премиум',icon:'👑',price:500,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,7),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'gamma',name:'💚 Gamma Doppler',icon:'💚',price:800,skins:[...ALL_SKINS.filter(s=>s.name.includes('★')),...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'bravo',name:'🔥 Operation Bravo',icon:'🔥',price:600,skins:[{name:"AK-47 | Fire Serpent",rarity:"legendary",icon:"🐍",price:680},...ALL_SKINS.filter(s=>s.name.includes('★')).slice(0,2),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'glove',name:'🧤 Glove Case',icon:'🧤',price:500,skins:[...ALL_SKINS.filter(s=>s.name.includes('Gloves')||s.name.includes('★')).slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'chroma',name:'🌈 Chroma',icon:'🌈',price:200,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'standard',name:'📦 Стандартный',icon:'📦',price:100,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(3,5),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'sniper',name:'🎯 Снайперский',icon:'🎯',price:150,skins:[...ALL_SKINS.filter(s=>s.name.includes('AWP')),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,3)]},{id:'prisma2',name:'💠 Prisma 2',icon:'💠',price:120,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(2,4),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'snakebite',name:'🐍 Snakebite',icon:'🐍',price:80,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(4,5),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='common').slice(0,3)]},{id:'fracture',name:'💥 Fracture',icon:'💥',price:60,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(3,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='common').slice(0,3)]},{id:'pistol',name:'🔫 Пистолетный',icon:'🔫',price:50,skins:[...ALL_SKINS.filter(s=>s.name.includes('Desert')||s.name.includes('Glock')||s.name.includes('USP')||s.name.includes('P250')),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4)]},{id:'starter',name:'🚀 Стартовый',icon:'🚀',price:30,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,4),...ALL_SKINS.filter(s=>s.rarity==='rare'),...ALL_SKINS.filter(s=>s.rarity==='uncommon')]},{id:'budget',name:'💸 Бюджетный',icon:'💸',price:15,skins:[...ALL_SKINS.filter(s=>s.rarity==='rare').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='uncommon'),...ALL_SKINS.filter(s=>s.rarity==='common')]},{id:'yolo',name:'💀 YOLO',icon:'💀',price:200,skins:[{name:"★ Керамбит | Doppler Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},{name:"★ Sport Gloves | Vice",rarity:"legendary",icon:"🧤",price:3200},...ALL_SKINS.filter(s=>s.rarity==='common')]}];

let balance=1000,inventory=[],idCounter=0,isSpinning=!1,multiSpinCount=5,currentCaseIndex=0,currentUser=null,history=[];
let selectedForUpgrade=new Set,selectedForContract=new Set,isUpgrading=!1,isContracting=!1,selectedChance=50,selectedMultiplier=2;
const $=id=>document.getElementById(id);const CARD_WIDTH=105;

function getRandomItem(cs){if(CASES[currentCaseIndex]?.id==='yolo'){const r=Math.random()*100;if(r<1)return cs.find(s=>s.name.includes('Sapphire'));if(r<4)return cs.find(s=>s.name.includes('Dragon Lore'));if(r<8)return cs.find(s=>s.name.includes('Vice'));return cs.filter(s=>s.rarity==='common')[Math.floor(Math.random()*cs.filter(s=>s.rarity==='common').length)];}const w={legendary:CASES[currentCaseIndex]?.id==='premium'?5:CASES[currentCaseIndex]?.id==='gamma'?3:1,epic:15,rare:30,uncommon:30,common:20};const r=Math.random()*100;let cum=0;for(const[ra,wt]of Object.entries(w)){cum+=wt;if(r<=cum){const p=cs.filter(s=>s.rarity===ra);if(p.length)return p[Math.floor(Math.random()*p.length)];}}return cs[Math.floor(Math.random()*cs.length)];}
function getSkinByPrice(tp){let b=ALL_SKINS[0],bd=Infinity;for(const s of ALL_SKINS){const d=Math.abs(s.price-tp);if(d<bd){bd=d;b=s;}}return b;}
function generateTape(winSkin,caseSkins){const tape=$('rouletteTape');tape.innerHTML='';for(let i=0;i<40;i++){let item=(i===32&&winSkin)?winSkin:getRandomItem(caseSkins);const c=document.createElement('div');c.className='skin-card rarity-'+item.rarity;c.innerHTML=`<div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">${item.price} <i class="fas fa-coins coin-icon"></i></div>`;tape.appendChild(c);}}
function spinRoulette(){return new Promise(resolve=>{const ww=$('rouletteContainer').offsetWidth,targetLeft=-(32*CARD_WIDTH)+(ww/2)-(CARD_WIDTH/2);const tape=$('rouletteTape');tape.style.transition='none';tape.style.transform='translateX(0px)';setTimeout(()=>{tape.style.transition='transform 4s cubic-bezier(0.08,0.82,0.17,1)';tape.style.transform=`translateX(${targetLeft+(Math.random()*35-17)}px)`;setTimeout(()=>resolve(),4200);},50);});}
async function performSpin(count){if(!currentUser){alert('❌ Сначала войди!');showRegisterModal();return;}if(isSpinning)return;const c=CASES[currentCaseIndex],totalCost=c.price*count;if(balance<totalCost){alert(`❌ Нужно ${totalCost} монет!`);return;}isSpinning=!0;$('openBtn').disabled=!0;balance-=totalCost;updateBalanceUI();const wins=[];for(let i=0;i<count;i++)wins.push(getRandomItem(c.skins));for(let i=0;i<count;i++){generateTape(wins[i],c.skins);await spinRoulette();inventory.push({...wins[i],id:idCounter++});history.push({type:'case',skin:wins[i].name,price:wins[i].price,time:new Date().toISOString()});addDrop(wins[i].name,wins[i].icon,wins[i].price,wins[i].rarity);}const tg=wins.reduce((s,w)=>s+w.price,0);$('totalResult').style.display='block';$('totalResult').innerHTML=`Потрачено: ${totalCost} <i class="fas fa-coins coin-icon"></i> | Получено: ${tg} <i class="fas fa-coins coin-icon"></i> | ${tg>totalCost?'+':''}${tg-totalCost} <i class="fas fa-coins coin-icon"></i>`;$('totalResult').style.color=tg>totalCost?'var(--green)':tg<totalCost?'var(--red)':'var(--text2)';renderAllInventory();saveGame();isSpinning=!1;$('openBtn').disabled=!1;}

// ... (остальной код идентичен предыдущему полному скрипту)
// Все функции: renderCasesGrid, openCase, navigateTo, renderAllInventory, 
// sellItem, toggleUpgradeSelection, updateUpgradeUI, performUpgrade,
// updateContractUI, performContract, loadUserData, saveGame, adminGiveCoins,
// showRegisterModal, loginUser, registerUser, logoutUser, init
// ТОЧНО ТАКИЕ ЖЕ как в предыдущем ответе, но с usersRef вместо getUsersDB/saveUsersDB
    function updateSlider(){multiSpinCount=parseInt($('spinSlider').value);$('spinCountDisplay').textContent=multiSpinCount;}
function navigateTo(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));if(page==='cases'){$('page-cases').classList.add('active');renderCasesGrid();}else{$('page-'+page).classList.add('active');if(['inventory','upgrade','contract','profile'].includes(page))renderAllInventory();if(page==='profile')renderProfile();}document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const nb=document.querySelector(`[data-page="${page}"]`);if(nb)nb.classList.add('active');}
function openCase(index){currentCaseIndex=index;const c=CASES[index];$('caseOpenTitle').textContent=c.icon+' '+c.name;$('caseOpenPrice').textContent=c.price;$('totalResult').style.display='none';$('poolContent').innerHTML=c.skins.map(s=>`<div class="pool-card rarity-${s.rarity}"><span class="pool-icon">${s.icon}</span><div class="pool-name">${s.name.split('|')[1]||s.name}</div><div class="pool-price">${s.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join('');updateSlider();navigateTo('case-open');}
function renderCasesGrid(){$('casesGrid').innerHTML=CASES.map((c,i)=>`<div class="case-card" onclick="openCase(${i})"><span class="case-icon">${c.icon}</span><div class="case-name">${c.name}</div><div class="case-price">${c.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join('');}
function renderAllInventory(){$('invTotalCount').textContent=inventory.length;$('invTotalPrice').textContent=inventory.reduce((s,i)=>s+i.price,0);if(inventory.length===0)$('inventoryGrid').innerHTML='<div style="text-align:center;padding:40px;">📦 Пусто</div>';else $('inventoryGrid').innerHTML=inventory.map(i=>`<div class="inv-item rarity-${i.rarity}"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="sellItem(${i.id})">Продать</button></div>`).join('');renderUpgradeInventory();renderContractInventory();updateUpgradeUI();updateContractUI();}
function renderUpgradeInventory(){if(inventory.length===0)$('upgradeInventoryGrid').innerHTML='<div style="text-align:center;padding:20px;">Нет скинов</div>';else $('upgradeInventoryGrid').innerHTML=inventory.map(i=>{const sel=selectedForUpgrade.has(i.id);return`<div class="inv-item"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="toggleUpgradeSelection(${i.id})" style="background:${sel?'rgba(255,106,0,0.5)':'rgba(30,35,48,0.9)'}">${sel?'✓':'Выбрать'}</button></div>`;}).join('');}
function renderContractInventory(){if(inventory.length===0)$('contractInventoryGrid').innerHTML='<div style="text-align:center;padding:20px;">Нет скинов</div>';else $('contractInventoryGrid').innerHTML=inventory.map(i=>{const sel=selectedForContract.has(i.id);return`<div class="inv-item"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="toggleContractSelection(${i.id})" style="background:${sel?'rgba(123,47,190,0.5)':'rgba(30,35,48,0.9)'}">${sel?'✓':'Выбрать'}</button></div>`;}).join('');}
function renderProfile(){$('profileContent').innerHTML=`<h2>👤 Профиль</h2><div style="padding:15px;background:rgba(10,12,22,0.6);border-radius:12px;margin:15px 0;"><div>Привет, <strong style="color:var(--gold);">${currentUser||'Гость'}</strong>!</div><div style="color:var(--text2);">Баланс: <strong style="color:#fff;">${balance}</strong> <i class="fas fa-coins coin-icon"></i></div><div style="color:var(--text2);">Скинов: <strong style="color:#fff;">${inventory.length}</strong></div></div><h3>📋 История</h3>${history.length?history.slice().reverse().slice(0,50).map(h=>`<div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(20,24,38,0.5);border-radius:8px;margin-bottom:3px;"><span>${h.type==='case'?'💎':'⚡'}</span><div style="flex:1;"><div>${h.skin}</div><div style="font-size:9px;color:var(--text2);">${new Date(h.time).toLocaleString()}</div></div><div style="color:var(--gold);">${h.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join(''):'<div style="text-align:center;padding:20px;">Пусто</div>'}`;}
function sellItem(id){const idx=inventory.findIndex(i=>i.id===id);if(idx===-1)return;balance+=inventory[idx].price;updateBalanceUI();inventory.splice(idx,1);selectedForUpgrade.delete(id);selectedForContract.delete(id);renderAllInventory();saveGame();}
function toggleUpgradeSelection(id){if(isUpgrading)return;selectedForUpgrade.has(id)?selectedForUpgrade.delete(id):selectedForUpgrade.add(id);renderAllInventory();}
function toggleContractSelection(id){if(isContracting)return;selectedForContract.has(id)?selectedForContract.delete(id):(selectedForContract.size>=10?alert('Максимум 10!'):selectedForContract.add(id));renderAllInventory();}
function updateUpgradeUI(){const si=inventory.filter(i=>selectedForUpgrade.has(i.id));const tp=si.reduce((s,i)=>s+i.price,0);$('upgradeInputTotal').textContent=tp;if(si.length===0){$('upgradeInputSkins').innerHTML='<div style="color:var(--text2);">Выберите скины</div>';$('upgradeResult').innerHTML='<div style="color:var(--text2);">Ожидание</div>';}else{$('upgradeInputSkins').innerHTML=si.map(i=>`<span>${i.icon}</span>`).join('');const ts=getSkinByPrice(tp*selectedMultiplier);$('upgradeResult').innerHTML=`<div style="font-size:35px;">${ts.icon}</div><div>${ts.name}</div><div style="color:var(--gold);">${ts.price} <i class="fas fa-coins coin-icon"></i></div>`;$('upgradeResult').dataset.targetSkin=JSON.stringify(ts);}$('upgradeBtn').disabled=si.length<1||isUpgrading;}
function performUpgrade(){if(isUpgrading)return;const si=inventory.filter(i=>selectedForUpgrade.has(i.id));if(si.length<1)return alert('Выбери скин!');isUpgrading=!0;$('upgradeBtn').disabled=!0;setTimeout(()=>{const ok=Math.random()*100<selectedChance;if(ok){const td=JSON.parse($('upgradeResult').dataset.targetSkin||'null');inventory=inventory.filter(i=>!selectedForUpgrade.has(i.id));selectedForUpgrade.clear();const ni={...td,id:idCounter++};inventory.push(ni);history.push({type:'upgrade',skin:ni.name,price:ni.price,time:new Date().toISOString()});addDrop(ni.name,ni.icon,ni.price,ni.rarity);}else{inventory=inventory.filter(i=>!selectedForUpgrade.has(i.id));selectedForUpgrade.clear();}isUpgrading=!1;renderAllInventory();saveGame();},1000);}
function updateContractUI(){const si=inventory.filter(i=>selectedForContract.has(i.id));$('contractCount').textContent=si.length;$('contractTotalPrice').textContent=si.reduce((s,i)=>s+i.price,0);$('contractBtn').disabled=si.length<3||si.length>10||isContracting;}
function performContract(){if(isContracting)return;const si=inventory.filter(i=>selectedForContract.has(i.id));if(si.length<3||si.length>10)return alert('Выбери 3-10!');isContracting=!0;$('contractBtn').disabled=!0;setTimeout(()=>{const tp=si.reduce((s,i)=>s+i.price,0);const mult=Math.random()*2+0.5;const rs=getSkinByPrice(tp*mult);inventory=inventory.filter(i=>!selectedForContract.has(i.id));selectedForContract.clear();const ni={...rs,id:idCounter++};inventory.push(ni);history.push({type:'contract',skin:ni.name,price:ni.price,time:new Date().toISOString()});addDrop(ni.name,ni.icon,ni.price,ni.rarity);$('contractResult').style.display='block';$('contractResult').innerHTML=`<div style="font-size:40px;">${ni.icon}</div><div>${ni.name}</div><div style="color:var(--gold);">${ni.price} <i class="fas fa-coins coin-icon"></i></div>`;isContracting=!1;renderAllInventory();saveGame();},2000);}
function updateBalanceUI(){$('balanceDisplay').textContent=balance;}

// Firebase пользователи
function loadUserData(u){usersRef.child(u).once('value').then(sn=>{const ud=sn.val();if(ud&&ud.saveData){balance=ud.saveData.balance||1000;inventory=ud.saveData.inventory||[];idCounter=ud.saveData.idCounter||0;history=ud.saveData.history||[];currentUser=u;renderAllInventory();updateBalanceUI();$('registerBtn').style.display='none';$('userInfo').style.display='flex';$('userNickname').textContent='👑 '+u;if(u==='Admin'){$('adminBtn').style.display='block';$('userNickname').textContent='⚡ Admin';}localStorage.setItem('skinVault_lastUser',u);navigateTo('cases');}});}
function saveGame(){if(!currentUser)return;usersRef.child(currentUser).update({saveData:{balance,inventory,idCounter,history}});}
function adminGiveCoins(){const t=$('adminTargetUser').value.trim(),a=parseInt($('adminAmount').value),m=$('adminMsg');m.style.color='#ff4444';if(!t){m.textContent='❌ Введи ник!';return;}if(!a||a<1){m.textContent='❌ Введи сумму!';return;}usersRef.child(t).once('value').then(sn=>{if(!sn.exists()){m.textContent='❌ Пользователь не найден!';return;}const ud=sn.val()||{};const cb=(ud.saveData&&ud.saveData.balance)||1000;usersRef.child(t).child('saveData').update({balance:cb+a}).then(()=>{m.textContent=`✅ Выдано ${a} монет для ${t}! (Было: ${cb}, Стало: ${cb+a})`;m.style.color='#4caf50';$('adminTargetUser').value='';$('adminAmount').value='';if(t===currentUser){balance=cb+a;updateBalanceUI();renderAllInventory();}});});}
function showAdminPanel(){$('adminModal').style.display='flex';$('adminTargetUser').focus();}
function hashPassword(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h=h&h;}return'h_'+Math.abs(h).toString(16);}
function showRegisterModal(){$('registerModal').style.display='flex';$('loginUsername').focus();}function closeModal(){$('registerModal').style.display='none';}
function loginUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}usersRef.child(u).once('value').then(sn=>{if(!sn.exists()){registerUserDirect(u,p);return;}if(sn.val().password!==hashPassword(p)){err.textContent='❌ Неверный пароль!';err.style.display='block';return;}closeModal();loadUserData(u);});}
function registerUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}if(u.length<3){err.textContent='❌ Минимум 3 символа!';err.style.display='block';return;}if(p.length<4){err.textContent='❌ Минимум 4 символа!';err.style.display='block';return;}registerUserDirect(u,p);}
function registerUserDirect(u,p){usersRef.child(u).once('value').then(sn=>{if(sn.exists()&&sn.val().password){alert('❌ Логин занят!');return;}usersRef.child(u).set({password:hashPassword(p),saveData:{balance:1000,inventory:[],idCounter:0,history:[]}}).then(()=>{closeModal();loadUserData(u);});});}
function logoutUser(){saveGame();currentUser=null;$('registerBtn').style.display='block';$('userInfo').style.display='none';$('adminBtn').style.display='none';balance=1000;inventory=[];idCounter=0;history=[];selectedForUpgrade.clear();selectedForContract.clear();renderAllInventory();updateBalanceUI();navigateTo('cases');}

function init(){
    const lastUser=localStorage.getItem('skinVault_lastUser');if(lastUser){usersRef.child(lastUser).once('value').then(sn=>{if(sn.exists())loadUserData(lastUser);else localStorage.removeItem('skinVault_lastUser');});}
    renderCasesGrid();renderAllInventory();updateBalanceUI();
    $('openBtn').addEventListener('click',()=>performSpin(multiSpinCount));$('spinSlider').addEventListener('input',updateSlider);
    document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',function(){navigateTo(this.dataset.page);}));
    document.querySelectorAll('#chanceSelector .btn-sm').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('#chanceSelector .btn-sm').forEach(x=>x.classList.remove('active'));this.classList.add('active');selectedChance=parseInt(this.dataset.chance);selectedMultiplier=parseFloat(this.dataset.mult);updateUpgradeUI();}));
    $('upgradeBtn').addEventListener('click',performUpgrade);$('contractBtn').addEventListener('click',performContract);
    $('clearUpgradeBtn').addEventListener('click',()=>{selectedForUpgrade.clear();renderAllInventory();});
    $('registerModal').addEventListener('click',function(e){if(e.target===this)closeModal();});$('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')loginUser();});
}
setInterval(()=>{if(currentUser)saveGame();},10000);init();
onlineRef.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP});
</script>
</body>
</html>
