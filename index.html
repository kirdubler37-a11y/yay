<script>

firebase.initializeApp(fbCfg);
const fbDb=firebase.database(),onlineRef=fbDb.ref('online'),dropsRef=fbDb.ref('drops'),usersRef=fbDb.ref('users');

// Онлайн
setInterval(()=>onlineRef.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP}),5000);

dropsRef.orderByChild('time').limitToLast(40).on('value',s=>{

// Скины
const ALL_SKINS=[{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},{name:"AK-47 | Case Hardened Blue Gem",rarity:"legendary",icon:"💎",price:2800},{name:"M4A4 | Howl",rarity:"legendary",icon:"🐺",price:890},{name:"AWP | Gungnir",rarity:"legendary",icon:"⚡",price:1200},{name:"Desert Eagle | Blaze",rarity:"legendary",icon:"🔥",price:520},{name:"AK-47 | Fire Serpent",rarity:"legendary",icon:"🐍",price:680},{name:"★ Керамбит | Doppler Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"★ Butterfly Knife | Fade",rarity:"legendary",icon:"🦋",price:2200},{name:"★ Sport Gloves | Vice",rarity:"legendary",icon:"🧤",price:3200},{name:"AK-47 | Vulcan",rarity:"epic",icon:"🌋",price:145},{name:"M4A1-S | Cyrex",rarity:"epic",icon:"🔴",price:48},{name:"AWP | Asiimov",rarity:"epic",icon:"🤖",price:85},{name:"Desert Eagle | Crimson Web",rarity:"epic",icon:"🕸️",price:35},{name:"USP-S | Orion",rarity:"epic",icon:"🌌",price:28},{name:"P250 | Mehndi",rarity:"epic",icon:"🎨",price:18},{name:"AK-47 | Redline",rarity:"rare",icon:"🔴",price:42},{name:"AWP | Redline",rarity:"rare",icon:"🔴",price:35},{name:"Glock-18 | Water Elemental",rarity:"rare",icon:"💧",price:15},{name:"USP-S | Guardian",rarity:"rare",icon:"🛡️",price:8},{name:"P250 | Cartel",rarity:"rare",icon:"💀",price:6},{name:"M4A1-S | Nitro",rarity:"uncommon",icon:"💨",price:4},{name:"AK-47 | Blue Laminate",rarity:"uncommon",icon:"🔷",price:5},{name:"AWP | Safari Mesh",rarity:"uncommon",icon:"🦒",price:2},{name:"Glock-18 | Candy Apple",rarity:"uncommon",icon:"🍎",price:2},{name:"USP-S | Stainless",rarity:"uncommon",icon:"🔩",price:3},{name:"MP9 | Sand Dashed",rarity:"common",icon:"🏜️",price:1},{name:"Nova | Forest Leaves",rarity:"common",icon:"🍃",price:1},{name:"P90 | Ash Wood",rarity:"common",icon:"🪵",price:1}];
const CASES=[{id:'premium',name:'👑 Премиум',icon:'👑',price:500,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,7),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'gamma',name:'💚 Gamma',icon:'💚',price:800,skins:[...ALL_SKINS.filter(s=>s.name.includes('★')),...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'bravo',name:'🔥 Bravo',icon:'🔥',price:600,skins:[{name:"AK-47 | Fire Serpent",rarity:"legendary",icon:"🐍",price:680},...ALL_SKINS.filter(s=>s.name.includes('★')).slice(0,2),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'glove',name:'🧤 Glove',icon:'🧤',price:500,skins:[...ALL_SKINS.filter(s=>s.name.includes('Gloves')||s.name.includes('★')).slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'chroma',name:'🌈 Chroma',icon:'🌈',price:200,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'standard',name:'📦 Стандарт',icon:'📦',price:100,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(3,5),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'sniper',name:'🎯 Снайпер',icon:'🎯',price:150,skins:[...ALL_SKINS.filter(s=>s.name.includes('AWP')),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,3)]},{id:'prisma2',name:'💠 Prisma 2',icon:'💠',price:120,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(2,4),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'snakebite',name:'🐍 Snakebite',icon:'🐍',price:80,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(4,5),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='common').slice(0,3)]},{id:'fracture',name:'💥 Fracture',icon:'💥',price:60,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(3,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='common').slice(0,3)]},{id:'pistol',name:'🔫 Пистолеты',icon:'🔫',price:50,skins:[...ALL_SKINS.filter(s=>s.name.includes('Desert')||s.name.includes('Glock')||s.name.includes('USP')||s.name.includes('P250')),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4)]},{id:'starter',name:'🚀 Старт',icon:'🚀',price:30,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,4),...ALL_SKINS.filter(s=>s.rarity==='rare'),...ALL_SKINS.filter(s=>s.rarity==='uncommon')]},{id:'budget',name:'💸 Бюджет',icon:'💸',price:15,skins:[...ALL_SKINS.filter(s=>s.rarity==='rare').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='uncommon'),...ALL_SKINS.filter(s=>s.rarity==='common')]},{id:'yolo',name:'💀 YOLO',icon:'💀',price:200,skins:[{name:"★ Керамбит | Doppler Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},{name:"★ Sport Gloves | Vice",rarity:"legendary",icon:"🧤",price:3200},...ALL_SKINS.filter(s=>s.rarity==='common')]}];

let balance=1000,inventory=[],idCounter=0,isSpinning=!1,multiSpinCount=5,currentCaseIndex=0,currentUser=null,history=[];
let selUp=new Set,selCon=new Set,isUpgrading=!1,isContracting=!1,selChance=50,selMult=2;
const $=id=>document.getElementById(id);

function getRandomItem(cs){if(CASES[currentCaseIndex]?.id==='yolo'){const r=Math.random()*100;if(r<1)return cs.find(s=>s.name.includes('Sapphire'));if(r<4)return cs.find(s=>s.name.includes('Dragon Lore'));if(r<8)return cs.find(s=>s.name.includes('Vice'));return cs.filter(s=>s.rarity==='common')[Math.floor(Math.random()*cs.filter(s=>s.rarity==='common').length)];}const w={legendary:CASES[currentCaseIndex]?.id==='premium'?5:1,epic:15,rare:30,uncommon:30,common:20};const r=Math.random()*100;let cum=0;for(const[ra,wt]of Object.entries(w)){cum+=wt;if(r<=cum){const p=cs.filter(s=>s.rarity===ra);if(p.length)return p[Math.floor(Math.random()*p.length)];}}return cs[Math.floor(Math.random()*cs.length)];}
function getSkinByPrice(tp){let b=ALL_SKINS[0],bd=Infinity;for(const s of ALL_SKINS){const d=Math.abs(s.price-tp);if(d<bd){bd=d;b=s;}}return b;}
function generateTape(winSkin,caseSkins){const tape=$('rouletteTape');if(!tape)return;tape.innerHTML='';for(let i=0;i<40;i++){let item=(i===32&&winSkin)?winSkin:getRandomItem(caseSkins);const c=document.createElement('div');c.className='skin-card rarity-'+item.rarity;c.innerHTML=`<div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">${item.price} <i class="fas fa-coins coin-icon"></i></div>`;tape.appendChild(c);}}
function spinRoulette(){return new Promise(resolve=>{const container=$('rouletteContainer');const tape=$('rouletteTape');if(!container||!tape){resolve();return;}const ww=container.offsetWidth||700;const targetLeft=-(32*96)+(ww/2)-48;tape.style.transition='none';tape.style.transform='translateX(0px)';setTimeout(()=>{tape.style.transition='transform 3.5s cubic-bezier(0.08,0.82,0.17,1)';tape.style.transform=`translateX(${targetLeft+(Math.random()*30-15)}px)`;setTimeout(()=>resolve(),3700);},150);});}
async function performSpin(count){if(!currentUser){alert('❌ Сначала войди!');showRegisterModal();return;}if(isSpinning)return;const c=CASES[currentCaseIndex],tc=c.price*count;if(balance<tc){alert(`❌ Нужно ${tc} монет!`);return;}isSpinning=!0;$('openBtn').disabled=!0;balance-=tc;updateBalanceUI();const wins=[];for(let i=0;i<count;i++)wins.push(getRandomItem(c.skins));for(let i=0;i<count;i++){generateTape(wins[i],c.skins);await spinRoulette();inventory.push({...wins[i],id:idCounter++});history.push({type:'case',skin:wins[i].name,price:wins[i].price,time:new Date().toISOString()});addDrop(wins[i].name,wins[i].icon,wins[i].price,wins[i].rarity);}const tg=wins.reduce((s,w)=>s+w.price,0);$('totalResult').style.display='block';$('totalResult').innerHTML=`Потрачено: ${tc} <i class="fas fa-coins coin-icon"></i> | Получено: ${tg} <i class="fas fa-coins coin-icon"></i> | ${tg>tc?'+':''}${tg-tc} <i class="fas fa-coins coin-icon"></i>`;$('totalResult').style.color=tg>tc?'#4caf50':tg<tc?'#ff4444':'#fff';renderAllInventory();saveGame();isSpinning=!1;$('openBtn').disabled=!1;}
function updateSlider(){multiSpinCount=parseInt($('spinSlider').value);$('spinCountDisplay').textContent=multiSpinCount;}
function navigateTo(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));if(page==='cases'){$('page-cases').classList.add('active');renderCasesGrid();}else{$('page-'+page).classList.add('active');if(['inventory','upgrade','contract','profile'].includes(page))renderAllInventory();if(page==='profile')renderProfile();}document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const nb=document.querySelector(`[data-page="${page}"]`);if(nb)nb.classList.add('active');}
function openCase(index){currentCaseIndex=index;const c=CASES[index];$('caseOpenTitle').textContent=c.icon+' '+c.name;$('caseOpenPrice').textContent=c.price;$('totalResult').style.display='none';$('poolContent').innerHTML=c.skins.map(s=>`<div class="pool-card rarity-${s.rarity}"><span class="pool-icon">${s.icon}</span><div>${s.name.split('|')[1]||s.name}</div><div style="color:var(--gold);">${s.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join('');updateSlider();navigateTo('case-open');}
function renderCasesGrid(){$('casesGrid').innerHTML=CASES.map((c,i)=>`<div class="case-card" onclick="openCase(${i})"><span class="case-icon">${c.icon}</span><div class="case-name">${c.name}</div><div class="case-price">${c.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join('');}
function renderAllInventory(){$('invTotalCount').textContent=inventory.length;$('invTotalPrice').textContent=inventory.reduce((s,i)=>s+i.price,0);if(inventory.length===0)$('inventoryGrid').innerHTML='<div style="text-align:center;padding:30px;">📦 Пусто</div>';else $('inventoryGrid').innerHTML=inventory.map(i=>`<div class="inv-item"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="sellItem(${i.id})">Продать</button></div>`).join('');renderUpgradeInventory();renderContractInventory();updateUpgradeUI();updateContractUI();}
function renderUpgradeInventory(){if(inventory.length===0)$('upgradeInventoryGrid').innerHTML='<div style="text-align:center;padding:15px;">Нет скинов</div>';else $('upgradeInventoryGrid').innerHTML=inventory.map(i=>{const s=selUp.has(i.id);return`<div class="inv-item"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="toggleUpgradeSelection(${i.id})" style="background:${s?'rgba(255,106,0,0.5)':'rgba(30,35,48,0.9)'}">${s?'✓':'Выбрать'}</button></div>`;}).join('');}
function renderContractInventory(){if(inventory.length===0)$('contractInventoryGrid').innerHTML='<div style="text-align:center;padding:15px;">Нет скинов</div>';else $('contractInventoryGrid').innerHTML=inventory.map(i=>{const s=selCon.has(i.id);return`<div class="inv-item"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="toggleContractSelection(${i.id})" style="background:${s?'rgba(123,47,190,0.5)':'rgba(30,35,48,0.9)'}">${s?'✓':'Выбрать'}</button></div>`;}).join('');}
function renderProfile(){$('profileContent').innerHTML=`<h2>👤 Профиль</h2><div style="padding:10px;background:rgba(10,12,22,0.6);border-radius:8px;margin:10px 0;"><div>Привет, <strong style="color:var(--gold);">${currentUser||'Гость'}</strong>!</div><div style="color:var(--text2);">Баланс: <strong>${balance}</strong> <i class="fas fa-coins coin-icon"></i></div><div style="color:var(--text2);">Скинов: <strong>${inventory.length}</strong></div></div><h3>📋 История</h3>${history.length?history.slice().reverse().slice(0,50).map(h=>`<div style="display:flex;align-items:center;gap:5px;padding:5px;background:rgba(20,24,38,0.5);border-radius:5px;margin-bottom:2px;font-size:10px;"><span>${h.type==='case'?'💎':'⚡'}</span><div style="flex:1;"><div>${h.skin}</div><div style="font-size:8px;color:var(--text2);">${new Date(h.time).toLocaleString()}</div></div><div style="color:var(--gold);">${h.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join(''):'<div style="text-align:center;padding:15px;">Пусто</div>'}`;}
function sellItem(id){const idx=inventory.findIndex(i=>i.id===id);if(idx===-1)return;balance+=inventory[idx].price;updateBalanceUI();inventory.splice(idx,1);selUp.delete(id);selCon.delete(id);renderAllInventory();saveGame();}
function toggleUpgradeSelection(id){if(isUpgrading)return;selUp.has(id)?selUp.delete(id):selUp.add(id);renderAllInventory();}
function toggleContractSelection(id){if(isContracting)return;selCon.has(id)?selCon.delete(id):(selCon.size>=10?alert('Максимум 10!'):selCon.add(id));renderAllInventory();}

// ИСПРАВЛЕННЫЙ АПГРЕЙД
function updateUpgradeUI(){
    const si=inventory.filter(i=>selUp.has(i.id));
    const tp=si.reduce((s,i)=>s+i.price,0);
    $('upgradeInputTotal').textContent=tp;
    if(si.length===0){
        $('upgradeInputSkins').innerHTML='<span style="color:var(--text2);">Выберите скины</span>';
        $('upgradeResult').innerHTML='<span style="color:var(--text2);">Ожидание</span>';
    }else{
        $('upgradeInputSkins').innerHTML=si.map(i=>`<span style="font-size:16px;">${i.icon}</span>`).join(' ');
        const ts=getSkinByPrice(tp*selMult);
        $('upgradeResult').innerHTML=`<div style="font-size:28px;">${ts.icon}</div><div style="font-weight:700;">${ts.name}</div><div style="color:var(--gold);">${ts.price} <i class="fas fa-coins coin-icon"></i></div>`;
        $('upgradeResult').dataset.targetSkin=JSON.stringify(ts);
    }
    $('upgradeBtn').disabled=si.length<1||isUpgrading;
}

function performUpgrade(){
    if(isUpgrading)return;
    const si=inventory.filter(i=>selUp.has(i.id));
    if(si.length<1)return alert('Выбери минимум 1 скин!');
    isUpgrading=!0;
    $('upgradeBtn').disabled=!0;
    setTimeout(()=>{
        const ok=Math.random()*100<selChance;
        if(ok){
            const td=JSON.parse($('upgradeResult').dataset.targetSkin||'null');
            if(td){
                inventory=inventory.filter(i=>!selUp.has(i.id));
                selUp.clear();
                const ni={...td,id:idCounter++};
                inventory.push(ni);
                history.push({type:'upgrade',skin:ni.name,price:ni.price,time:new Date().toISOString()});
                addDrop(ni.name,ni.icon,ni.price,ni.rarity);
                alert('✅ Апгрейд успешен! Получено: '+ni.name);
            }
        }else{
            inventory=inventory.filter(i=>!selUp.has(i.id));
            selUp.clear();
            alert('❌ Апгрейд провален! Скины сгорели.');
        }
        isUpgrading=!1;
        renderAllInventory();
        saveGame();
    },800);
}

function updateContractUI(){const si=inventory.filter(i=>selCon.has(i.id));$('contractCount').textContent=si.length;$('contractTotalPrice').textContent=si.reduce((s,i)=>s+i.price,0);$('contractBtn').disabled=si.length<3||si.length>10||isContracting;}
function performContract(){if(isContracting)return;const si=inventory.filter(i=>selCon.has(i.id));if(si.length<3||si.length>10)return alert('Выбери 3-10 скинов!');isContracting=!0;$('contractBtn').disabled=!0;setTimeout(()=>{const tp=si.reduce((s,i)=>s+i.price,0);const mult=Math.random()*2+0.5;const rs=getSkinByPrice(tp*mult);inventory=inventory.filter(i=>!selCon.has(i.id));selCon.clear();const ni={...rs,id:idCounter++};inventory.push(ni);history.push({type:'contract',skin:ni.name,price:ni.price,time:new Date().toISOString()});addDrop(ni.name,ni.icon,ni.price,ni.rarity);$('contractResult').style.display='block';$('contractResult').innerHTML=`<div style="font-size:30px;">${ni.icon}</div><div>${ni.name}</div><div style="color:var(--gold);">${ni.price} <i class="fas fa-coins coin-icon"></i></div>`;isContracting=!1;renderAllInventory();saveGame();},1500);}
function updateBalanceUI(){$('balanceDisplay').textContent=balance;}

// Firebase users
function loadUserData(u){usersRef.child(u).once('value').then(sn=>{const ud=sn.val();if(ud&&ud.saveData){balance=ud.saveData.balance||1000;inventory=ud.saveData.inventory||[];idCounter=ud.saveData.idCounter||0;history=ud.saveData.history||[];currentUser=u;renderAllInventory();updateBalanceUI();$('registerBtn').style.display='none';$('userInfo').style.display='flex';$('userNickname').textContent='👑 '+u;if(u==='Admin'){$('adminBtn').style.display='block';$('userNickname').textContent='⚡ Admin';}localStorage.setItem('skinVault_lastUser',u);navigateTo('cases');}});}
function saveGame(){if(!currentUser)return;usersRef.child(currentUser).child('saveData').set({balance,inventory,idCounter,history});}
function showAdminPanel(){$('adminModal').style.display='flex';$('adminTargetUser').focus();}
function adminGiveCoins(){const t=$('adminTargetUser').value.trim(),a=parseInt($('adminAmount').value),m=$('adminMsg');m.style.color='#ff4444';if(!t){m.textContent='❌ Введи ник!';return;}if(!a||a<1){m.textContent='❌ Введи сумму!';return;}usersRef.child(t).once('value').then(sn=>{if(!sn.exists()){m.textContent='❌ Пользователь не найден!';return;}const ud=sn.val()||{};const cb=(ud.saveData&&ud.saveData.balance)||1000;usersRef.child(t).child('saveData').update({balance:cb+a}).then(()=>{m.textContent='✅ Выдано '+a+' монет для '+t+'!';m.style.color='#4caf50';$('adminTargetUser').value='';$('adminAmount').value='';if(t===currentUser){balance=cb+a;updateBalanceUI();renderAllInventory();}});});}
function hashPassword(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h=h&h;}return'h_'+Math.abs(h).toString(16);}
function showRegisterModal(){$('registerModal').style.display='flex';$('loginUsername').focus();}function closeModal(){$('registerModal').style.display='none';}
function loginUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}usersRef.child(u).once('value').then(sn=>{if(!sn.exists()){registerUserDirect(u,p);return;}if(sn.val().password!==hashPassword(p)){err.textContent='❌ Неверный пароль!';err.style.display='block';return;}closeModal();loadUserData(u);});}
function registerUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}if(u.length<3){err.textContent='❌ Минимум 3 символа!';err.style.display='block';return;}if(p.length<4){err.textContent='❌ Минимум 4 символа!';err.style.display='block';return;}registerUserDirect(u,p);}
function registerUserDirect(u,p){usersRef.child(u).once('value').then(sn=>{if(sn.exists()&&sn.val().password){alert('❌ Логин занят!');return;}usersRef.child(u).set({password:hashPassword(p),saveData:{balance:1000,inventory:[],idCounter:0,history:[]}}).then(()=>{closeModal();loadUserData(u);});});}
function logoutUser(){saveGame();currentUser=null;$('registerBtn').style.display='block';$('userInfo').style.display='none';$('adminBtn').style.display='none';balance=1000;inventory=[];idCounter=0;history=[];selUp.clear();selCon.clear();renderAllInventory();updateBalanceUI();navigateTo('cases');}

function init(){
    const lastUser=localStorage.getItem('skinVault_lastUser');if(lastUser){usersRef.child(lastUser).once('value').then(sn=>{if(sn.exists())loadUserData(lastUser);});}
    renderCasesGrid();renderAllInventory();updateBalanceUI();
    $('openBtn').addEventListener('click',()=>performSpin(multiSpinCount));$('spinSlider').addEventListener('input',updateSlider);
    document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',function(){navigateTo(this.dataset.page);}));
    document.querySelectorAll('#chanceSelector .btn-sm').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('#chanceSelector .btn-sm').forEach(x=>x.classList.remove('active'));this.classList.add('active');selChance=parseInt(this.dataset.chance);selMult=parseFloat(this.dataset.mult);updateUpgradeUI();}));
    $('upgradeBtn').addEventListener('click',performUpgrade);$('contractBtn').addEventListener('click',performContract);
    $('clearUpgradeBtn').addEventListener('click',()=>{selUp.clear();renderAllInventory();});
    $('registerModal').addEventListener('click',function(e){if(e.target===this)closeModal();});$('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')loginUser();});
}
setInterval(()=>{if(currentUser)saveGame();},10000);init();
onlineRef.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP});
</script>
</body>
