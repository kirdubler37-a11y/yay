const SoundFX = {
    ctx: null,
    init() {
        if (!this.ctx) this.ctx = new(window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    play(t) {
        this.init();
        const ctx = this.ctx, now = ctx.currentTime;
        const tone = (f, d, v = 0.1, ty = 'sine', dl = 0) => {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = ty; o.frequency.setValueAtTime(f, now + dl);
            g.gain.setValueAtTime(v, now + dl);
            g.gain.exponentialRampToValueAtTime(0.001, now + dl + d);
            o.start(now + dl); o.stop(now + dl + d);
        };
        const noise = (d = 0.3, v = 0.05) => {
            const bs = ctx.sampleRate * d, b = ctx.createBuffer(1, bs, ctx.sampleRate),
                dt = b.getChannelData(0);
            for (let i = 0; i < bs; i++) dt[i] = (Math.random() * 2 - 1) * Math.exp(-i / bs * 4);
            const n = ctx.createBufferSource(), ng = ctx.createGain();
            n.buffer = b; n.connect(ng); ng.connect(ctx.destination);
            ng.gain.setValueAtTime(v, now); ng.gain.exponentialRampToValueAtTime(0.001, now + d);
            n.start(now); n.stop(now + d);
        };
        switch (t) {
            case 'case_open': noise(0.35, 0.05); tone(800, 0.12, 0.08, 'square', 0.05); tone(1100, 0.08, 0.05, 'square', 0.15); break;
            case 'case_scroll': noise(0.06, 0.02); tone(1500, 0.02, 0.03, 'triangle', 0.01); break;
            case 'legendary': [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.25, 0.1), i * 100)); break;
            case 'sell': tone(1200, 0.06, 0.06, 'triangle'); tone(800, 0.06, 0.06, 'triangle', 0.06); break;
            case 'upgrade_success': [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.2, 0.1), i * 80)); break;
            case 'upgrade_fail': tone(250, 0.4, 0.1, 'sawtooth'); break;
            case 'contract': [400, 500, 600, 700, 800].forEach((f, i) => setTimeout(() => tone(f, 0.05, 0.05, 'square'), i * 50)); break;
        }
    }
};

function getRarityWeights(cs) {
    const rc = {};
    cs.forEach(s => { rc[s.rarity] = (rc[s.rarity] || 0) + 1; });
    const tl = rc.legendary || 0;
    let w = {};
    if (CASES[currentCaseIndex] && CASES[currentCaseIndex].id === 'yolo') w = { legendary: 5, epic: 0, rare: 0, uncommon: 0, common: 95 };
    else if (tl >= 8) w = { legendary: 5, epic: 20, rare: 35, uncommon: 25, common: 15 };
    else if (tl >= 5) w = { legendary: 3, epic: 18, rare: 32, uncommon: 27, common: 20 };
    else if (tl >= 3) w = { legendary: 1.5, epic: 15, rare: 33, uncommon: 28, common: 22.5 };
    else if (tl >= 1) w = { legendary: 0.8, epic: 12, rare: 30, uncommon: 30, common: 27.2 };
    else if (rc.epic && rc.epic >= 5) w = { legendary: 0, epic: 10, rare: 30, uncommon: 35, common: 25 };
    else w = { legendary: 0, epic: 0, rare: 15, uncommon: 40, common: 45 };
    const t = Object.values(w).reduce((a, b) => a + b, 0);
    if (t > 0) for (const k in w) w[k] = (w[k] / t) * 100;
    return w;
}

function getRandomItem(cs) {
    if (CASES[currentCaseIndex] && CASES[currentCaseIndex].id === 'yolo') {
        const r = Math.random() * 100;
        if (r < 1) return cs.find(s => s.name.includes('Sapphire')) || cs[0];
        if (r < 4) return cs.find(s => s.name.includes('Dragon Lore')) || cs[0];
        if (r < 8) return cs.find(s => s.name.includes('Vice')) || cs[0];
        const c = cs.filter(s => s.rarity === 'common');
        return c[Math.floor(Math.random() * c.length)];
    }
    const w = getRarityWeights(cs), r = Math.random() * 100;
    let cum = 0, sr = 'common';
    for (const [ra, wt] of Object.entries(w)) { cum += wt; if (r <= cum) { sr = ra; break; } }
    const p = cs.filter(s => s.rarity === sr);
    return p.length ? p[Math.floor(Math.random() * p.length)] : cs[Math.floor(Math.random() * cs.length)];
}

function createRouletteElement(index, winSkin, caseSkins) {
    const rd = document.createElement('div');
    rd.className = 'single-roulette-item';
    rd.innerHTML = `<div class="roulette-number">#${index + 1}</div><div class="mini-pointer"></div><div class="mini-tape"></div>`;
    const te = rd.querySelector('.mini-tape');
    for (let i = 0; i < 40; i++) {
        let item = (i === 32 && winSkin) ? winSkin : getRandomItem(caseSkins);
        const c = document.createElement('div');
        c.className = 'mini-skin-card rarity-' + item.rarity;
        c.innerHTML = `<div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">${item.price.toFixed(2)} ₽</div>`;
        te.appendChild(c);
    }
    return { rouletteDiv: rd, tapeEl: te };
}

function spinSingleRoulette(rouletteEl, tapeEl) {
    return new Promise(resolve => {
        const ww = rouletteEl.offsetWidth, targetLeft = -(32 * MINI_CARD_WIDTH) + (ww / 2) - (MINI_CARD_WIDTH / 2);
        tapeEl.style.transition = 'none';
        tapeEl.style.transform = 'translateX(0px)';
        setTimeout(() => {
            tapeEl.style.transition = 'transform 3.5s cubic-bezier(0.06,0.84,0.16,1)';
            tapeEl.style.transform = `translateX(${targetLeft + (Math.random() * 30 - 15)}px)`;
            let sc = 0;
            const si = setInterval(() => { SoundFX.play('case_scroll'); sc++; if (sc > 20) clearInterval(si); }, 150);
            setTimeout(() => { clearInterval(si); resolve(); }, 3600);
        }, 50);
    });
}

async function performSpin(count) {
    if (!currentUser) { alert('❌ Сначала войди в аккаунт!'); showRegisterModal(); return; }
    if (isSpinning) return;
    const c = CASES[currentCaseIndex], totalCost = c.price * count;
    if (balance < totalCost) { alert(`❌ Нужно ${totalCost} ₽`); return; }
    isSpinning = true; $('openBtn').disabled = true;
    balance -= totalCost; updateBalanceUI(); SoundFX.play('case_open');
    const wins = []; for (let i = 0; i < count; i++) wins.push(getRandomItem(c.skins));
    $('allRoulettes').innerHTML = '';
    const rd = [];
    for (let i = 0; i < count; i++) { const r = createRouletteElement(i, wins[i], c.skins); $('allRoulettes').appendChild(r.rouletteDiv); rd.push(r); }
    await Promise.all(rd.map(r => spinSingleRoulette(r.rouletteDiv, r.tapeEl)));
    wins.forEach(ws => { inventory.push({ ...ws, id: idCounter++ }); if (ws.rarity === 'legendary') SoundFX.play('legendary'); });
    renderAllInventory(); saveGame(); isSpinning = false; $('openBtn').disabled = false;
}

function renderCases() {
    $('caseSelector').innerHTML = '';
    CASES.forEach((c, i) => {
        const d = document.createElement('div');
        d.className = `case-option ${i === currentCaseIndex ? 'active' : ''}`;
        d.innerHTML = `<span class="case-icon">${c.icon}</span><div class="case-name">${c.name}</div><div class="case-price">${c.price} ₽</div><div class="case-skins">${c.skins.length} скинов</div>`;
        d.addEventListener('click', () => { currentCaseIndex = i; renderCases(); updateCaseUI(); });
        $('caseSelector').appendChild(d);
    });
    updateCaseUI();
}

function updateCaseUI() { const c = CASES[currentCaseIndex]; $('caseName').textContent = c.icon + ' ' + c.name; $('casePrice').textContent = c.price; }

function renderAllInventory() {
    $('invCount').textContent = inventory.length;
    $('invTotalCount').textContent = inventory.length;
    $('invTotalPrice').textContent = inventory.reduce((s, i) => s + i.price, 0).toFixed(2);
    if (inventory.length === 0) $('inventoryGrid').innerHTML = '<div class="empty-inv"><i class="fas fa-box-open"></i>Инвентарь пуст</div>';
    else {
        $('inventoryGrid').innerHTML = '';
        inventory.forEach(i => {
            const d = document.createElement('div');
            d.className = 'inv-item rarity-' + i.rarity;
            d.innerHTML = `<span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price.toFixed(2)} ₽</div><button class="btn-sell" onclick="sellItem(${i.id})">Продать</button>`;
            $('inventoryGrid').appendChild(d);
        });
    }
}

function sellItem(id) {
    const idx = inventory.findIndex(i => i.id === id);
    if (idx === -1) return;
    balance += inventory[idx].price;
    updateBalanceUI();
    inventory.splice(idx, 1);
    renderAllInventory();
    SoundFX.play('sell');
    saveGame();
}

function hashPassword(pw) { let h = 0; for (let i = 0; i < pw.length; i++) { const c = pw.charCodeAt(i); h = ((h << 5) - h) + c; h = h & h; } return 'h_' + Math.abs(h).toString(16); }

    const db = getUsersDB(), ud = db[username];

}

            <div id="registerForm" style="display:none;">
                <input type="text" id="regUsername" placeholder="Придумай логин" style="width:100%;padding:12px;margin-bottom:10px;background:rgba(10,12,22,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px;outline:none;">
                <input type="password" id="regPassword" placeholder="Пароль" style="width:100%;padding:12px;margin-bottom:10px;background:rgba(10,12,22,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px;outline:none;">
                <input type="password" id="regPassword2" placeholder="Повтори пароль" style="width:100%;padding:12px;margin-bottom:15px;background:rgba(10,12,22,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:15px;outline:none;">
                <button onclick="registerUser()" style="width:100%;padding:14px;background:linear-gradient(135deg,#7b2fbe,#5a1a8a);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;">✅ СОЗДАТЬ</button>
            </div>
            <div id="authError" style="color:#ff4444;font-size:13px;margin-top:12px;display:none;"></div>
            <button onclick="document.getElementById('registerModal').remove()" style="margin-top:15px;background:transparent;border:none;color:rgba(255,255,255,0.3);cursor:pointer;">✕ Закрыть</button>
        </div>`;
    document.body.appendChild(m);
    $('loginPassword').addEventListener('keypress', e => { if (e.key === 'Enter') loginUser(); });
    $('regPassword2').addEventListener('keypress', e => { if (e.key === 'Enter') registerUser(); });
    m.addEventListener('click', e => { if (e.target === m) m.remove(); });
}

function switchAuthTab(tab) {
    $('tabLogin').style.background = tab === 'login' ? 'rgba(255,106,0,0.2)' : 'rgba(20,24,38,0.8)';
    $('tabLogin').style.borderColor = tab === 'login' ? '#ff6a00' : 'rgba(255,255,255,0.1)';
    $('tabLogin').style.color = tab === 'login' ? '#ffaa00' : 'rgba(255,255,255,0.5)';
    $('tabRegister').style.background = tab === 'register' ? 'rgba(123,47,190,0.2)' : 'rgba(20,24,38,0.8)';
    $('tabRegister').style.borderColor = tab === 'register' ? '#7b2fbe' : 'rgba(255,255,255,0.1)';
    $('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    $('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    $('authError').style.display = 'none';
}

function loginUser() {
    const u = $('loginUsername').value.trim(), p = $('loginPassword').value, err = $('authError');
    if (!u || !p) { err.textContent = '❌ Заполни все поля!'; err.style.display = 'block'; return; }
    const db = getUsersDB(), hp = hashPassword(p);
    if (!db[u]) { err.textContent = '❌ Пользователь не найден!'; err.style.display = 'block'; return; }
    if (db[u].password !== hp) { err.textContent = '❌ Неверный пароль!'; err.style.display = 'block'; return; }
    $('registerModal').remove(); loadUserData(u); localStorage.setItem('skinVault_lastUser', u);
}

function registerUser() {
    const u = $('regUsername').value.trim(), p = $('regPassword').value, p2 = $('regPassword2').value, err = $('authError');
    if (!u || !p) { err.textContent = '❌ Заполни все поля!'; err.style.display = 'block'; return; }
    if (u.length < 3) { err.textContent = '❌ Логин минимум 3 символа!'; err.style.display = 'block'; return; }
    if (p.length < 4) { err.textContent = '❌ Пароль минимум 4 символа!'; err.style.display = 'block'; return; }
    if (p !== p2) { err.textContent = '❌ Пароли не совпадают!'; err.style.display = 'block'; return; }
    const db = getUsersDB(); if (db[u]) { err.textContent = '❌ Логин занят!'; err.style.display = 'block'; return; }
    db[u] = { password: hashPassword(p), saveData: { balance: 1000, inventory: [], idCounter: 0 } };
    saveUsersDB(db);
    $('registerModal').remove(); loadUserData(u); localStorage.setItem('skinVault_lastUser', u);
}

function logoutUser() { saveGame(); currentUser = null; hideUserInfo(); balance = 1000; inventory = []; idCounter = 0; renderAllInventory(); updateBalanceUI(); }

// ============================================================
//  ЗАПУСК
// ============================================================
function initGame() {
    const lastUser = localStorage.getItem('skinVault_lastUser');
    if (lastUser) { const db = getUsersDB(); if (db[lastUser]) loadUserData(lastUser); }
    renderCases(); renderAllInventory(); updateBalanceUI();
    $('openBtn').addEventListener('click', () => performSpin(multiSpinCount));
    document.querySelectorAll('.multi-spin-btn').forEach(b => b.addEventListener('click', function() {
        document.querySelectorAll('.multi-spin-btn').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        multiSpinCount = parseInt(this.dataset.count);
        $('spinCountDisplay').textContent = multiSpinCount;
    }));
    document.querySelectorAll('.tab-btn').forEach(t => t.addEventListener('click', function() {
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        $('tab-' + this.dataset.tab).classList.add('active');
        if (['inventory', 'upgrade', 'contract'].includes(this.dataset.tab)) renderAllInventory();
    }));
    document.addEventListener('click', () => SoundFX.init(), { once: true });
}

setInterval(() => { if (currentUser) saveGame(); }, 10000);
window.addEventListener('beforeunload', () => { if (currentUser) saveGame(); });

initGame();
</script>
