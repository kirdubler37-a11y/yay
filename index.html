<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaseBattle | Кейсы + Апгрейд</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #12131a;
            color: #fff;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 30px;
            padding: 15px 25px;
            background: #1a1c24;
            border-radius: 10px;
            border-bottom: 3px solid #ff9d00;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: 800; }
        .logo span { color: #ff9d00; }
        .balance { font-size: 20px; font-weight: bold; color: #ff9d00; }
        .balance i { margin-right: 8px; }
        .balance span { color: #fff; }

        .tabs {
            display: flex;
            gap: 10px;
            max-width: 1100px;
            margin: 0 auto 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #1a1c24;
            border: none;
            color: #8895aa;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Arial', sans-serif;
        }
        .tab-btn:hover { background: #2d313f; color: #fff; }
        .tab-btn.active { background: #ff9d00; color: #12131a; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* КЕЙС */
        .case-container {
            max-width: 700px;
            margin: 0 auto;
            background: #1a1c24;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .case-container h3 { font-size: 22px; margin-bottom: 5px; }
        .case-container .sub { color: #8895aa; margin-bottom: 15px; }
        .case-container .price-tag { color: #ff9d00; font-weight: bold; font-size: 18px; }

        /* РУЛЕТКА */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 130px;
            background: #111217;
            margin: 20px auto;
            overflow: hidden;
            border-radius: 8px;
            border: 2px solid #2d313f;
        }
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #ff9d00;
            z-index: 10;
            box-shadow: 0 0 15px #ff9d00;
        }
        .roulette-tape {
            display: flex;
            position: absolute;
            left: 0;
            top: 10px;
            transition: transform 4s cubic-bezier(0.1, 1, 0.1, 1);
            will-change: transform;
        }
        .skin-card {
            width: 110px;
            height: 110px;
            margin: 0 5px;
            background: #1e202b;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            padding: 5px;
            box-sizing: border-box;
            border-bottom: 4px solid #fff;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .skin-card .icon { font-size: 36px; margin-bottom: 4px; }
        .skin-card .name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; font-size: 11px; }
        .skin-card .price { font-size: 10px; color: #8895aa; margin-top: 2px; }

        /* Редкости */
        .rarity-legendary { border-bottom-color: #eb4b4b; background: linear-gradient(180deg, #1e202b 60%, rgba(235,75,75,0.15)); }
        .rarity-epic { border-bottom-color: #d32ce6; background: linear-gradient(180deg, #1e202b 60%, rgba(211,44,230,0.15)); }
        .rarity-rare { border-bottom-color: #8847ff; background: linear-gradient(180deg, #1e202b 60%, rgba(136,71,255,0.15)); }
        .rarity-uncommon { border-bottom-color: #4b69ff; background: linear-gradient(180deg, #1e202b 60%, rgba(75,105,255,0.15)); }
        .rarity-common { border-bottom-color: #6b7a8a; background: linear-gradient(180deg, #1e202b 60%, rgba(107,122,138,0.15)); }

        .btn-open {
            background: linear-gradient(135deg, #ff9d00, #ed6c02);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(237,108,2,0.4);
            transition: 0.2s;
            font-family: 'Arial', sans-serif;
            width: 100%;
            max-width: 300px;
            margin: 10px auto 0;
            display: block;
        }
        .btn-open:hover { transform: scale(1.03); }
        .btn-open:disabled { background: #444; box-shadow: none; cursor: not-allowed; transform: none; }

        /* ИНВЕНТАРЬ */
        .inventory-section {
            max-width: 1100px;
            margin: 0 auto;
            background: #1a1c24;
            padding: 25px;
            border-radius: 12px;
        }
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .inventory-header h3 { font-size: 20px; }
        .inventory-header .stats { color: #8895aa; font-size: 14px; }
        .inventory-header .stats strong { color: #fff; }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }
        .inventory-grid::-webkit-scrollbar { width: 4px; }
        .inventory-grid::-webkit-scrollbar-track { background: #1a1c24; }
        .inventory-grid::-webkit-scrollbar-thumb { background: #ff9d00; border-radius: 8px; }

        .inv-item {
            background: #1e202b;
            border-radius: 8px;
            padding: 12px 10px;
            text-align: center;
            border-bottom: 4px solid #6b7a8a;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
        }
        .inv-item:hover { transform: translateY(-3px); border-color: #ff9d00; }
        .inv-item.selected {
            border-color: #ff9d00;
            box-shadow: 0 0 20px rgba(255, 157, 0, 0.3);
            transform: scale(1.02);
        }
        .inv-item .icon { font-size: 32px; display: block; margin-bottom: 4px; }
        .inv-item .name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-item .price { font-size: 11px; color: #8895aa; margin: 4px 0 8px; }
        .inv-item .select-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff9d00;
            color: #12131a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-sell {
            background: #2d313f;
            border: none;
            color: #fff;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Arial', sans-serif;
            margin: 2px;
        }
        .btn-sell:hover { background: #ff9d00; color: #12131a; }

        .btn-upgrade {
            background: linear-gradient(135deg, #7b2fbe, #4a1a7a);
            color: #fff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Arial', sans-serif;
            box-shadow: 0 4px 15px rgba(123, 47, 190, 0.4);
        }
        .btn-upgrade:hover { transform: scale(1.03); }
        .btn-upgrade:disabled { background: #444; box-shadow: none; cursor: not-allowed; transform: none; }

        .upgrade-section {
            background: #13161f;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border: 1px solid #2d313f;
        }
        .upgrade-section .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .upgrade-section .selected-count {
            color: #8895aa;
        }
        .upgrade-section .selected-count strong {
            color: #ff9d00;
        }

        .empty-inv {
            grid-column: 1 / -1;
            color: #5a677a;
            text-align: center;
            padding: 40px 20px;
            font-size: 16px;
        }
        .empty-inv i { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.4; }

        /* Модальное окно результата апгрейда */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1c24;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 400px;
            border: 2px solid #ff9d00;
            animation: scaleIn 0.3s;
        }
        .modal-content .big-icon { font-size: 80px; display: block; margin: 20px 0; }
        .modal-content h2 { margin-bottom: 10px; }
        .modal-content .result-rarity {
            font-size: 18px;
            font-weight: bold;
            color: #ff9d00;
        }
        .modal-content .close-modal {
            background: #ff9d00;
            color: #12131a;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        .modal-content .close-modal:hover { transform: scale(1.05); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 640px) {
            .skin-card { width: 80px; height: 90px; }
            .skin-card .icon { font-size: 28px; }
            .roulette-wrapper { height: 110px; }
            .inventory-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            header { flex-direction: column; text-align: center; }
            .upgrade-section .info { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fas fa-box-open"></i> CASE-<span>BATTLE</span></div>
        <div class="balance"><i class="fas fa-coins"></i> <span id="balanceDisplay">1000</span></div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" data-tab="case"><i class="fas fa-gem"></i> Кейс</button>
        <button class="tab-btn" data-tab="inventory"><i class="fas fa-backpack"></i> Инвентарь (<span id="invCount">0</span>)</button>
    </div>

    <!-- КЕЙС -->
    <div class="tab-content active" id="tab-case">
        <div class="case-container">
            <h3>🔥 КЕЙС «ЛУЧШИЙ ВЫБОР»</h3>
            <div class="sub">Стоимость открытия: <span class="price-tag">50</span></div>
            <div class="roulette-wrapper">
                <div class="pointer"></div>
                <div class="roulette-tape" id="tape"></div>
            </div>
            <button class="btn-open" id="openBtn"><i class="fas fa-key"></i> ОТКРЫТЬ КЕЙС</button>
        </div>
    </div>

    <!-- ИНВЕНТАРЬ + АПГРЕЙД -->
    <div class="tab-content" id="tab-inventory">
        <div class="inventory-section">
            <div class="inventory-header">
                <h3><i class="fas fa-backpack"></i> Инвентарь</h3>
                <div class="stats">
                    Предметов: <strong id="invTotalCount">0</strong> &nbsp;|&nbsp; Стоимость: <strong id="invTotalPrice">0.00</strong> $
                </div>
            </div>

            <!-- Секция апгрейда -->
            <div class="upgrade-section">
                <div class="info">
                    <div>
                        <strong style="color:#ff9d00;">⚡ АПГРЕЙД СКИНОВ</strong>
                        <div class="selected-count">Выбрано: <strong id="selectedCount">0</strong> / 5</div>
                    </div>
                    <div>
                        <button class="btn-upgrade" id="upgradeBtn" disabled>
                            <i class="fas fa-arrow-up"></i> ОБЪЕДИНИТЬ
                        </button>
                        <button class="btn-sell" id="clearSelectionBtn" style="margin-left:8px; padding:8px 16px;">
                            <i class="fas fa-times"></i> Сброс
                        </button>
                    </div>
                </div>
            </div>

            <div class="inventory-grid" id="inventoryGrid">
                <div class="empty-inv">
                    <i class="fas fa-box-open"></i>
                    Инвентарь пуст<br>
                    <span style="font-size:13px; color:#5a677a;">Открой кейс, чтобы получить скины</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно результата апгрейда -->
    <div class="modal" id="upgradeModal">
        <div class="modal-content">
            <h2>🔮 АПГРЕЙД УСПЕШЕН!</h2>
            <span class="big-icon" id="modalIcon">🔥</span>
            <div style="font-size:22px; font-weight:bold;" id="modalName">Новый скин</div>
            <div class="result-rarity" id="modalRarity">⭐ РЕДКОСТЬ</div>
            <div style="color:#8895aa; margin:8px 0;" id="modalPrice">$0.00</div>
            <button class="close-modal" onclick="closeModal()"><i class="fas fa-check"></i> Отлично!</button>
        </div>
    </div>

    <script>
    (function() {
        // ----- КОНФИГ СКИНОВ -----
        const SKINS = [
            { name: "AWP | Dragon Lore", rarity: "legendary", icon: "👑", price: 120.00 },
            { name: "M4A4 | Howl", rarity: "legendary", icon: "🐺", price: 89.99 },
            { name: "Керамбит | Градиент", rarity: "legendary", icon: "🔪", price: 150.00 },
            { name: "AK-47 | Вулканический", rarity: "epic", icon: "🔥", price: 45.90 },
            { name: "Desert Eagle | Код красный", rarity: "epic", icon: "🔫", price: 38.50 },
            { name: "Glock-18 | Королева", rarity: "rare", icon: "👸", price: 22.00 },
            { name: "USP-S | Сайрекс", rarity: "rare", icon: "⚡", price: 18.75 },
            { name: "M4A1-S | Взгляд", rarity: "uncommon", icon: "👁️", price: 8.75 },
            { name: "MP9 | Зелёный", rarity: "common", icon: "🔫", price: 2.50 },
            { name: "MAG-7 | Медь", rarity: "common", icon: "🔫", price: 3.20 },
        ];

        const RARITY_WEIGHTS = {
            legendary: 2,
            epic: 5,
            rare: 15,
            uncommon: 30,
            common: 48,
        };

        // Порядок редкостей для апгрейда
        const RARITY_ORDER = ['common', 'uncommon', 'rare', 'epic', 'legendary'];
        const RARITY_NEXT = {
            'common': 'uncommon',
            'uncommon': 'rare',
            'rare': 'epic',
            'epic': 'legendary',
            'legendary': 'legendary' // максимум
        };

        // ----- СОСТОЯНИЕ -----
        let balance = 1000;
        const OPEN_COST = 50;
        let inventory = [];
        let idCounter = 0;
        let isSpinning = false;
        let selectedForUpgrade = new Set(); // хранит id

        // DOM
        const tape = document.getElementById('tape');
        const openBtn = document.getElementById('openBtn');
        const balanceSpan = document.getElementById('balanceDisplay');
        const inventoryGrid = document.getElementById('inventoryGrid');
        const invCount = document.getElementById('invCount');
        const invTotalCount = document.getElementById('invTotalCount');
        const invTotalPrice = document.getElementById('invTotalPrice');
        const selectedCount = document.getElementById('selectedCount');
        const upgradeBtn = document.getElementById('upgradeBtn');
        const clearSelectionBtn = document.getElementById('clearSelectionBtn');
        const modal = document.getElementById('upgradeModal');

        const CARD_WIDTH = 120;

        // ----- ВСПОМОГАТЕЛЬНЫЕ -----
        function getRandomItem() {
            const rarityKeys = Object.keys(RARITY_WEIGHTS);
            const totalWeight = rarityKeys.reduce((sum, k) => sum + RARITY_WEIGHTS[k], 0);
            let rand = Math.random() * totalWeight;
            let selectedRarity = 'common';
            for (const key of rarityKeys) {
                rand -= RARITY_WEIGHTS[key];
                if (rand <= 0) { selectedRarity = key; break; }
            }
            const pool = SKINS.filter(item => item.rarity === selectedRarity);
            return pool.length ? pool[Math.floor(Math.random() * pool.length)] : SKINS[0];
        }

        function getRarityIndex(rarity) { return RARITY_ORDER.indexOf(rarity); }

        // ----- ГЕНЕРАЦИЯ ЛЕНТЫ -----
        function generateTapeItems(winSkin = null) {
            tape.innerHTML = '';
            const count = 40;
            const items = [];
            const winIndex = 32;
            
            for (let i = 0; i < count; i++) {
                if (i === winIndex && winSkin) {
                    items.push(winSkin);
                } else {
                    items.push(getRandomItem());
                }
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = `skin-card rarity-${item.rarity}`;
                card.innerHTML = `
                    <div class="icon">${item.icon}</div>
                    <div class="name">${item.name}</div>
                    <div class="price">$${item.price.toFixed(2)}</div>
                `;
                tape.appendChild(card);
            });

            return { items, winIndex };
        }

        // ----- РЕНДЕР ИНВЕНТАРЯ -----
        function renderInventory() {
            invCount.textContent = inventory.length;
            invTotalCount.textContent = inventory.length;
            const total = inventory.reduce((sum, item) => sum + item.price, 0);
            invTotalPrice.textContent = total.toFixed(2);
            selectedCount.textContent = selectedForUpgrade.size;

            upgradeBtn.disabled = selectedForUpgrade.size < 5;

            if (inventory.length === 0) {
                inventoryGrid.innerHTML = `
                    <div class="empty-inv">
                        <i class="fas fa-box-open"></i>
                        Инвентарь пуст<br>
                        <span style="font-size:13px; color:#5a677a;">Открой кейс, чтобы получить скины</span>
                    </div>
                `;
                return;
            }

            inventoryGrid.innerHTML = '';
            inventory.forEach(item => {
                const div = document.createElement('div');
                div.className = `inv-item rarity-${item.rarity}`;
                if (selectedForUpgrade.has(item.id)) {
                    div.classList.add('selected');
                }
                div.innerHTML = `
                    <span class="icon">${item.icon}</span>
                    <div class="name">${item.name}</div>
                    <div class="price">$${item.price.toFixed(2)}</div>
                    <div>
                        <button class="btn-sell" data-id="${item.id}" data-action="sell"><i class="fas fa-dollar-sign"></i> Продать</button>
                        <button class="btn-sell" data-id="${item.id}" data-action="select" style="background:${selectedForUpgrade.has(item.id) ? '#ff9d00' : '#2d313f'}; color:${selectedForUpgrade.has(item.id) ? '#12131a' : '#fff'}">
                            ${selectedForUpgrade.has(item.id) ? '✓ Выбран' : 'Выбрать'}
                        </button>
                    </div>
                    ${selectedForUpgrade.has(item.id) ? `<div class="select-badge">${Array.from(selectedForUpgrade).indexOf(item.id) + 1}</div>` : ''}
                `;
                inventoryGrid.appendChild(div);
            });

            // Обработчики кнопок
            document.querySelectorAll('.btn-sell').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const action = this.dataset.action;
                    if (action === 'sell') {
                        sellItem(id);
                    } else if (action === 'select') {
                        toggleSelect(id);
                    }
                });
            });
        }

        // ----- ВЫБОР ДЛЯ АПГРЕЙДА -----
        function toggleSelect(id) {
            const item = inventory.find(i => i.id === id);
            if (!item) return;

            if (selectedForUpgrade.has(id)) {
                selectedForUpgrade.delete(id);
            } else {
                if (selectedForUpgrade.size >= 5) {
                    alert('Можно выбрать только 5 скинов для апгрейда!');
                    return;
                }
                // Проверяем, все ли скины одного уровня (или ниже)
                const selectedItems = inventory.filter(i => selectedForUpgrade.has(i.id));
                const maxRarity = selectedItems.reduce((max, i) => {
                    const idx = getRarityIndex(i.rarity);
                    return idx > max ? idx : max;
                }, -1);
                
                const currentRarityIdx = getRarityIndex(item.rarity);
                if (selectedItems.length > 0 && currentRarityIdx > maxRarity) {
                    alert(`Нельзя выбрать скин редкости выше, чем уже выбранные!`);
                    return;
                }
                
                selectedForUpgrade.add(id);
            }
            renderInventory();
        }

        // ----- ПРОДАЖА -----
        function sellItem(id) {
            const index = inventory.findIndex(item => item.id === id);
            if (index === -1) return;
            const item = inventory[index];
            balance += item.price;
            updateBalanceUI();
            inventory.splice(index, 1);
            selectedForUpgrade.delete(id);
            renderInventory();
            
            openBtn.textContent = `💰 +$${item.price.toFixed(2)}`;
            setTimeout(() => {
                openBtn.innerHTML = '<i class="fas fa-key"></i> ОТКРЫТЬ КЕЙС';
            }, 800);
        }

        // ----- АПГРЕЙД -----
        function upgradeItems() {
            if (selectedForUpgrade.size < 5) {
                alert('Выбери 5 скинов для апгрейда!');
                return;
            }

            const selectedItems = inventory.filter(item => selectedForUpgrade.has(item.id));
            
            // Определяем максимальную редкость среди выбранных
            const maxRarity = selectedItems.reduce((max, item) => {
                const idx = getRarityIndex(item.rarity);
                return idx > max ? idx : max;
            }, 0);

            // Шанс на апгрейд: 65% (можно настроить)
            const upgradeChance = 0.65;
            const success = Math.random() < upgradeChance;

            let resultRarity;
            if (success && maxRarity < RARITY_ORDER.length - 1) {
                // Успех — повышаем редкость
                resultRarity = RARITY_ORDER[maxRarity + 1];
            } else {
                // Неудача — остаётся та же редкость
                resultRarity = RARITY_ORDER[maxRarity];
            }

            // Ищем скин нужной редкости
            const pool = SKINS.filter(s => s.rarity === resultRarity);
            const resultSkin = pool.length ? pool[Math.floor(Math.random() * pool.length)] : SKINS[0];

            // Удаляем выбранные скины
            const idsToRemove = Array.from(selectedForUpgrade);
            inventory = inventory.filter(item => !selectedForUpgrade.has(item.id));
            selectedForUpgrade.clear();

            // Добавляем новый скин
            const newItem = {
                ...resultSkin,
                id: idCounter++
            };
            inventory.push(newItem);

            renderInventory();
            updateBalanceUI();

            // Показываем модалку с результатом
            showUpgradeModal(resultSkin, success);
        }

        // ----- МОДАЛКА РЕЗУЛЬТАТА -----
        function showUpgradeModal(skin, success) {
            document.getElementById('modalIcon').textContent = skin.icon;
            document.getElementById('modalName').textContent = skin.name;
            document.getElementById('modalRarity').textContent = success ? `⭐ АПГРЕЙДЕН! (${skin.rarity})` : `🔄 ОСТАЛСЯ (${skin.rarity})`;
            document.getElementById('modalRarity').style.color = success ? '#4caf50' : '#ff9d00';
            document.getElementById('modalPrice').textContent = `$${skin.price.toFixed(2)}`;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // Закрытие по клику вне модалки
        modal.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ----- ОБНОВЛЕНИЕ БАЛАНСА -----
        function updateBalanceUI() {
            balanceSpan.textContent = balance.toFixed(0);
        }

        // ----- ОТКРЫТИЕ КЕЙСА -----
        function openCase() {
            if (isSpinning) return;
            if (balance < OPEN_COST) {
                alert('❌ Недостаточно средств!');
                return;
            }

            balance -= OPEN_COST;
            updateBalanceUI();

            isSpinning = true;
            openBtn.disabled = true;
            openBtn.textContent = '🎰 КРУТИМ...';

            const winSkin = getRandomItem();

            tape.style.transition = 'none';
            tape.style.transform = 'translateX(0px)';
            generateTapeItems(winSkin);

            const wrapper = document.querySelector('.roulette-wrapper');
            const wrapperWidth = wrapper.offsetWidth;
            const winIndex = 32;
            const targetLeft = -(winIndex * CARD_WIDTH) + (wrapperWidth / 2) - (CARD_WIDTH / 2);

            setTimeout(() => {
                tape.style.transition = 'transform 4s cubic-bezier(0.1, 1, 0.1, 1)';
                const innerRandom = (Math.random() * 40) - 20;
                tape.style.transform = `translateX(${targetLeft + innerRandom}px)`;
            }, 50);

            setTimeout(() => {
                const newItem = {
                    ...winSkin,
                    id: idCounter++
                };
                inventory.push(newItem);
                renderInventory();

                isSpinning = false;
                openBtn.disabled = false;
                openBtn.innerHTML = '<i class="fas fa-key"></i> ОТКРЫТЬ КЕЙС';
            }, 4200);
        }

        // ----- ВКЛАДКИ -----
        function setupTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = {
                case: document.getElementById('tab-case'),
                inventory: document.getElementById('tab-inventory')
            };

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    const target = this.dataset.tab;
                    Object.keys(contents).forEach(key => {
                        contents[key].classList.toggle('active', key === target);
                    });
                });
            });
        }

        // ----- ОЧИСТКА ВЫБОРА -----
        clearSelectionBtn.addEventListener('click', function() {
            selectedForUpgrade.clear();
            renderInventory();
        });

        // ----- ДЕБАГ -----
        window.setBalance = (amount) => {
            balance = amount;
            updateBalanceUI();
            console.log(`✅ Баланс: ${balance}`);
        };

        // ----- ИНИЦИАЛИЗАЦИЯ -----
        function init() {
            generateTapeItems();
            
            // Демо-скины
            const demoItems = [
                { ...SKINS[5], id: idCounter++ }, // rare
                { ...SKINS[6], id: idCounter++ }, // rare
                { ...SKINS[7], id: idCounter++ }, // uncommon
                { ...SKINS[8], id: idCounter++ }, // common
                { ...SKINS[9], id: idCounter++ }, // common
                { ...SKINS[4], id: idCounter++ }, // epic
                { ...SKINS[3], id: idCounter++ }, // epic
            ];
            inventory = demoItems;
            renderInventory();
            updateBalanceUI();

            setupTabs();
            openBtn.addEventListener('click', openCase);
            upgradeBtn.addEventListener('click', upgradeItems);
        }

        init();
    })();
    </script>
</body>
</html>
