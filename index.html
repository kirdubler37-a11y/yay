        .logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--accent),#ff3c00,var(--accent2),var(--accent));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 4s ease infinite;cursor:pointer}

        .upgrade-container{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;margin:15px 0}

        .upgrade-arrow{font-size:40px;color:var(--accent)}
        @media(max-width:768px){.live-feed{width:200px}.main-content{margin-right:200px}.skin-card{width:80px;height:105px}.roulette-wrapper{height:130px}.upgrade-container{grid-template-columns:1fr}}
    </style>
</head>

<script>

const fbCfg={apiKey:"AIzaSyCiJGNpJByCCbwcufI-NFUFzXjo0HeGd8E",authDomain:"skinvalut.firebaseapp.com",databaseURL:"https://skinvalut-default-rtdb.firebaseio.com",projectId:"skinvalut",storageBucket:"skinvalut.firebasestorage.app",messagingSenderId:"560114772930",appId:"1:560114772930:web:8aa0a87f3c791b27d6845b"};
firebase.initializeApp(fbCfg);
const fbDb=firebase.database(),onlineRef=fbDb.ref('online'),dropsRef=fbDb.ref('drops'),usersRef=fbDb.ref('users');
const myId='u_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);

setInterval(()=>onlineRef.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP}),5000);
onlineRef.on('value',s=>{const d=s.val()||{};const n=Date.now();let c=0;for(const id in d){if(d[id].t&&(n-d[id].t<15000))c++;else onlineRef.child(id).remove();}document.getElementById('onlineCount').textContent=c;});

const CASES=[{id:'premium',name:'👑 Премиум',icon:'👑',price:500,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,7),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'gamma',name:'💚 Gamma',icon:'💚',price:800,skins:[...ALL_SKINS.filter(s=>s.name.includes('★')),...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'bravo',name:'🔥 Bravo',icon:'🔥',price:600,skins:[{name:"AK-47 | Fire Serpent",rarity:"legendary",icon:"🐍",price:680},...ALL_SKINS.filter(s=>s.name.includes('★')).slice(0,2),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'glove',name:'🧤 Gloves',icon:'🧤',price:500,skins:[...ALL_SKINS.filter(s=>s.name.includes('Gloves')||s.name.includes('★')).slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5)]},{id:'chroma',name:'🌈 Chroma',icon:'🌈',price:200,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'standard',name:'📦 Стандарт',icon:'📦',price:100,skins:[...ALL_SKINS.filter(s=>s.rarity==='legendary').slice(3,5),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4)]},{id:'sniper',name:'🎯 Снайпер',icon:'🎯',price:150,skins:[...ALL_SKINS.filter(s=>s.name.includes('AWP')),...ALL_SKINS.filter(s=>s.rarity==='epic').slice(0,3),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,3)]},{id:'snakebite',name:'🐍 Snakebite',icon:'🐍',price:80,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='rare').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='uncommon').slice(0,4),...ALL_SKINS.filter(s=>s.rarity==='common').slice(0,3)]},{id:'starter',name:'🚀 Старт',icon:'🚀',price:30,skins:[...ALL_SKINS.filter(s=>s.rarity==='epic').slice(2,4),...ALL_SKINS.filter(s=>s.rarity==='rare'),...ALL_SKINS.filter(s=>s.rarity==='uncommon')]},{id:'budget',name:'💸 Бюджет',icon:'💸',price:15,skins:[...ALL_SKINS.filter(s=>s.rarity==='rare').slice(2,5),...ALL_SKINS.filter(s=>s.rarity==='uncommon'),...ALL_SKINS.filter(s=>s.rarity==='common')]},{id:'yolo',name:'💀 YOLO',icon:'💀',price:200,skins:[{name:"★ Керамбит | Sapphire",rarity:"legendary",icon:"🔪",price:8500},{name:"AWP | Dragon Lore",rarity:"legendary",icon:"🐉",price:850},{name:"★ Gloves | Vice",rarity:"legendary",icon:"🧤",price:3200},...ALL_SKINS.filter(s=>s.rarity==='common')]}];

// ============================================================
// СОСТОЯНИЕ
// ============================================================
let balance=1000,inventory=[],idCounter=0,isSpinning=!1,currentCaseIndex=0,currentUser=null,history=[];
let selUp=new Set,selCon=new Set,isUpgrading=!1,isContracting=!1,selChance=50,selMult=2;
const $=id=>document.getElementById(id);

function getRandomItem(cs){if(CASES[currentCaseIndex]?.id==='yolo'){const r=Math.random()*100;if(r<1)return cs.find(s=>s.name.includes('Sapphire'));if(r<4)return cs.find(s=>s.name.includes('Dragon Lore'));if(r<8)return cs.find(s=>s.name.includes('Vice'));return cs.filter(s=>s.rarity==='common')[Math.floor(Math.random()*cs.filter(s=>s.rarity==='common').length)];}const w={legendary:1,epic:15,rare:30,uncommon:30,common:24};const r=Math.random()*100;let cum=0;for(const[ra,wt]of Object.entries(w)){cum+=wt;if(r<=cum){const p=cs.filter(s=>s.rarity===ra);if(p.length)return p[Math.floor(Math.random()*p.length)];}}return cs[Math.floor(Math.random()*cs.length)];}
function getSkinByPrice(tp){let b=ALL_SKINS[0],bd=Infinity;for(const s of ALL_SKINS){const d=Math.abs(s.price-tp);if(d<bd){bd=d;b=s;}}return b;}

// ============================================================
// РУЛЕТКА (РАБОЧАЯ АНИМАЦИЯ - ФИНАЛ)
// ============================================================
function generateTape(winSkin,caseSkins){
    const tape=$('rouletteTape');if(!tape)return;
    let html='';
    for(let i=0;i<40;i++){
        let item=(i===32&&winSkin)?winSkin:getRandomItem(caseSkins);
        html+=`<div class="skin-card rarity-${item.rarity}"><div class="icon">${item.icon}</div><div class="name">${item.name}</div><div class="price">${item.price} <i class="fas fa-coins coin-icon"></i></div></div>`;
    }
    tape.innerHTML=html;
    // Начальная позиция - лента справа (не видна)
    tape.style.transition='none';
    tape.style.transform='translateX(600px)';
}

function spinRoulette(){
    return new Promise(resolve=>{
        const container=$('rouletteContainer');
        const tape=$('rouletteTape');
        if(!container||!tape){resolve();return;}
        
        const ww=container.offsetWidth||800;
        const cardWidth=112;
        const targetLeft=-(32*cardWidth)+(ww/2)-(cardWidth/2);
        const randomOffset=Math.random()*30-15;
        
        // Запускаем анимацию через requestAnimationFrame для гарантии
        requestAnimationFrame(()=>{
            requestAnimationFrame(()=>{
                tape.style.transition='transform 3s cubic-bezier(0.1,0.9,0.2,1)';
                tape.style.transform=`translateX(${targetLeft+randomOffset}px)`;
                setTimeout(resolve,3200);
            });
        });
    });
}

async function openCase(){
    if(!currentUser){alert('❌ Сначала войди в аккаунт!');showRegisterModal();return;}
    if(isSpinning)return;
    
    const c=CASES[currentCaseIndex];
    if(balance<c.price){alert(`❌ Нужно ${c.price} монет!`);return;}
    
    isSpinning=true;
    $('openBtn').disabled=true;
    $('openBtn').textContent='🎰 КРУТИМ...';
    balance-=c.price;
    updateBalanceUI();
    
    const winSkin=getRandomItem(c.skins);
    
    // Генерируем ленту (начальная позиция 600px - справа, не видна)
    generateTape(winSkin,c.skins);
    
    // Запускаем анимацию
    await spinRoulette();
    
    // Добавляем в инвентарь
    const newItem={...winSkin,id:idCounter++};
    inventory.push(newItem);
    history.push({type:'case',skin:winSkin.name,price:winSkin.price,time:new Date().toISOString()});
    
    // Дроп через 6 секунд
    addDropDelayed(winSkin.name,winSkin.icon,winSkin.price,winSkin.rarity);
    
    // Результат
    const profit=winSkin.price-c.price;
    $('spinResult').style.display='block';
    $('spinResult').innerHTML=`🎉 ${winSkin.icon} <strong>${winSkin.name}</strong> (${winSkin.price} 🪙) | ${profit>=0?'+'+profit:profit} 🪙`;
    $('spinResult').style.background=profit>=0?'rgba(76,175,80,0.1)':'rgba(255,68,68,0.1)';
    $('spinResult').style.color=profit>=0?'#4caf50':'#ff4444';
    
    renderAllInventory();
    saveGame();
    
    isSpinning=false;
    $('openBtn').disabled=false;
    $('openBtn').textContent='🔑 ОТКРЫТЬ КЕЙС';
}

// ============================================================
// UI
// ============================================================
function navigateTo(page){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));if(page==='cases'){$('page-cases').classList.add('active');renderCasesGrid();}else{$('page-'+page).classList.add('active');if(['inventory','upgrade','contract','profile'].includes(page))renderAllInventory();if(page==='profile')renderProfile();}document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const nb=document.querySelector(`[data-page="${page}"]`);if(nb)nb.classList.add('active');}
function openCasePage(index){currentCaseIndex=index;const c=CASES[index];$('caseOpenTitle').textContent=c.icon+' '+c.name;$('caseOpenPrice').textContent=c.price;$('spinResult').style.display='none';$('poolContent').innerHTML=c.skins.map(s=>`<div class="pool-card rarity-${s.rarity}"><span class="pool-icon">${s.icon}</span><div>${s.name.split('|')[1]||s.name}</div><div style="color:var(--gold);">${s.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join('');navigateTo('case-open');}
function renderCasesGrid(){$('casesGrid').innerHTML=CASES.map((c,i)=>`<div class="case-card" onclick="openCasePage(${i})"><span class="case-icon">${c.icon}</span><div class="case-name">${c.name}</div><div class="case-price">${c.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join('');}
function renderAllInventory(){$('invTotalCount').textContent=inventory.length;$('invTotalPrice').textContent=inventory.reduce((s,i)=>s+i.price,0);if(inventory.length===0){$('inventoryGrid').innerHTML='<div style="text-align:center;padding:50px;color:var(--text2);">📦 Инвентарь пуст</div>';}else{$('inventoryGrid').innerHTML=inventory.map(i=>`<div class="inv-item"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="sellItem(${i.id})">Продать</button></div>`).join('');}renderUpgradeInventory();renderContractInventory();updateUpgradeUI();updateContractUI();}
function renderUpgradeInventory(){$('upgradeInventoryGrid').innerHTML=inventory.length?inventory.map(i=>{const s=selUp.has(i.id);return`<div class="inv-item" style="${s?'border-color:#ff6a00;box-shadow:0 0 20px rgba(255,106,0,0.2)':''}"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="toggleUpgradeSelection(${i.id})" style="background:${s?'rgba(255,106,0,0.6)':'rgba(30,35,50,0.9)'}">${s?'✓':'Выбрать'}</button></div>`;}).join(''):'<div style="text-align:center;color:var(--text2);padding:20px;">Нет скинов</div>';}
function renderContractInventory(){$('contractInventoryGrid').innerHTML=inventory.length?inventory.map(i=>{const s=selCon.has(i.id);return`<div class="inv-item" style="${s?'border-color:#9333ea;box-shadow:0 0 20px rgba(147,51,234,0.2)':''}"><span class="icon">${i.icon}</span><div class="name">${i.name}</div><div class="price">${i.price} <i class="fas fa-coins coin-icon"></i></div><button class="btn-sm btn-sell" onclick="toggleContractSelection(${i.id})" style="background:${s?'rgba(147,51,234,0.6)':'rgba(30,35,50,0.9)'}">${s?'✓':'Выбрать'}</button></div>`;}).join(''):'<div style="text-align:center;color:var(--text2);padding:20px;">Нет скинов</div>';}
function renderProfile(){$('profileContent').innerHTML=`<h2>👤 ПРОФИЛЬ</h2><div style="padding:16px;background:rgba(8,10,20,0.7);border-radius:12px;margin:15px 0;"><div>Привет, <strong style="color:var(--gold);">${currentUser||'Гость'}</strong>!</div><div style="color:var(--text2);">Баланс: <strong style="color:#fff;">${balance}</strong> <i class="fas fa-coins coin-icon"></i></div><div style="color:var(--text2);">Скинов: <strong style="color:#fff;">${inventory.length}</strong></div></div><h3>📋 ИСТОРИЯ</h3><div style="max-height:350px;overflow-y:auto;">${history.length?history.slice().reverse().slice(0,50).map(h=>`<div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(18,22,36,0.5);border-radius:8px;margin-bottom:3px;font-size:11px;"><span style="font-size:22px;">${h.type==='case'?'💎':'⚡'}</span><div style="flex:1;"><div>${h.skin}</div><div style="font-size:9px;color:var(--text2);">${new Date(h.time).toLocaleString()}</div></div><div style="color:var(--gold);">${h.price} <i class="fas fa-coins coin-icon"></i></div></div>`).join(''):'<div style="text-align:center;padding:30px;">Пусто</div>'}</div>`;}
function sellItem(id){const idx=inventory.findIndex(i=>i.id===id);if(idx===-1)return;balance+=inventory[idx].price;updateBalanceUI();inventory.splice(idx,1);selUp.delete(id);selCon.delete(id);renderAllInventory();saveGame();}
function toggleUpgradeSelection(id){if(isUpgrading)return;selUp.has(id)?selUp.delete(id):selUp.add(id);renderAllInventory();}
function toggleContractSelection(id){if(isContracting)return;selCon.has(id)?selCon.delete(id):(selCon.size>=10?alert('Максимум 10!'):selCon.add(id));renderAllInventory();}
function updateUpgradeUI(){const si=inventory.filter(i=>selUp.has(i.id));const tp=si.reduce((s,i)=>s+i.price,0);$('upgradeInputTotal').textContent=tp;if(si.length===0){$('upgradeInputSkins').innerHTML='<span style="color:var(--text2);">Выберите скины</span>';$('upgradeResult').innerHTML='<span style="color:var(--text2);">Ожидание...</span>';}else{$('upgradeInputSkins').innerHTML=si.map(i=>`<span style="display:inline-block;background:rgba(20,24,38,0.8);padding:4px 8px;border-radius:6px;margin:2px;font-size:12px;">${i.icon} ${i.price}🪙</span>`).join('');const ts=getSkinByPrice(tp*selMult);$('upgradeResult').innerHTML=`<div style="font-size:45px;">${ts.icon}</div><div style="font-weight:700;">${ts.name}</div><div style="color:var(--gold);">${ts.price} <i class="fas fa-coins coin-icon"></i></div><div style="color:var(--text2);font-size:10px;">Шанс: ${selChance}%</div>`;$('upgradeResult').dataset.targetSkin=JSON.stringify(ts);}$('upgradeBtn').disabled=si.length<1||isUpgrading;}
function performUpgrade(){if(isUpgrading)return;const si=inventory.filter(i=>selUp.has(i.id));if(si.length<1)return alert('Выберите скин!');isUpgrading=!0;$('upgradeBtn').disabled=!0;setTimeout(()=>{const ok=Math.random()*100<selChance;if(ok){const td=JSON.parse($('upgradeResult').dataset.targetSkin||'null');if(td){inventory=inventory.filter(i=>!selUp.has(i.id));selUp.clear();const ni={...td,id:idCounter++};inventory.push(ni);history.push({type:'upgrade',skin:ni.name,price:ni.price,time:new Date().toISOString()});addDropDelayed(ni.name,ni.icon,ni.price,ni.rarity);}}else{inventory=inventory.filter(i=>!selUp.has(i.id));selUp.clear();}isUpgrading=!1;renderAllInventory();saveGame();},1000);}
function updateContractUI(){const si=inventory.filter(i=>selCon.has(i.id));$('contractCount').textContent=si.length;$('contractTotalPrice').textContent=si.reduce((s,i)=>s+i.price,0);$('contractBtn').disabled=si.length<3||si.length>10||isContracting;}
function performContract(){if(isContracting)return;const si=inventory.filter(i=>selCon.has(i.id));if(si.length<3||si.length>10)return alert('Выберите 3-10!');isContracting=!0;$('contractBtn').disabled=!0;setTimeout(()=>{const tp=si.reduce((s,i)=>s+i.price,0);const mult=Math.random()*2+0.5;const rs=getSkinByPrice(tp*mult);inventory=inventory.filter(i=>!selCon.has(i.id));selCon.clear();const ni={...rs,id:idCounter++};inventory.push(ni);history.push({type:'contract',skin:ni.name,price:ni.price,time:new Date().toISOString()});addDropDelayed(ni.name,ni.icon,ni.price,ni.rarity);$('contractResult').style.display='block';$('contractResult').innerHTML=`<div style="font-size:45px;">${ni.icon}</div><div>${ni.name}</div><div style="color:var(--gold);">${ni.price} <i class="fas fa-coins coin-icon"></i></div>`;isContracting=!1;renderAllInventory();saveGame();},2000);}
function updateBalanceUI(){$('balanceDisplay').textContent=balance;}

// ============================================================
// АВТОРИЗАЦИЯ
// ============================================================
function loadUserData(u){usersRef.child(u).once('value').then(sn=>{const ud=sn.val();if(ud&&ud.saveData){balance=ud.saveData.balance||1000;inventory=ud.saveData.inventory||[];idCounter=ud.saveData.idCounter||0;history=ud.saveData.history||[];currentUser=u;renderAllInventory();updateBalanceUI();$('registerBtn').style.display='none';$('userInfo').style.display='flex';$('userNickname').textContent='👑 '+u;if(u==='Admin'){$('adminBtn').style.display='block';$('userNickname').textContent='⚡ Admin';}localStorage.setItem('skinVault_lastUser',u);navigateTo('cases');}});}
function saveGame(){if(!currentUser)return;usersRef.child(currentUser).child('saveData').set({balance,inventory,idCounter,history});}
function showAdminPanel(){$('adminModal').style.display='flex';$('adminTargetUser').focus();}
function adminGiveCoins(){const t=$('adminTargetUser').value.trim(),a=parseInt($('adminAmount').value),m=$('adminMsg');m.style.color='#ff4444';if(!t){m.textContent='❌ Введи ник!';return;}if(!a||a<1){m.textContent='❌ Введи сумму!';return;}usersRef.child(t).once('value').then(sn=>{if(!sn.exists()){m.textContent='❌ Не найден!';return;}const ud=sn.val()||{};const cb=(ud.saveData&&ud.saveData.balance)||1000;usersRef.child(t).child('saveData').update({balance:cb+a}).then(()=>{m.textContent='✅ Выдано '+a+' 🪙 для '+t+'!';m.style.color='#4caf50';$('adminTargetUser').value='';$('adminAmount').value='';if(t===currentUser){balance=cb+a;updateBalanceUI();renderAllInventory();}});});}
function hashPassword(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h=h&h;}return'h_'+Math.abs(h).toString(16);}
function showRegisterModal(){$('registerModal').style.display='flex';$('loginUsername').focus();}function closeModal(){$('registerModal').style.display='none';}
function loginUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}usersRef.child(u).once('value').then(sn=>{if(!sn.exists()){registerUserDirect(u,p);return;}if(sn.val().password!==hashPassword(p)){err.textContent='❌ Неверный пароль!';err.style.display='block';return;}closeModal();loadUserData(u);});}
function registerUser(){const u=$('loginUsername').value.trim(),p=$('loginPassword').value,err=$('authError');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}if(u.length<3){err.textContent='❌ Минимум 3 символа!';err.style.display='block';return;}if(p.length<4){err.textContent='❌ Минимум 4 символа!';err.style.display='block';return;}registerUserDirect(u,p);}
function registerUserDirect(u,p){usersRef.child(u).once('value').then(sn=>{if(sn.exists()&&sn.val().password){alert('❌ Логин занят!');return;}usersRef.child(u).set({password:hashPassword(p),saveData:{balance:1000,inventory:[],idCounter:0,history:[]}}).then(()=>{closeModal();loadUserData(u);});});}
function logoutUser(){saveGame();currentUser=null;$('registerBtn').style.display='block';$('userInfo').style.display='none';$('adminBtn').style.display='none';balance=1000;inventory=[];idCounter=0;history=[];selUp.clear();selCon.clear();renderAllInventory();updateBalanceUI();navigateTo('cases');}

// ============================================================
// ЗАПУСК
// ============================================================
function init(){const lastUser=localStorage.getItem('skinVault_lastUser');if(lastUser){usersRef.child(lastUser).once('value').then(sn=>{if(sn.exists())loadUserData(lastUser);});}renderCasesGrid();renderAllInventory();updateBalanceUI();$('openBtn').addEventListener('click',openCase);document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',function(){navigateTo(this.dataset.page);}));document.querySelectorAll('#chanceSelector .btn-sm').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('#chanceSelector .btn-sm').forEach(x=>x.classList.remove('active'));this.classList.add('active');selChance=parseInt(this.dataset.chance);selMult=parseFloat(this.dataset.mult);updateUpgradeUI();}));$('upgradeBtn').addEventListener('click',performUpgrade);$('contractBtn').addEventListener('click',performContract);$('clearUpgradeBtn').addEventListener('click',()=>{selUp.clear();renderAllInventory();});$('registerModal').addEventListener('click',function(e){if(e.target===this)closeModal();});$('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter')loginUser();});}
setInterval(()=>{if(currentUser)saveGame();},10000);init();
onlineRef.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP});
</script>
