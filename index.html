// Скины и кейсы
const SKINS=[{n:"AWP | Dragon Lore",r:"legendary",i:"🐉",p:850},{n:"AK-47 | Case Hardened",r:"legendary",i:"💎",p:2800},{n:"M4A4 | Howl",r:"legendary",i:"🐺",p:890},{n:"AWP | Gungnir",r:"legendary",i:"⚡",p:1200},{n:"Desert Eagle | Blaze",r:"legendary",i:"🔥",p:520},{n:"AK-47 | Fire Serpent",r:"legendary",i:"🐍",p:680},{n:"★ Керамбит | Sapphire",r:"legendary",i:"🔪",p:8500},{n:"★ Butterfly | Fade",r:"legendary",i:"🦋",p:2200},{n:"★ Gloves | Vice",r:"legendary",i:"🧤",p:3200},{n:"AK-47 | Vulcan",r:"epic",i:"🌋",p:145},{n:"M4A1-S | Cyrex",r:"epic",i:"🔴",p:48},{n:"AWP | Asiimov",r:"epic",i:"🤖",p:85},{n:"Deagle | Crimson Web",r:"epic",i:"🕸️",p:35},{n:"USP-S | Orion",r:"epic",i:"🌌",p:28},{n:"P250 | Mehndi",r:"epic",i:"🎨",p:18},{n:"AK-47 | Redline",r:"rare",i:"🔴",p:42},{n:"AWP | Redline",r:"rare",i:"🔴",p:35},{n:"Glock | Water Elemental",r:"rare",i:"💧",p:15},{n:"USP-S | Guardian",r:"rare",i:"🛡️",p:8},{n:"P250 | Cartel",r:"rare",i:"💀",p:6},{n:"M4A1-S | Nitro",r:"uncommon",i:"💨",p:4},{n:"AK-47 | Blue Laminate",r:"uncommon",i:"🔷",p:5},{n:"AWP | Safari Mesh",r:"uncommon",i:"🦒",p:2},{n:"Glock | Candy Apple",r:"uncommon",i:"🍎",p:2},{n:"USP-S | Stainless",r:"uncommon",i:"🔩",p:3},{n:"MP9 | Sand Dashed",r:"common",i:"🏜️",p:1},{n:"Nova | Forest",r:"common",i:"🍃",p:1},{n:"P90 | Ash Wood",r:"common",i:"🪵",p:1}];
const CASES=[{id:'premium',n:'👑 Премиум',i:'👑',p:500,s:[...SKINS.filter(s=>s.r==='legendary').slice(0,7),...SKINS.filter(s=>s.r==='epic').slice(0,5)]},{id:'gamma',n:'💚 Gamma',i:'💚',p:800,s:[...SKINS.filter(s=>s.n.includes('★')),...SKINS.filter(s=>s.r==='legendary').slice(0,3),...SKINS.filter(s=>s.r==='epic').slice(0,5)]},{id:'bravo',n:'🔥 Bravo',i:'🔥',p:600,s:[{n:"AK-47 | Fire Serpent",r:"legendary",i:"🐍",p:680},...SKINS.filter(s=>s.n.includes('★')).slice(0,2),...SKINS.filter(s=>s.r==='epic').slice(0,5)]},{id:'glove',n:'🧤 Gloves',i:'🧤',p:500,s:[...SKINS.filter(s=>s.n.includes('Gloves')||s.n.includes('★')).slice(0,4),...SKINS.filter(s=>s.r==='epic').slice(0,5)]},{id:'chroma',n:'🌈 Chroma',i:'🌈',p:200,s:[...SKINS.filter(s=>s.r==='legendary').slice(0,3),...SKINS.filter(s=>s.r==='epic').slice(0,5),...SKINS.filter(s=>s.r==='rare').slice(0,4),...SKINS.filter(s=>s.r==='uncommon').slice(0,4)]},{id:'standard',n:'📦 Стандарт',i:'📦',p:100,s:[...SKINS.filter(s=>s.r==='legendary').slice(3,5),...SKINS.filter(s=>s.r==='epic').slice(0,4),...SKINS.filter(s=>s.r==='rare').slice(0,4),...SKINS.filter(s=>s.r==='uncommon').slice(0,4)]},{id:'sniper',n:'🎯 Снайпер',i:'🎯',p:150,s:[...SKINS.filter(s=>s.n.includes('AWP')),...SKINS.filter(s=>s.r==='epic').slice(0,3),...SKINS.filter(s=>s.r==='rare').slice(0,3)]},{id:'snakebite',n:'🐍 Snakebite',i:'🐍',p:80,s:[...SKINS.filter(s=>s.r==='epic').slice(2,5),...SKINS.filter(s=>s.r==='rare').slice(0,4),...SKINS.filter(s=>s.r==='uncommon').slice(0,4),...SKINS.filter(s=>s.r==='common').slice(0,3)]},{id:'starter',n:'🚀 Старт',i:'🚀',p:30,s:[...SKINS.filter(s=>s.r==='epic').slice(2,4),...SKINS.filter(s=>s.r==='rare'),...SKINS.filter(s=>s.r==='uncommon')]},{id:'budget',n:'💸 Бюджет',i:'💸',p:15,s:[...SKINS.filter(s=>s.r==='rare').slice(2,5),...SKINS.filter(s=>s.r==='uncommon'),...SKINS.filter(s=>s.r==='common')]},{id:'yolo',n:'💀 YOLO',i:'💀',p:200,s:[{n:"★ Керамбит | Sapphire",r:"legendary",i:"🔪",p:8500},{n:"AWP | Dragon Lore",r:"legendary",i:"🐉",p:850},{n:"★ Gloves | Vice",r:"legendary",i:"🧤",p:3200},...SKINS.filter(s=>s.r==='common')]}];

// Состояние
let bal=1000,inv=[],idC=0,spinning=!1,caseI=0,curUser=null,hist=[];
let sUp=new Set,sCon=new Set,uping=!1,coning=!1,ch=50,mult=2;
const ge=id=>document.getElementById(id);

function rndItem(cs){if(CASES[caseI]?.id==='yolo'){const r=Math.random()*100;if(r<1)return cs.find(s=>s.n.includes('Sapphire'));if(r<4)return cs.find(s=>s.n.includes('Dragon Lore'));if(r<8)return cs.find(s=>s.n.includes('Vice'));return cs.filter(s=>s.r==='common')[Math.floor(Math.random()*cs.filter(s=>s.r==='common').length)];}const w={legendary:1,epic:15,rare:30,uncommon:30,common:24};const r=Math.random()*100;let cum=0;for(const[ra,wt]of Object.entries(w)){cum+=wt;if(r<=cum){const p=cs.filter(s=>s.r===ra);if(p.length)return p[Math.floor(Math.random()*p.length)];}}return cs[Math.floor(Math.random()*cs.length)];}
function skinByPrice(tp){let b=SKINS[0],bd=Infinity;for(const s of SKINS){const d=Math.abs(s.p-tp);if(d<bd){bd=d;b=s;}}return b;}

// ============================================================
// РУЛЕТКА - НОВАЯ РАБОТАЮЩАЯ ВЕРСИЯ
// ============================================================
function genTape(win,cs){
    const tape=ge('tape');if(!tape)return;
    let h='';
    for(let i=0;i<40;i++){
        let item=(i===32&&win)?win:rndItem(cs);
        h+=`<div class="skin ${item.r}"><div class="icon">${item.i}</div><div class="name">${item.n}</div><div class="price">${item.p} <i class="fas fa-coins coin"></i></div></div>`;
    }
    tape.innerHTML=h;
    tape.style.transition='none';
    tape.style.transform='translateX(800px)';
}

function spin(){
    return new Promise(resolve=>{
        const tape=ge('tape');
        const cont=document.querySelector('.roulette');
        if(!tape||!cont){resolve();return;}
        
        const ww=cont.offsetWidth||800;
        const cw=117;
        const target=-(32*cw)+(ww/2)-(cw/2);
        const ro=Math.random()*30-15;
        
        // Принудительная перерисовка
        tape.offsetHeight;
        
        // Анимация
        tape.style.transition='transform 3.2s cubic-bezier(0.08,0.85,0.15,1)';
        tape.style.transform=`translateX(${target+ro}px)`;
        
        setTimeout(resolve,3400);
    });
}

async function openCase(){
    if(!curUser){alert('❌ Сначала войди!');showReg();return;}
    if(spinning)return;
    const c=CASES[caseI];
    if(bal<c.p){alert(`❌ Нужно ${c.p} монет!`);return;}
    
    spinning=true;
    ge('openBtn').disabled=true;
    ge('openBtn').textContent='🎰 КРУТИМ...';
    bal-=c.p;
    updBal();
    
    const win=rndItem(c.s);
    genTape(win,c.s);
    await new Promise(r=>setTimeout(r,200));
    await spin();
    
    inv.push({...win,id:idC++});
    hist.push({t:'case',skin:win.n,price:win.p,time:new Date().toISOString()});
    dropLater(win.n,win.i,win.p,win.r);
    
    const profit=win.p-c.p;
    ge('result').style.display='block';
    ge('result').innerHTML=`🎉 ${win.i} <strong>${win.n}</strong> (${win.p} 🪙) | ${profit>=0?'+'+profit:profit} 🪙`;
    ge('result').style.background=profit>=0?'rgba(76,175,80,0.1)':'rgba(255,60,60,0.1)';
    ge('result').style.color=profit>=0?'#4caf50':'#ff4444';
    
    renderAll();saveGame();
    spinning=false;
    ge('openBtn').disabled=false;
    ge('openBtn').textContent='🔑 ОТКРЫТЬ КЕЙС';
}

// UI
function nav(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));if(p==='cases'){ge('p-cases').classList.add('active');renderCases();}else{ge('p-'+p).classList.add('active');if(['inventory','upgrade','contract','profile'].includes(p))renderAll();if(p==='profile')renderProf();}document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));const nb=document.querySelector(`[data-p="${p}"]`);if(nb)nb.classList.add('active');}
function openCP(i){caseI=i;const c=CASES[i];ge('caseTitle').textContent=c.i+' '+c.n;ge('casePrice').textContent=c.p;ge('result').style.display='none';ge('poolContent').innerHTML=c.s.map(s=>`<div class="pool-item ${s.r}"><span class="icon">${s.i}</span><div>${s.n.split('|')[1]||s.n}</div><div style="color:var(--gold);">${s.p} <i class="fas fa-coins coin"></i></div></div>`).join('');nav('case-open');}
function renderCases(){ge('caseGrid').innerHTML=CASES.map((c,i)=>`<div class="case-item" onclick="openCP(${i})"><span class="icon">${c.i}</span><div class="name">${c.n}</div><div class="price">${c.p} <i class="fas fa-coins coin"></i></div></div>`).join('');}
function renderAll(){ge('invCount').textContent=inv.length;ge('invTotal').textContent=inv.reduce((s,i)=>s+i.p,0);if(inv.length===0){ge('invGrid').innerHTML='<div style="text-align:center;padding:50px;color:var(--text2);">📦 Инвентарь пуст</div>';}else{ge('invGrid').innerHTML=inv.map(i=>`<div class="inv-item"><span class="icon">${i.i}</span><div class="name">${i.n}</div><div class="price">${i.p} <i class="fas fa-coins coin"></i></div><button class="btn-sm sell" onclick="sell(${i.id})">Продать</button></div>`).join('');}renderUpInv();renderConInv();upUI();conUI();}
function renderUpInv(){ge('upInvGrid').innerHTML=inv.length?inv.map(i=>{const s=sUp.has(i.id);return`<div class="inv-item" style="${s?'border-color:#ff6600;box-shadow:0 0 20px rgba(255,102,0,0.2)':''}"><span class="icon">${i.i}</span><div class="name">${i.n}</div><div class="price">${i.p} <i class="fas fa-coins coin"></i></div><button class="btn-sm sell" onclick="tUp(${i.id})" style="background:${s?'rgba(255,102,0,0.6)':'rgba(30,36,50,0.9)'}">${s?'✓':'Выбрать'}</button></div>`;}).join(''):'<div style="text-align:center;color:var(--text2);padding:20px;">Нет скинов</div>';}
function renderConInv(){ge('conInvGrid').innerHTML=inv.length?inv.map(i=>{const s=sCon.has(i.id);return`<div class="inv-item" style="${s?'border-color:#9333ea;box-shadow:0 0 20px rgba(147,51,234,0.2)':''}"><span class="icon">${i.i}</span><div class="name">${i.n}</div><div class="price">${i.p} <i class="fas fa-coins coin"></i></div><button class="btn-sm sell" onclick="tCon(${i.id})" style="background:${s?'rgba(147,51,234,0.6)':'rgba(30,36,50,0.9)'}">${s?'✓':'Выбрать'}</button></div>`;}).join(''):'<div style="text-align:center;color:var(--text2);padding:20px;">Нет скинов</div>';}
function renderProf(){ge('profContent').innerHTML=`<h2>👤 ПРОФИЛЬ</h2><div style="padding:16px;background:rgba(10,14,24,0.7);border-radius:12px;margin:15px 0;"><div>Привет, <strong style="color:var(--gold);">${curUser||'Гость'}</strong>!</div><div style="color:var(--text2);">Баланс: <strong style="color:#fff;">${bal}</strong> <i class="fas fa-coins coin"></i></div><div style="color:var(--text2);">Скинов: <strong style="color:#fff;">${inv.length}</strong></div></div><h3>📋 ИСТОРИЯ</h3><div style="max-height:350px;overflow-y:auto;">${hist.length?hist.slice().reverse().slice(0,50).map(h=>`<div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(20,26,42,0.5);border-radius:8px;margin-bottom:3px;font-size:11px;"><span style="font-size:22px;">${h.t==='case'?'💎':'⚡'}</span><div style="flex:1;"><div>${h.skin}</div><div style="font-size:9px;color:var(--text2);">${new Date(h.time).toLocaleString()}</div></div><div style="color:var(--gold);">${h.price} <i class="fas fa-coins coin"></i></div></div>`).join(''):'<div style="text-align:center;padding:30px;">Пусто</div>'}</div>`;}
function sell(id){const idx=inv.findIndex(i=>i.id===id);if(idx===-1)return;bal+=inv[idx].p;updBal();inv.splice(idx,1);sUp.delete(id);sCon.delete(id);renderAll();saveGame();}
function tUp(id){if(uping)return;sUp.has(id)?sUp.delete(id):sUp.add(id);renderAll();}
function tCon(id){if(coning)return;sCon.has(id)?sCon.delete(id):(sCon.size>=10?alert('Максимум 10!'):sCon.add(id));renderAll();}
function upUI(){const si=inv.filter(i=>sUp.has(i.id));const tp=si.reduce((s,i)=>s+i.p,0);ge('upSum').textContent=tp;if(si.length===0){ge('upInp').innerHTML='<span style="color:var(--text2);">Выберите скины</span>';ge('upRes').innerHTML='<span style="color:var(--text2);">Ожидание...</span>';}else{ge('upInp').innerHTML=si.map(i=>`<span style="display:inline-block;background:rgba(20,26,42,0.8);padding:4px 8px;border-radius:6px;margin:2px;font-size:12px;">${i.i} ${i.p}🪙</span>`).join('');const ts=skinByPrice(tp*mult);ge('upRes').innerHTML=`<div style="font-size:45px;">${ts.i}</div><div style="font-weight:700;">${ts.n}</div><div style="color:var(--gold);">${ts.p} <i class="fas fa-coins coin"></i></div><div style="color:var(--text2);font-size:10px;">Шанс: ${ch}%</div>`;ge('upRes').dataset.ts=JSON.stringify(ts);}ge('upgradeBtn').disabled=si.length<1||uping;}
function doUpgrade(){if(uping)return;const si=inv.filter(i=>sUp.has(i.id));if(si.length<1)return alert('Выберите скин!');uping=true;ge('upgradeBtn').disabled=true;setTimeout(()=>{const ok=Math.random()*100<ch;if(ok){const td=JSON.parse(ge('upRes').dataset.ts||'null');if(td){inv=inv.filter(i=>!sUp.has(i.id));sUp.clear();const ni={...td,id:idC++};inv.push(ni);hist.push({t:'upgrade',skin:ni.n,price:ni.p,time:new Date().toISOString()});dropLater(ni.n,ni.i,ni.p,ni.r);}}else{inv=inv.filter(i=>!sUp.has(i.id));sUp.clear();}uping=false;renderAll();saveGame();},1000);}
function conUI(){const si=inv.filter(i=>sCon.has(i.id));ge('conCount').textContent=si.length;ge('conSum').textContent=si.reduce((s,i)=>s+i.p,0);ge('contractBtn').disabled=si.length<3||si.length>10||coning;}
function doContract(){if(coning)return;const si=inv.filter(i=>sCon.has(i.id));if(si.length<3||si.length>10)return alert('Выберите 3-10!');coning=true;ge('contractBtn').disabled=true;setTimeout(()=>{const tp=si.reduce((s,i)=>s+i.p,0);const rs=skinByPrice(tp*(Math.random()*2+0.5));inv=inv.filter(i=>!sCon.has(i.id));sCon.clear();const ni={...rs,id:idC++};inv.push(ni);hist.push({t:'contract',skin:ni.n,price:ni.p,time:new Date().toISOString()});dropLater(ni.n,ni.i,ni.p,ni.r);ge('conRes').style.display='block';ge('conRes').innerHTML=`<div style="font-size:45px;">${ni.i}</div><div>${ni.n}</div><div style="color:var(--gold);">${ni.p} <i class="fas fa-coins coin"></i></div>`;coning=false;renderAll();saveGame();},2000);}
function updBal(){ge('balDisplay').textContent=bal;}

// Firebase users
function loadUser(u){usersR.child(u).once('value').then(sn=>{const ud=sn.val();if(ud&&ud.sd){bal=ud.sd.balance||1000;inv=ud.sd.inventory||[];idC=ud.sd.idCounter||0;hist=ud.sd.history||[];curUser=u;renderAll();updBal();ge('regBtn').style.display='none';ge('userInfo').style.display='flex';ge('userName').textContent='👑 '+u;if(u==='Admin'){ge('adminBtn').style.display='block';ge('userName').textContent='⚡ Admin';}localStorage.setItem('sv_last',u);nav('cases');}});}
function saveGame(){if(!curUser)return;usersR.child(curUser).child('sd').set({balance:bal,inventory:inv,idCounter:idC,history:hist});}
function showAdmin(){ge('adminModal').style.display='flex';ge('admUser').focus();}
function giveCoins(){const t=ge('admUser').value.trim(),a=parseInt(ge('admAmt').value),m=ge('admMsg');m.style.color='#ff4444';if(!t){m.textContent='❌ Введи ник!';return;}if(!a||a<1){m.textContent='❌ Введи сумму!';return;}usersR.child(t).once('value').then(sn=>{if(!sn.exists()){m.textContent='❌ Не найден!';return;}const ud=sn.val()||{};const cb=(ud.sd&&ud.sd.balance)||1000;usersR.child(t).child('sd').update({balance:cb+a}).then(()=>{m.textContent='✅ Выдано '+a+' 🪙 для '+t+'!';m.style.color='#4caf50';ge('admUser').value='';ge('admAmt').value='';if(t===curUser){bal=cb+a;updBal();renderAll();}});});}
function hash(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h=h&h;}return'h_'+Math.abs(h).toString(16);}
function showReg(){ge('regModal').style.display='flex';ge('loginUser').focus();}
function closeModals(){document.querySelectorAll('.modal-overlay').forEach(m=>m.style.display='none');}
function doLogin(){const u=ge('loginUser').value.trim(),p=ge('loginPass').value,err=ge('authErr');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}usersR.child(u).once('value').then(sn=>{if(!sn.exists()){regDirect(u,p);return;}if(sn.val().pass!==hash(p)){err.textContent='❌ Неверный пароль!';err.style.display='block';return;}closeModals();loadUser(u);});}
function doRegister(){const u=ge('loginUser').value.trim(),p=ge('loginPass').value,err=ge('authErr');if(!u||!p){err.textContent='❌ Заполни поля!';err.style.display='block';return;}if(u.length<3){err.textContent='❌ Минимум 3 символа!';err.style.display='block';return;}if(p.length<4){err.textContent='❌ Минимум 4 символа!';err.style.display='block';return;}regDirect(u,p);}
function regDirect(u,p){usersR.child(u).once('value').then(sn=>{if(sn.exists()&&sn.val().pass){alert('❌ Логин занят!');return;}usersR.child(u).set({pass:hash(p),sd:{balance:1000,inventory:[],idCounter:0,history:[]}}).then(()=>{closeModals();loadUser(u);});});}
function logout(){saveGame();curUser=null;ge('regBtn').style.display='block';ge('userInfo').style.display='none';ge('adminBtn').style.display='none';bal=1000;inv=[];idC=0;hist=[];sUp.clear();sCon.clear();renderAll();updBal();nav('cases');}

// Запуск
function init(){
    const lu=localStorage.getItem('sv_last');if(lu){usersR.child(lu).once('value').then(sn=>{if(sn.exists())loadUser(lu);});}
    renderCases();renderAll();updBal();
    ge('openBtn').addEventListener('click',openCase);
    document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',function(){nav(this.dataset.p);}));
    document.querySelectorAll('#chanceSel .btn-sm').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('#chanceSel .btn-sm').forEach(x=>x.classList.remove('active'));this.classList.add('active');ch=parseInt(this.dataset.c);mult=parseFloat(this.dataset.m);upUI();}));
    ge('upgradeBtn').addEventListener('click',doUpgrade);ge('contractBtn').addEventListener('click',doContract);
    ge('clearUp').addEventListener('click',()=>{sUp.clear();renderAll();});
    ge('regModal').addEventListener('click',function(e){if(e.target===this)closeModals();});
    ge('adminModal').addEventListener('click',function(e){if(e.target===this)closeModals();});
    ge('loginPass').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
}
setInterval(()=>{if(curUser)saveGame();},10000);init();
onlineR.child(myId).set({t:firebase.database.ServerValue.TIMESTAMP});
</script>
