<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CaseBattle | Открытие кейсов</title>
    <!-- Шрифты и иконки -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ----- RESET & GLOBAL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0e14;
            color: #e3e6ed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app {
            max-width: 1000px;
            width: 100%;
            background: #141a24;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a313e;
        }

        /* ----- HEADER ----- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f7c948, #f0a500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo i {
            -webkit-text-fill-color: #f0a500;
            margin-right: 8px;
        }

        .balance {
            background: #1f2836;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 18px;
            border: 1px solid #2f3a4b;
        }
        .balance i {
            color: #f0a500;
            margin-right: 8px;
        }
        .balance span {
            color: #b9c4d4;
            font-weight: 400;
        }

        /* ----- CASE CARD ----- */
        .case-card {
            background: #1a212c;
            border-radius: 24px;
            padding: 30px 20px 25px;
            text-align: center;
            border: 1px solid #2a3342;
            margin-bottom: 30px;
            transition: 0.2s;
        }

        .case-card h2 {
            font-weight: 600;
            font-size: 22px;
            margin-bottom: 6px;
        }
        .case-card .sub {
            color: #8895aa;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Слот-машина (рулетка) */
        .slot-machine {
            background: #0f141d;
            border-radius: 20px;
            padding: 20px 10px;
            margin: 20px 0 25px;
            border: 1px solid #28303f;
            overflow: hidden;
        }

        .slot-track {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: nowrap;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            min-height: 110px;
            align-items: center;
        }

        .slot-item {
            flex: 0 0 90px;
            background: #1e2735;
            border-radius: 16px;
            padding: 12px 6px;
            text-align: center;
            border: 2px solid #2d384a;
            transition: 0.2s;
            opacity: 0.6;
            scale: 0.9;
        }
        .slot-item.active {
            opacity: 1;
            scale: 1.05;
            border-color: #f0a500;
            box-shadow: 0 0 20px rgba(240, 165, 0, 0.3);
        }
        .slot-item .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 4px;
        }
        .slot-item .name {
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .slot-item .price {
            font-size: 10px;
            color: #8895aa;
        }

        /* Редкости (цвета) */
        .rarity-common .icon { color: #b0b7c2; }
        .rarity-uncommon .icon { color: #5b9e6b; }
        .rarity-rare .icon { color: #3b7fc9; }
        .rarity-epic .icon { color: #9b4bca; }
        .rarity-legendary .icon { color: #d48c2b; }

        /* Кнопка открытия */
        .btn-open {
            background: linear-gradient(135deg, #f7c948, #e09d00);
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #a57300;
            width: 100%;
            max-width: 300px;
            letter-spacing: 0.3px;
        }
        .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #a57300;
        }
        .btn-open:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a57300;
        }
        .btn-open:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a57300;
            pointer-events: none;
        }

        /* ----- HISTORY ----- */
        .history-section {
            margin-top: 20px;
        }
        .history-section h3 {
            font-weight: 600;
            font-size: 16px;
            color: #8895aa;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 6px;
        }
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: #1a212c;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #f0a500;
            border-radius: 8px;
        }

        .history-item {
            background: #1a212c;
            padding: 10px 16px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #f0a500;
            font-size: 14px;
        }
        .history-item .h-name {
            font-weight: 500;
        }
        .history-item .h-price {
            color: #b9c4d4;
        }
        .history-item .h-rarity {
            font-size: 12px;
            padding: 2px 12px;
            border-radius: 20px;
            background: #232d3e;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* адаптив */
        @media (max-width: 640px) {
            .app { padding: 16px; }
            .slot-item { flex: 0 0 70px; padding: 8px 4px; }
            .slot-item .icon { font-size: 28px; }
            .slot-item .name { font-size: 9px; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ШАПКА -->
    <header class="header">
        <div class="logo"><i class="fas fa-box-open"></i> CaseBattle</div>
        <div class="balance"><i class="fas fa-coins"></i> <span id="balanceDisplay">1000</span></div>
    </header>

    <!-- КЕЙС -->
    <div class="case-card">
        <h2>🌀 Стандартный кейс</h2>
        <div class="sub">Нажми на кнопку, чтобы открыть</div>

        <!-- Слоты -->
        <div class="slot-machine" id="slotMachine">
            <div class="slot-track" id="slotTrack">
                <!-- скины будут вставлены через JS -->
            </div>
        </div>

        <button class="btn-open" id="openBtn"><i class="fas fa-key"></i> ОТКРЫТЬ (50)</button>
    </div>

    <!-- ИСТОРИЯ -->
    <div class="history-section">
        <h3><i class="fas fa-clock"></i> Последние открытия</h3>
        <div class="history-list" id="historyList">
            <!-- сюда будут добавляться записи -->
            <div style="color:#5a677a; text-align:center; padding:12px; font-size:14px;">История пуста</div>
        </div>
    </div>

</div>

<script>
    (function() {
        // ----- КОНФИГ СКИНОВ (как в кейсах) -----
        const ITEMS = [
            { name: 'MP9 | Зелёный', price: 2.50, rarity: 'common', icon: '🔫' },
            { name: 'MAG-7 | Медь', price: 3.20, rarity: 'common', icon: '🔫' },
            { name: 'Glock-18 | Вода', price: 5.10, rarity: 'uncommon', icon: '🔫' },
            { name: 'M4A4 | Тренировка', price: 8.75, rarity: 'uncommon', icon: '🔫' },
            { name: 'AK-47 | Красная линия', price: 15.40, rarity: 'rare', icon: '🔫' },
            { name: 'AWP | Фуксия', price: 22.00, rarity: 'rare', icon: '🔫' },
            { name: 'Кинжал | Теневая', price: 45.90, rarity: 'epic', icon: '🗡️' },
            { name: 'Нож | Рубиновый', price: 89.99, rarity: 'legendary', icon: '🗡️' },
            { name: 'Скин | Азимов', price: 120.00, rarity: 'legendary', icon: '🤖' },
        ];

        // Веса для редкостей (чем выше число, тем чаще выпадает)
        const RARITY_WEIGHTS = {
            common: 45,
            uncommon: 30,
            rare: 18,
            epic: 5,
            legendary: 2,
        };

        // ----- СОСТОЯНИЕ -----
        let balance = 1000;
        const OPEN_COST = 50;
        const history = [];

        // DOM-элементы
        const track = document.getElementById('slotTrack');
        const openBtn = document.getElementById('openBtn');
        const balanceSpan = document.getElementById('balanceDisplay');
        const historyContainer = document.getElementById('historyList');

        // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----
        function getRarityClass(rarity) {
            return `rarity-${rarity}`;
        }

        // Выбор случайного предмета с учётом весов редкостей
        function getRandomItem() {
            // 1) Выбираем редкость
            const rarityKeys = Object.keys(RARITY_WEIGHTS);
            const totalWeight = rarityKeys.reduce((sum, k) => sum + RARITY_WEIGHTS[k], 0);
            let rand = Math.random() * totalWeight;
            let selectedRarity = 'common';
            for (const key of rarityKeys) {
                rand -= RARITY_WEIGHTS[key];
                if (rand <= 0) {
                    selectedRarity = key;
                    break;
                }
            }

            // 2) Из всех предметов с этой редкостью выбираем случайный
            const pool = ITEMS.filter(item => item.rarity === selectedRarity);
            if (pool.length === 0) {
                // fallback
                return ITEMS[Math.floor(Math.random() * ITEMS.length)];
            }
            return pool[Math.floor(Math.random() * pool.length)];
        }

        // Генерация 5 слотов (для отображения)
        function generateSlots(highlightIndex = -1) {
            const items = [];
            for (let i = 0; i < 5; i++) {
                items.push(getRandomItem());
            }
            return items;
        }

        // Отрисовка слотов
        function renderSlots(items, highlightIndex = -1) {
            track.innerHTML = '';
            items.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = `slot-item ${getRarityClass(item.rarity)}`;
                if (idx === highlightIndex) div.classList.add('active');
                div.innerHTML = `
                    <span class="icon">${item.icon}</span>
                    <div class="name">${item.name}</div>
                    <div class="price">$${item.price.toFixed(2)}</div>
                `;
                track.appendChild(div);
            });
        }

        // Обновление баланса на UI
        function updateBalanceUI() {
            balanceSpan.textContent = balance.toFixed(0);
        }

        // Добавление записи в историю
        function addHistory(item) {
            history.unshift(item); // свежее сверху
            if (history.length > 15) history.pop();

            // Очищаем и перерисовываем
            historyContainer.innerHTML = '';
            if (history.length === 0) {
                historyContainer.innerHTML = `<div style="color:#5a677a; text-align:center; padding:12px; font-size:14px;">История пуста</div>`;
                return;
            }

            history.forEach(h => {
                const row = document.createElement('div');
                row.className = 'history-item';
                row.style.borderLeftColor = getRarityColor(h.rarity);
                row.innerHTML = `
                    <span class="h-name">${h.icon} ${h.name}</span>
                    <span class="h-price">$${h.price.toFixed(2)}</span>
                    <span class="h-rarity" style="color:${getRarityColor(h.rarity)}">${h.rarity}</span>
                `;
                historyContainer.appendChild(row);
            });
        }

        // Цвет для редкости (история)
        function getRarityColor(rarity) {
            const map = {
                common: '#b0b7c2',
                uncommon: '#5b9e6b',
                rare: '#3b7fc9',
                epic: '#9b4bca',
                legendary: '#d48c2b',
            };
            return map[rarity] || '#fff';
        }

        // ----- ОСНОВНАЯ ЛОГИКА ОТКРЫТИЯ -----
        function openCase() {
            if (balance < OPEN_COST) {
                alert('Недостаточно средств! Пополни баланс (нажми F12 и введи balance = 1000)');
                return;
            }

            // Списываем деньги
            balance -= OPEN_COST;
            updateBalanceUI();

            // Блокируем кнопку на время анимации
            openBtn.disabled = true;
            openBtn.textContent = '🔄 ОТКРЫВАЕМ...';

            // 1) Генерируем 5 предметов, последний (индекс 4) будет выигрышным
            const items = generateSlots();
            const winItem = getRandomItem(); // честный рандом
            items[4] = winItem; // подменяем последний слот на выигрыш

            // 2) Отрисовываем слоты (без подсветки)
            renderSlots(items, -1);

            // 3) Анимация: через 300 мс подсветим последний (выигрышный)
            setTimeout(() => {
                // перерисовываем с подсветкой индекса 4
                renderSlots(items, 4);

                // Добавляем в историю
                addHistory(winItem);

                // Разблокируем кнопку
                openBtn.disabled = false;
                openBtn.innerHTML = '<i class="fas fa-key"></i> ОТКРЫТЬ (50)';

            }, 700);
        }

        // ----- ИНИЦИАЛИЗАЦИЯ (стартовые слоты) -----
        function init() {
            const starter = generateSlots();
            renderSlots(starter, -1);
            updateBalanceUI();
            // добавляем пару примеров в историю
            addHistory(ITEMS[2]);
            addHistory(ITEMS[5]);
            addHistory(ITEMS[7]);
        }

        // Вешаем обработчик
        openBtn.addEventListener('click', openCase);

        // Для теста — если баланс упал до 0, можно восстановить через консоль
        window.__caseBattle = { setBalance: (v) => { balance = v; updateBalanceUI(); } };

        // Запуск
        init();
    })();
</script>

</body>
</html>
